pattern_id: EXT-POLICY_AS_CODE_GUARDRAILS
name: Policy-as-Code / Guardrails
summary: Prevent insecure deployments
intent: Prevent insecure deployments
context: Systems handling sensitive data and multiple services/identities across networks and environments.
problem: Implicit trust, broad permissions, and ad-hoc secret handling create high breach impact and compliance risk.
forces_tradeoffs: Security depth vs developer friction; least privilege vs operational agility; privacy vs usability.
solution_structure_behavior: A governance approach that encodes security and compliance rules as versioned, testable code
  enforced by automation (CI/CD, admission controllers). Guardrails prevent or flag risky configurations before they reach
  production, improving consistency and reducing reliance on manual reviews.
consequences: Reduced blast radius and better compliance; requires governance, tooling, and ongoing hygiene.
implementation_notes: Centralize identity, enforce least privilege, store secrets in a vault, keep services private by default,
  and automate policy checks.
examples_known_uses: Enterprise SaaS, healthcare/finance workloads, multi-tenant platforms.
related_patterns: |
  depends_on: OBS-01
  complements: CFG-01
  complements: CTX-01
  complements: POL-01
extended_definition: A governance approach that encodes security and compliance rules as versioned, testable code enforced
  by automation (CI/CD, admission controllers). Guardrails prevent or flag risky configurations before they reach production,
  improving consistency and reducing reliance on manual reviews.
