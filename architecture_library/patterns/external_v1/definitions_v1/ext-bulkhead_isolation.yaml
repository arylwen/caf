pattern_id: EXT-BULKHEAD_ISOLATION
name: Bulkhead Isolation
summary: Separate pools/resources per workload/tenant
intent: Prevent one workload/tenant/dependency from exhausting shared resources.
context: Distributed systems with unreliable networks and variable load; async workflows and integrations.
problem: Synchronous chaining and naive retries cause cascading failures, duplicate side effects, and poor elasticity under
  spikes.
forces_tradeoffs: Consistency vs availability; throughput vs ordering; retry aggressiveness vs dependency protection; simplicity
  vs correctness.
solution_structure_behavior: "A pattern that partitions resources (threads, connection pools, queues, nodes) so one overloaded\
  \ component or tenant cannot exhaust shared capacity. By isolating \u2018compartments,\u2019 it limits blast radius and\
  \ improves predictability, but requires capacity planning and per-partition tuning."
consequences: More resilient and scalable workflows; more components and operational complexity (queues, topics, retries,
  replays).
implementation_notes: Design for at-least-once delivery, idempotency, backoff+jitter, DLQs, and clear ownership for replay/compensation.
examples_known_uses: Order/payment workflows, event streams, background processing, third-party integration pipelines.
related_patterns: |
  depends_on: OBS-01
  complements: CFG-01
  complements: CTX-01
  complements: POL-01
extended_definition: |
  A pattern that partitions resources (threads, connection pools, queues, nodes) so one overloaded component or tenant cannot exhaust shared capacity. By isolating ‘compartments,’ it limits blast radius and improves predictability, but requires capacity planning and per-partition tuning.
