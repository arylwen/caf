<svg xmlns="http://www.w3.org/2000/svg" width="920" height="720" viewBox="0 0 920 720" role="img" aria-label="CAF end-to-end pipeline">

<style>
  .title { font: 700 22px Arial, Helvetica, sans-serif; fill: #0f172a; }
  .subtitle { font: 400 12px Arial, Helvetica, sans-serif; fill: #334155; }
  .box { fill: #ffffff; stroke: #475569; stroke-width: 2; rx: 14; ry: 14; }
  .accent { fill: #eff6ff; stroke: #2563eb; stroke-width: 2; rx: 14; ry: 14; }
  .side { fill: #fff7ed; stroke: #c2410c; stroke-width: 2; rx: 12; ry: 12; }
  .ok { fill: #ecfdf5; stroke: #15803d; stroke-width: 2; rx: 14; ry: 14; }
  .warn { fill: #fff1f2; stroke: #be123c; stroke-width: 2; rx: 14; ry: 14; }
  .label { font: 700 18px Arial, Helvetica, sans-serif; fill: #0f172a; }
  .small { font: 400 12px Arial, Helvetica, sans-serif; fill: #334155; }
  .arrow { stroke: #475569; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
  .dashed { stroke-dasharray: 7 6; }
  .note { font: 700 13px Arial, Helvetica, sans-serif; fill: #9a3412; }
</style>

<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
  </marker>
</defs>
<rect width="100%" height="100%" fill="#f8fafc" />
<text x="460" y="36" class="title" text-anchor="middle">CAF end-to-end pipeline</text><text x="460" y="58" class="subtitle" text-anchor="middle">How CAF moves from intent to candidate code.</text><rect x="110" y="100" width="360" height="86" class="accent" /><text x="290.0" y="148" class="label" text-anchor="middle">Product Intent</text><rect x="110" y="220" width="360" height="86" class="box" /><text x="290.0" y="268" class="label" text-anchor="middle">Architecture</text><rect x="110" y="340" width="360" height="86" class="box" /><text x="290.0" y="388" class="label" text-anchor="middle">Plan</text><rect x="110" y="460" width="360" height="86" class="box" /><text x="290.0" y="508" class="label" text-anchor="middle">Candidate Code</text><line x1="290.0" y1="186" x2="290.0" y2="220" class="arrow" /><line x1="290.0" y1="306" x2="290.0" y2="340" class="arrow" /><line x1="290.0" y1="426" x2="290.0" y2="460" class="arrow" /><rect x="590" y="113" width="220" height="60" class="side" /><text x="700.0" y="150" class="small" text-anchor="middle">Intent artifact</text><line x1="470" y1="143.0" x2="590" y2="143.0" class="arrow dashed" /><rect x="590" y="233" width="220" height="60" class="side" /><text x="700.0" y="270" class="small" text-anchor="middle">Architecture artifact</text><line x1="470" y1="263.0" x2="590" y2="263.0" class="arrow dashed" /><rect x="590" y="353" width="220" height="60" class="side" /><text x="700.0" y="390" class="small" text-anchor="middle">Plan artifact</text><line x1="470" y1="383.0" x2="590" y2="383.0" class="arrow dashed" /><rect x="590" y="473" width="220" height="60" class="side" /><text x="700.0" y="510" class="small" text-anchor="middle">Code artifact</text><line x1="470" y1="503.0" x2="590" y2="503.0" class="arrow dashed" /><text x="700" y="618" class="note" text-anchor="middle">Each stage leaves behind a durable artifact.</text></svg>