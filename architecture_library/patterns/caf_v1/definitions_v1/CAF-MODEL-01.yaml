extended_definition: This pattern is the foundation for semantic derivation. It enables CAF to compile boundary obligations
  and validation gates from adopted patterns while leaving domain-specific nouns to the architect and workers.
source_documents:
- path: architecture_library/patterns/core_v1/sources_v1.md
  sections:
  - Clean Architecture
  - Domain-Driven Design
caf:
  layer: caf
  verifiability: plan_ready
  plane: both
  default_anchor_policy: requires_explicit_design_decision
  allowed_anchor_types:
  - checklist_item
  - caf_pattern
  - core_pattern
  - tbp
  - rail
  default_anchor:
    anchor_type: checklist_item
    anchor_id: REQUIRES_HUMAN_DECISION_ID
  minimum_evidence:
  - The system has protected operations, governance rules, or non-trivial invariants that require explicit boundaries and
    stable interfaces.
  decision_prompts:
  - Record an explicit decision selecting a modeling framework option (default DDD + Clean or an alternative), including scope
    and evidence anchors.
  definition_of_done:
  - Verify that boundary roles are materialized (domain, use-cases, inbound adapters, outbound adapters) for applicable planes.
  - Verify that dependency direction is enforced (domain does not import infrastructure/framework).
  - Verify that boundary tests exist for invariants and use-case behavior.
  capabilities_needed:
  - domain_modeling
  - service_facade_implementation
  - api_boundary_implementation
  - persistence_implementation
  - structural_validation
  forbidden_assumptions:
  - No cloud vendor or product selection implied by this pattern.
  - No assumption of a specific directory layout across languages.
  - No assumption of a specific DDD tactical pattern unless required by another adopted pattern.
  kind: decision_pattern
  option_sets:
  - option_set_id: modeling.framework
    description: Select the modeling framework used to structure boundaries and dependency direction.
    options:
    - option_id: ddd_clean_default
      summary: Domain-driven modeling with Clean Architecture style boundaries (recommended default for multi-plane SaaS).
    - option_id: transaction_script_layered
      summary: Layered transaction-script approach with service orchestration; minimal domain modeling.
    - option_id: active_record_mvc
      summary: MVC/Active Record style with framework-centric modeling; fastest scaffolding, weakest boundary guarantees.
    - option_id: custom
      summary: Custom framework (architect provides boundary rules and invariants).
    default_option_id: ddd_clean_default
  human_questions:
  - question_key: modeling_framework
    question_id: Q-MODEL-FWK-01
    question: Which modeling framework should CAF treat as the default for derivation and validation?
    description: Select a framework option so CAF can compile boundary obligations and enforce dependency direction.
    option_set_id: modeling.framework
    specialization_notes:
    - Strongly recommended when policies, tenancy, auditability, or cross-plane contracts are present.
    - If selecting an alternative, record the boundary invariants that replace the DDD + Clean defaults.
    anchors:
    - caf_pattern: CAF-MODEL-01
