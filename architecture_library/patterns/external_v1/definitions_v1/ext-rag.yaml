pattern_id: EXT-RAG
name: RAG
summary: Retrieval-grounded generation w/ citations
intent: Generate answers grounded in retrieved source material to reduce hallucinations
  and enable citations.
context: LLM assistants over internal docs/data; need factuality, provenance, and
  permission-aware retrieval.
problem: Pure generation can fabricate details; users need answers tied to real documents
  and policies.
forces_tradeoffs: Recall vs precision; latency/cost vs better grounding; context window
  limits vs completeness; freshness vs indexing cost.
solution_structure_behavior: Retrieval-Augmented Generation pairs an LLM with a retriever
  that fetches relevant documents at query time, and the model uses those sources
  to ground its answer (often with citations). It reduces hallucinations and improves
  factuality, but depends on content quality, access control, and evaluation of retrieval
  + generation.
consequences: Improves trust and traceability; introduces retrieval/indexing complexity
  and failure modes (bad chunks, stale index).
implementation_notes: Use hybrid retrieval + reranking, good chunking/metadata, prompt
  templates with citation rules, and evaluation harnesses.
examples_known_uses: Enterprise knowledge assistant; support copilot; policy/handbook
  Q&A with citations.
related_patterns: |
  depends_on: OBS-01
  complements: CFG-01
  complements: CTX-01
  complements: POL-01
extended_definition: Retrieval-Augmented Generation pairs an LLM with a retriever
  that fetches relevant documents at query time, and the model uses those sources
  to ground its answer (often with citations). It reduces hallucinations and improves
  factuality, but depends on content quality, access control, and evaluation of retrieval
  + generation.
