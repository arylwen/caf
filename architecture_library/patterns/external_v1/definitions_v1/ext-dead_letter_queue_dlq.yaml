pattern_id: EXT-DEAD_LETTER_QUEUE_DLQ
name: Dead Letter Queue (DLQ)
summary: Isolate poison messages for triage/replay
intent: Quarantine messages that repeatedly fail so they can be triaged and replayed safely.
context: Distributed systems with unreliable networks and variable load; async workflows and integrations.
problem: Synchronous chaining and naive retries cause cascading failures, duplicate side effects, and poor elasticity under
  spikes.
forces_tradeoffs: Consistency vs availability; throughput vs ordering; retry aggressiveness vs dependency protection; simplicity
  vs correctness.
solution_structure_behavior: "A secondary queue that captures messages that repeatedly fail processing after retries or exceed\
  \ a maximum age. It isolates \u2018poison\u2019 messages for inspection, alerting, and controlled replay, helping keep primary\
  \ processing healthy and debuggable."
consequences: More resilient and scalable workflows; more components and operational complexity (queues, topics, retries,
  replays).
implementation_notes: Design for at-least-once delivery, idempotency, backoff+jitter, DLQs, and clear ownership for replay/compensation.
examples_known_uses: Order/payment workflows, event streams, background processing, third-party integration pipelines.
related_patterns: |
  depends_on: OBS-01
  complements: CFG-01
  complements: CTX-01
  complements: POL-01
extended_definition: |
  A secondary queue that captures messages that repeatedly fail processing after retries or exceed a maximum age. It isolates ‘poison’ messages for inspection, alerting, and controlled replay, helping keep primary processing healthy and debuggable.
