pattern_id: EXT-CIRCUIT_BREAKER
name: Circuit Breaker
summary: Stop calling a failing dependency to reduce blast radius
intent: Fail fast when a dependency is unhealthy to reduce blast radius and allow recovery.
context: Distributed systems with unreliable networks and variable load; async workflows and integrations.
problem: Synchronous chaining and naive retries cause cascading failures, duplicate side effects, and poor elasticity under
  spikes.
forces_tradeoffs: Consistency vs availability; throughput vs ordering; retry aggressiveness vs dependency protection; simplicity
  vs correctness.
solution_structure_behavior: "A fault-tolerance pattern that temporarily stops calls to a dependency after detecting a failure\
  \ threshold, allowing it time to recover. The breaker typically transitions through closed \u2192 open \u2192 half-open\
  \ states, reducing cascading failures and preserving resources for healthy paths."
consequences: More resilient and scalable workflows; more components and operational complexity (queues, topics, retries,
  replays).
implementation_notes: Design for at-least-once delivery, idempotency, backoff+jitter, DLQs, and clear ownership for replay/compensation.
examples_known_uses: Order/payment workflows, event streams, background processing, third-party integration pipelines.
related_patterns: |
  depends_on: OBS-01
  complements: CFG-01
  complements: CTX-01
  complements: POL-01
extended_definition: |
  A fault-tolerance pattern that temporarily stops calls to a dependency after detecting a failure threshold, allowing it time to recover. The breaker typically transitions through closed → open → half-open states, reducing cascading failures and preserving resources for healthy paths.
