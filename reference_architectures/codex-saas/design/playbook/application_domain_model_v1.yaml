schema_version: "phase8_plane_domain_model_v1"
plane_scope: "application"
generated_from:
  inputs:
    - "reference_architectures/codex-saas/spec/playbook/application_spec_v1.md"
    - "reference_architectures/codex-saas/spec/playbook/system_spec_v1.md"
    - "reference_architectures/codex-saas/spec/playbook/application_domain_model_v1.md"
    - "reference_architectures/codex-saas/spec/playbook/system_domain_model_v1.md"
domain:
  summary: "Tenant-facing review workspace domain for submissions, review decisions, and report publication."
  bounded_contexts:
    - context_id: "REVIEW_WORKSPACE"
      name: "Review Workspace"
      description: "Manages tenant workspaces, submissions, review outcomes, and report publication."
      aggregates:
        - aggregate_id: "WORKSPACE"
          name: "Workspace"
          description: "Tenant-scoped container for review activity."
          canonical:
            term_id: "workspace"
            status: "exact"
            matched_by: "architect_selected"
          persistence:
            required: true
            storage_intent: "transactional_record"
            notes: "Primary tenant-keyed application aggregate."
          entities:
            - entity_id: "WORKSPACE_RECORD"
              name: "Workspace"
              description: "Workspace metadata and lifecycle state."
              fields:
                - name: "workspace_id"
                  type: "identifier"
                  required: true
                - name: "tenant_id"
                  type: "identifier"
                  required: true
                - name: "name"
                  type: "text"
                  required: true
                - name: "description"
                  type: "text"
                  required: false
                - name: "status"
                  type: "enum(active|archived)"
                  required: true
                - name: "created_at"
                  type: "timestamp"
                  required: true
        - aggregate_id: "SUBMISSION"
          name: "Submission"
          description: "Business item submitted by a user for review."
          persistence:
            required: true
            storage_intent: "transactional_record"
            notes: "Queried by tenant, workspace, status, and submitter."
          entities:
            - entity_id: "SUBMISSION_RECORD"
              name: "Submission"
              description: "Submission payload and workflow status."
              fields:
                - name: "submission_id"
                  type: "identifier"
                  required: true
                - name: "tenant_id"
                  type: "identifier"
                  required: true
                - name: "workspace_id"
                  type: "identifier"
                  required: true
                - name: "title"
                  type: "text"
                  required: true
                - name: "source_uri"
                  type: "text"
                  required: false
                - name: "submitted_by"
                  type: "identifier"
                  required: true
                - name: "status"
                  type: "enum(draft|submitted|in_review|approved|rejected)"
                  required: true
                - name: "submitted_at"
                  type: "timestamp"
                  required: false
            - entity_id: "REVIEW"
              name: "Review"
              description: "Evaluation state and findings for a submission."
              fields:
                - name: "review_id"
                  type: "identifier"
                  required: true
                - name: "submission_id"
                  type: "identifier"
                  required: true
                - name: "decision"
                  type: "enum(pending|approved|rejected)"
                  required: true
                - name: "findings_summary"
                  type: "text"
                  required: true
                - name: "reviewed_by"
                  type: "identifier"
                  required: false
                - name: "reviewed_at"
                  type: "timestamp"
                  required: false
            - entity_id: "REPORT"
              name: "Report"
              description: "Final review output metadata."
              fields:
                - name: "report_id"
                  type: "identifier"
                  required: true
                - name: "submission_id"
                  type: "identifier"
                  required: true
                - name: "tenant_id"
                  type: "identifier"
                  required: true
                - name: "format"
                  type: "enum(html|pdf|json)"
                  required: true
                - name: "generated_at"
                  type: "timestamp"
                  required: true
                - name: "published_by"
                  type: "identifier"
                  required: false
  use_cases:
    - use_case_id: "UC-SUBMITITEM"
      title: "Submit item for review"
      intent: "A tenant user submits an item into the review workflow."
      primary_context_id: "REVIEW_WORKSPACE"
      touches_entities:
        - "Workspace"
        - "Submission"
    - use_case_id: "UC-REVIEWDECISION"
      title: "Complete review decision"
      intent: "A reviewer inspects findings and marks the submission approved or rejected."
      primary_context_id: "REVIEW_WORKSPACE"
      touches_entities:
        - "Submission"
        - "Review"
    - use_case_id: "UC-PUBLISHREPORT"
      title: "Publish report"
      intent: "A user exports or publishes the final review outcome."
      primary_context_id: "REVIEW_WORKSPACE"
      touches_entities:
        - "Review"
        - "Report"
api_candidates:
  resources:
    - name: "workspaces"
      operations: ["list", "get", "create", "update"]
    - name: "submissions"
      operations: ["list", "get", "create", "update"]
    - name: "reviews"
      operations: ["get", "update"]
    - name: "reports"
      operations: ["list", "get", "create"]
