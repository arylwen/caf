caf:
  layer: caf
  verifiability: plan_ready
  plane: both
  default_anchor_policy: requires_explicit_design_decision
  allowed_anchor_types:
  - checklist_item
  - caf_pattern
  - core_pattern
  - tbp
  - rail
  default_anchor:
    anchor_type: checklist_item
    anchor_id: REQUIRES_HUMAN_DECISION_ID
  minimum_evidence:
  - Spec/design explicitly requires deterministic policy enforcement (not ad-hoc checks) for one or more operations.
  decision_prompts:
  - Record an explicit design decision adopting or rejecting this pattern, including scope, constraints/required choices,
    and evidence anchors.
  definition_of_done:
  - Verify that policy is represented as explicit, versioned artifacts and that evaluations emit decision telemetry.
  capabilities_needed:
  - policy_enforcement
  - policy_decision_telemetry
  - observability_emit
  forbidden_assumptions:
  - No cloud vendor or product selection implied by this pattern.
  - No assumption of a specific policy language or rule engine unless provided by TBPs/technology profile.
  kind: decision_pattern
  option_sets:
  - option_set_id: policy.responsibility_distribution
    description: How policy intent, decision, and enforcement responsibilities are distributed across planes.
    options:
    - option_id: cp_central_decision_ap_enforces
      summary: Control Plane centralizes policy decision; Application Plane enforces.
      policy_decision_point: control
      policy_enforcement_point: application
      notes: ''
    - option_id: ap_local_decision_and_enforcement
      summary: Application Plane performs local policy decisions and enforcement (CP provides intent).
      policy_decision_point: application
      policy_enforcement_point: application
      notes: ''
    - option_id: gateway_or_edge_enforcement
      summary: Edge/gateway enforces policy at ingress with CP-governed intent.
      policy_decision_point: control
      policy_enforcement_point: edge_gateway
      notes: ''
    - option_id: custom
      summary: Custom (fill fields).
      policy_decision_point: ''
      policy_enforcement_point: ''
      notes: ''
    default_option_id: cp_central_decision_ap_enforces
  human_questions:
  - question_key: policy_distribution
    question_id: Q-POL-DIST-01
    question: How are policy responsibilities distributed across planes (decision point vs enforcement point)?
    description: Select where policy decisions are made and where enforcement occurs.
    option_set_id: policy.responsibility_distribution
    specialization_notes:
    - Warranted when policy governs tenant operations, safety, cost, or data access across plane boundaries.
    - Keep consistent with any existing Plane Integration Contract choices and enforcement rails.
    anchors:
