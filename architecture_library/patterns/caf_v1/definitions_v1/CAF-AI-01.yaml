caf:
  layer: caf
  verifiability: plan_ready
  plane: both
  default_anchor_policy: requires_explicit_design_decision
  allowed_anchor_types:
  - checklist_item
  - caf_pattern
  - core_pattern
  - tbp
  - rail
  default_anchor:
    anchor_type: checklist_item
    anchor_id: REQUIRES_HUMAN_DECISION_ID
  minimum_evidence:
  - Spec/design includes AI/agent behaviors or governance requirements that require auditability and policy gating.
  decision_prompts:
  - Record an explicit design decision adopting or rejecting this pattern, including scope, constraints/required choices,
    and evidence anchors.
  definition_of_done:
  - Verify that AI governance policies are defined/owned in the Control Plane and consumed by runtime workflows.
  - Verify that AI/agent execution is policy-gated and observable.
  capabilities_needed: []
  forbidden_assumptions:
  - No cloud vendor or product selection implied by this pattern.
  kind: decision_pattern
  option_sets:
  - option_set_id: ai_safety.governance_partitioning
    description: How AI safety policy is governed and where enforcement happens across planes.
    options:
    - option_id: cp_governs_ap_enforces
      summary: Control Plane governs policy; Application Plane enforces at runtime.
      governance_plane: control
      enforcement_plane: application
      notes: ''
    - option_id: cp_only
      summary: Control Plane both governs and enforces (AP delegates decisions).
      governance_plane: control
      enforcement_plane: control
      notes: ''
    - option_id: shared_governance_shared_enforcement
      summary: Governance and enforcement responsibilities are shared with explicit boundaries.
      governance_plane: shared
      enforcement_plane: shared
      notes: ''
    - option_id: custom
      summary: Custom (fill fields).
      governance_plane: ''
      enforcement_plane: ''
      notes: ''
    default_option_id: cp_governs_ap_enforces
  human_questions:
  - question_key: ai_safety_partitioning
    question_id: Q-AI-PART-01
    question: How are AI safety governance and enforcement partitioned across planes?
    description: Select the governance/enforcement partitioning for AI safety controls.
    option_set_id: ai_safety.governance_partitioning
    specialization_notes:
    - Warranted when the system has AI/agent behavior requiring safety gating or governance.
    - Keep consistent with policy responsibility distribution decisions (CAF-POL-02).
    anchors:
    - caf_pattern: CAF-AI-01
    - caf_pattern: CAF-POL-02
