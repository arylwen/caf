pattern_id: EXT-PRIVATE_CONNECTIVITY
name: Private Connectivity
summary: Keep PaaS/services private
intent: Keep PaaS/services private
context: Systems handling sensitive data and multiple services/identities across networks and environments.
problem: Implicit trust, broad permissions, and ad-hoc secret handling create high breach impact and compliance risk.
forces_tradeoffs: Security depth vs developer friction; least privilege vs operational agility; privacy vs usability.
solution_structure_behavior: A networking approach that keeps service endpoints off the public internet using private networks,
  VPC endpoints, private links, or service endpoints. It reduces exposure and can simplify compliance, but requires careful
  DNS/routing design and operational tooling for private access.
consequences: Reduced blast radius and better compliance; requires governance, tooling, and ongoing hygiene.
implementation_notes: Centralize identity, enforce least privilege, store secrets in a vault, keep services private by default,
  and automate policy checks.
examples_known_uses: Enterprise SaaS, healthcare/finance workloads, multi-tenant platforms.
related_patterns: |
  depends_on: OBS-01
  complements: CFG-01
  complements: CTX-01
  complements: POL-01
extended_definition: A networking approach that keeps service endpoints off the public internet using private networks, VPC
  endpoints, private links, or service endpoints. It reduces exposure and can simplify compliance, but requires careful DNS/routing
  design and operational tooling for private access.
