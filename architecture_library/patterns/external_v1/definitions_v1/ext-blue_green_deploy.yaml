pattern_id: EXT-BLUE_GREEN_DEPLOY
name: Blue/Green Deploy
summary: Two environments, switch traffic atomically
intent: Two environments, switch traffic atomically
context: Teams shipping frequently with high availability requirements and multiple environments.
problem: Risky deployments and environment drift lead to outages and slow delivery.
forces_tradeoffs: Speed vs safety; cost of parallel environments vs reduced downtime; flexibility vs standardization.
solution_structure_behavior: A release technique with two production environments (blue and green). Deploy and validate the
  new version in the idle environment, then switch traffic over in one step; rollback is a fast switch back. It requires careful
  handling of database/schema compatibility and shared resources.
consequences: Lower release risk and better repeatability; added pipeline and environment management overhead.
implementation_notes: Automate builds, use IaC, bake artifacts once, promote through environments, and use progressive delivery
  with fast rollback.
examples_known_uses: Zero-downtime deploys, regulated releases, multi-tenant SaaS releases.
related_patterns: |
  depends_on: OBS-01
  complements: CFG-01
  complements: CTX-01
  complements: POL-01
extended_definition: A release technique with two production environments (blue and green). Deploy and validate the new version
  in the idle environment, then switch traffic over in one step; rollback is a fast switch back. It requires careful handling
  of database/schema compatibility and shared resources.
