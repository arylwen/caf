    anchor: CAF_MANAGED_BLOCK markers
  - path: reference_architectures/<instance>/spec/playbook/application_spec_v1.md
    anchor: CAF_MANAGED_BLOCK markers
  failure_mode:
    symptom: ambiguous producer ownership or competing producer lore for the same block
    packet_or_gate: ownership drift; validator/gate behavior may diverge by surface
  lineage:
    origin_stage: execution
    derived_from: []
  current_status: partially_enforced
  docs_anchor_id: inv-caf-inv-playbook-block-single-owner
