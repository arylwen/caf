pattern_id: EXT-CONFIG_EXTERNALIZATION
name: Config Externalization
summary: Keep config outside binaries
intent: Keep config outside binaries
context: Teams shipping frequently with high availability requirements and multiple environments.
problem: Risky deployments and environment drift lead to outages and slow delivery.
forces_tradeoffs: Speed vs safety; cost of parallel environments vs reduced downtime; flexibility vs standardization.
solution_structure_behavior: A practice of keeping configuration separate from application binaries (environment variables, config files, config services). It enables the same artifact to run across environments and supports runtime configuration changes, while requiring disciplined versioning, validation, and secure handling of sensitive values.
consequences: Lower release risk and better repeatability; added pipeline and environment management overhead.
implementation_notes: Automate builds, use IaC, bake artifacts once, promote through environments, and use progressive delivery with fast rollback.
examples_known_uses: Zero-downtime deploys, regulated releases, multi-tenant SaaS releases.
related_patterns: |
  depends_on: OBS-01
  complements: CFG-01
  complements: CTX-01
  complements: POL-01
extended_definition: A practice of keeping configuration separate from application binaries (environment variables, config files, config services). It enables the same artifact to run across environments and supports runtime configuration changes, while requiring disciplined versioning, validation, and secure handling of sensitive values.
