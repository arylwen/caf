pattern_id: EXT-MULTI_REGION_ACTIVE_PASSIVE
name: Multi-Region Active/Passive
summary: DR standby
intent: DR standby
context: High availability and disaster recovery needs across regions and failure domains.
problem: Regional outages or data loss can take the system down without redundancy and recoverability.
forces_tradeoffs: Cost vs resilience; consistency vs multi-region performance; operational complexity vs RTO/RPO targets.
solution_structure_behavior: A disaster recovery design where one region is primary and another is on standby to take over
  during outages. It is typically simpler than active/active, but recovery time (RTO) and data loss tolerance (RPO) depend
  on replication and failover automation.
consequences: Improved uptime and recoverability; more complex data replication and failover testing.
implementation_notes: Define RTO/RPO, practice failover, automate backups, and validate restores regularly.
examples_known_uses: Critical SaaS platforms, regulated workloads, global customer bases.
related_patterns: |
  depends_on: OBS-01
  complements: CFG-01
  complements: CTX-01
  complements: POL-01
extended_definition: A disaster recovery design where one region is primary and another is on standby to take over during
  outages. It is typically simpler than active/active, but recovery time (RTO) and data loss tolerance (RPO) depend on replication
  and failover automation.
