$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "contura://caf/schemas/plane-domain-model/v1"
title: "CAF Phase 8 Plane Domain Model (v1)"
type: object
additionalProperties: false

required:
  - schema_version
  - plane_scope
  - generated_from
  - domain

properties:
  schema_version:
    type: string
    const: "phase8_plane_domain_model_v1"
    description: "Schema discriminator."

  generated_at:
    type: string
    description: "ISO-8601 timestamp (optional)."

  plane_scope:
    type: string
    enum: [application, system]
    description: "Human-facing plane scope for the derived model."

  generated_from:
    type: object
    additionalProperties: false
    required:
      - inputs
    properties:
      inputs:
        type: array
        minItems: 1
        items:
          type: string
          minLength: 1

  domain:
    type: object
    additionalProperties: false
    required:
      - summary
      - bounded_contexts
      - use_cases
    properties:
      summary:
        type: string
        minLength: 1
      bounded_contexts:
        type: array
        minItems: 1
        items:
          type: object
          additionalProperties: false
          required:
            - context_id
            - name
          properties:
            context_id:
              type: string
              pattern: "^[A-Z][A-Z0-9_]*$"
            name:
              type: string
              minLength: 1
            description:
              type: string
            aggregates:
              type: array
              items:
                type: object
                additionalProperties: false
                required:
                  - aggregate_id
                  - name
                  - persistence
                properties:
                  aggregate_id:
                    type: string
                    pattern: "^[A-Z][A-Z0-9_]*$"
                  name:
                    type: string
                    minLength: 1
                  description:
                    type: string
                  canonical:
                    type: object
                    additionalProperties: false
                    properties:
                      term_id:
                        type: string
                      status:
                        type: string
                        enum: [exact, alias, suggested, none]
                      matched_by:
                        type: string
                        enum: [alias_table, semantic_suggestion, architect_selected, none]
                      confidence:
                        type: number
                        minimum: 0
                        maximum: 1
                      aliases:
                        type: array
                        items:
                          type: string
                      note:
                        type: string
                  persistence:
                    type: object
                    additionalProperties: false
                    required:
                      - required
                    properties:
                      required:
                        type: boolean
                      storage_intent:
                        type: string
                        enum: [transactional_record, catalog_registry, audit_log, evidence_store, derived_cache, none]
                      notes:
                        type: string
                  entities:
                    type: array
                    minItems: 1
                    items:
                      type: object
                      additionalProperties: false
                      required:
                        - entity_id
                        - name
                        - fields
                      properties:
                        entity_id:
                          type: string
                          pattern: "^[A-Z][A-Z0-9_]*$"
                        name:
                          type: string
                          minLength: 1
                        description:
                          type: string
                        canonical:
                          type: object
                          additionalProperties: false
                          properties:
                            term_id:
                              type: string
                            status:
                              type: string
                              enum: [exact, alias, suggested, none]
                            matched_by:
                              type: string
                              enum: [alias_table, semantic_suggestion, architect_selected, none]
                            confidence:
                              type: number
                              minimum: 0
                              maximum: 1
                            aliases:
                              type: array
                              items:
                                type: string
                            note:
                              type: string
                        fields:
                          type: array
                          minItems: 1
                          items:
                            type: object
                            additionalProperties: false
                            required:
                              - name
                              - type
                              - required
                            properties:
                              name:
                                type: string
                                minLength: 1
                              type:
                                type: string
                                minLength: 1
                              required:
                                type: boolean
      use_cases:
        type: array
        minItems: 1
        items:
          type: object
          additionalProperties: false
          required:
            - use_case_id
            - title
            - intent
          properties:
            use_case_id:
              type: string
              pattern: "^UC-[A-Z0-9]+(?:-[A-Z0-9]+)*$"
            title:
              type: string
              minLength: 1
            intent:
              type: string
              minLength: 1
            primary_context_id:
              type: string
              pattern: "^[A-Z][A-Z0-9_]*$"
            touches_entities:
              type: array
              items:
                type: string
                minLength: 1

  api_candidates:
    type: object
    additionalProperties: false
    properties:
      resources:
        type: array
        items:
          type: object
          additionalProperties: false
          required:
            - name
          properties:
            name:
              type: string
              minLength: 1
            operations:
              type: array
              items:
                type: string
                enum: [list, get, create, update, delete]

  ui_surface_candidates:
    type: object
    additionalProperties: false
    properties:
      surfaces:
        type: array
        items:
          type: object
          additionalProperties: false
          required:
            - surface_id
            - kind
          properties:
            surface_id:
              type: string
              minLength: 1
            kind:
              type: string
              minLength: 1
            notes:
              type: string
