pattern_id: CAF-MRAD-01
name: MRAD-1 Idempotent Command Pattern
summary: Mobile-triggered state changes are retry-safe; duplicate submissions do not create duplicate effects.
intent: Make write operations safe under unreliable networks and client retries.
context: Mobile and constrained channels with intermittent connectivity and uncertain delivery outcomes.
problem: Clients retry requests under ambiguity, causing duplicate effects without idempotency controls.
forces_tradeoffs: Correctness vs storage/coordination overhead; strict deduplication vs throughput; client simplicity vs server
  complexity.
solution_structure_behavior: Introduce idempotency keys (or equivalent) for state-changing operations and ensure repeated
  submissions are recognized and handled deterministically.
consequences: Prevents duplicate side effects; requires key generation/storage/expiry policy and clear semantics on conflicts.
implementation_notes: Define idempotency scope (operation, tenant, principal); ensure keys are validated and stored durably
  for the retry window.
examples_known_uses: Payment-like operations, submissions, and workflow step execution from mobile clients.
related_patterns: |
  depends_on: EXT-IDEMPOTENCY
  complements: CAF-CH-01
  complements: CAF-MRAD-02
  complements: CAF-MRAD-04
  complements: CAF-MRAD-05
extended_definition: |
  This pattern ensures **mobile-triggered state changes are retry-safe** by requiring **idempotent execution** semantics.

  **Normative constraints**
  - Mobile-triggered state changes MUST be retry-safe.
  - Write operations MUST support idempotent execution (e.g., an idempotency key or equivalent).
  - Duplicate submissions MUST NOT create duplicate effects.
  - Clients MUST be able to safely retry under uncertain network outcomes.

  **Evidence hooks**
  - The API contract defines an idempotency mechanism (header/field) for relevant commands.
  - The server stores and enforces idempotency keys for the command scope.
  - Observability includes detection/metrics for duplicate submissions and idempotent replays.

  **Common failure modes**
  - Treating retries as “client bugs” and producing duplicate side effects.
  - Idempotency implemented only in the client (server remains non-idempotent).
  - Idempotency window or scope undefined, causing inconsistent outcomes.

