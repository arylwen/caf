  kind: decision_pattern
  option_sets:
  - option_set_id: iam.identity_context_propagation_mode
    description: How identity + tenant context is carried across plane boundaries and verified at each hop.
    options:
    - option_id: auth_claims
      summary: Verified auth claims (OIDC/JWT) carry identity + tenant context
      carrier_kind: auth_claim
      verification: signature+audience+issuer
    - option_id: signed_gateway_header
      summary: Trusted gateway injects a signed header (client cannot forge)
      carrier_kind: signed_header
      verification: gateway_signature
    - option_id: delegation_token
      summary: Explicit delegation token scoped to action + tenant + expiry
      carrier_kind: delegation_token
      verification: token_signature+scope_checks
    - option_id: message_envelope
      summary: Async message envelope carries signed identity context
      carrier_kind: message_envelope
      verification: signature+replay_protection
    - option_id: custom
      summary: Custom (fill details; prefer adopting a retrieved option when available)
    default_option_id: auth_claims
