pattern_id: CAF-IAM-02
name: Identity and Context Propagation
summary: Propagate principal identity and required context deterministically across boundaries and planes.
intent: Ensure downstream enforcement has complete, explicit inputs for deterministic policy evaluation.
context: Distributed workflows crossing service boundaries where missing identity/context would otherwise be inferred.
problem: Ambient or inferred identity/context yields inconsistent authz decisions and breaks auditability.
forces_tradeoffs: Completeness vs payload size/latency; strict rejection vs degraded availability when context is partially
  unavailable.
solution_structure_behavior: Define required identity/context carriers; validate at ingress and internal boundaries; reject
  when required fields are absent; ensure context includes tenant and principal attribution.
consequences: Improves determinism; requires consistent middleware and contract enforcement.
implementation_notes: Keep a minimal canonical context schema; version the schema; do not silently drop fields.
examples_known_uses: Propagating tenant ID + principal ID across workflow steps; ensuring DP access calls include principal
  and tenant context.
related_patterns: |
  depends_on: CAF-IAM-01
  depends_on: OBS-01
  complements: CAF-MODEL-01
  complements: CAF-PLANE-01
  complements: CAF-POL-02
  complements: CAF-TCTX-01
  complements: CAF-XPLANE-01
  complements: CAF-ZT-01
extended_definition: |
  **Normative constraints**

  - Identity and execution context **MUST** be established **explicitly at the earliest entry point** and then propagated end-to-end; context is established, **not guessed**.
  - Tenant context **MUST** be bound at entry and remain **immutable** for the lifetime of a request; downstream systems **MUST NOT** infer tenant/identity context implicitly.
  - Policy intent and delegation boundaries **MUST** be explicit: authoritative policy intent is owned by the Control Plane and enforcement authority is delegated explicitly.
  - Across planes, calls **MUST** be authenticated and authorized (no implicit trust). Least privilege applies to every principal.
  - Identity and tenant context **MUST** be present in critical telemetry (logs/traces) to support audit and investigation.

  **Cross-plane responsibilities (identity)**

  - **Control Plane:** governs identity primitives, trust relationships, tenant IdP integration patterns, and agent/service identity definitions and policies.
  - **Application Plane:** validates tokens issued under CP governance; applies authorization to tenant workflows; propagates identity into logs/traces and downstream calls.
  - **Data Plane:** enforces access at the data boundary (e.g., row/key scoping) and relies on AP/CP-established identity rather than re-authenticating end-users.

  **Evidence hooks**

  - Plane integration contracts specify required context fields (tenant_id, principal type/id, correlation/trace ids) and fail-closed behavior when missing.
  - Designs show how policy versions are distributed/bound to evaluations across AP/DP.

  **Common failure modes**

  - Losing or mutating tenant/principal context across hops; reconstructing identity from ambient fields.
  - Allowing downstream services to “reinterpret” policy intent or enforce without explicit delegation.
  - Cross-plane calls without strong authz/authn (implicit trust).

