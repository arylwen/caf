pattern_id: CAF-POL-03
name: Policy Decision Telemetry and Audit
summary: Require observability for policy evaluation, including decision lineage, inputs attribution, and outcomes.
intent: Make policy enforcement provable and debuggable, and prevent silent drift.
context: Systems where policy gates workflows, agent tool use, and data access.
problem: Unobserved policy evaluation creates non-determinism and makes it impossible to prove compliance or diagnose incidents.
forces_tradeoffs: Telemetry richness vs cost; logging sensitive context vs privacy and governance requirements.
solution_structure_behavior: Emit structured policy decision telemetry capturing policy version, scope, principal/tenant attribution,
  inputs summary, outcome, and correlation IDs; store auditable decision records where required.
consequences: Enables compliance and rapid debugging; requires retention/access controls and careful handling of sensitive
  attributes.
implementation_notes: Define minimal required fields; avoid logging raw sensitive inputs unless explicitly approved; ensure
  decision records are immutable.
examples_known_uses: Audit trail of allow/deny decisions for sensitive operations; tracing policy gating through workflows.
related_patterns: |
  depends_on: CAF-IAM-03
  depends_on: CAF-POL-02
  depends_on: OBS-01
  complements: CAF-AI-01
  complements: CAF-ZT-01
extended_definition: |
  This pattern makes policy enforcement **provable and debuggable** by requiring **decision-level evidence** and auditability.

  **Normative constraints**
  - Every policy evaluation MUST emit structured decision telemetry (not ad-hoc logs).
  - Decision evidence MUST include: policy identifier + version, outcome, enforcement action, tenant + principal scope, timestamp, and plane.
  - Evaluation inputs SHOULD be recorded as **hashed or referenced** identifiers (avoid raw sensitive payloads unless explicitly approved).

  **Responsibilities and boundaries**
  - Application Plane is the primary runtime evaluation/enforcement surface: it MUST invoke evaluation deterministically, provide complete context, enforce outcomes consistently, and reject execution when context is missing.
  - Application Plane MUST NOT bypass evaluation or cache outcomes without binding to policy version.
  - Data Plane SHOULD emit immutable, tenant-scoped audit records for data-level enforcement where applicable.

  **Evidence hooks**
  - Spec/design defines a minimal decision record schema (fields above) and redaction/retention/access controls.
  - Policy versions are referenced from telemetry/audit records, enabling rollout/rollback attribution.
  - Correlation IDs connect policy decisions to workflow steps, tool calls, and downstream data operations.

  **Common failure modes (explicitly forbidden)**
  - Missing policy telemetry / “best-effort” enforcement.
  - Policy evaluated without tenant/principal context.
  - Unversioned policy changes or outcome caching that is not version-bound.

