$schema: https://json-schema.org/draft/2020-12/schema
$title: CAF Core Pattern Index Schema v1
$type: object
additionalProperties: false
required:
- index_version
- patterns
properties:
  index_version:
    type: string
    const: core_pattern_index_v1
  patterns:
    type: array
    minItems: 1
    items:
      type: object
      additionalProperties: false
      required:
      - pattern_id
      - name
      - applies_when
      - source_path
      - definition_path
      - trigger_entry_id
      properties:
        pattern_id:
          type: string
          pattern: ^[A-Z]{3}-[0-9]{2}$
        name:
          type: string
        applies_when:
          type: string
        source_path:
          type: string
          pattern: ^architecture_library/patterns/core_v1/patterns/.+\.md$
        definition_path:
          type: string
          pattern: ^architecture_library/patterns/core_v1/definitions_v1/.+\.yaml$
        trigger_entry_id:
          type: string
          pattern: ^TRG-[A-Z]{3}-[0-9]{2}$
