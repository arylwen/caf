pattern_id: EXT-ANTI_CORRUPTION_LAYER
name: Anti-corruption Layer
summary: Adapter layer to isolate domain from external systems
intent: Protect your domain model by translating/isolating external system concepts
  at the boundary.
context: Integrations with clearinghouses, payers, legacy ERPs, or third-party APIs
  with incompatible models or semantics.
problem: External schemas and behaviors leak into your core domain, increasing coupling
  and making future change expensive.
forces_tradeoffs: Purity of domain vs additional translation code; correctness vs
  performance; short-term delivery vs long-term maintainability.
solution_structure_behavior: A boundary layer that translates between external systems’
  models/protocols and your internal domain model. It prevents foreign concepts from
  leaking into core code by providing mapping, validation, and normalization, which
  reduces coupling and makes future replacements easier.
consequences: Keeps domain clean and change-friendly; adds mapping/validation overhead
  and requires careful contract testing.
implementation_notes: Define a canonical internal model. Implement adapters/mappers
  + contract tests. Track external versioning explicitly.
examples_known_uses: EDI/HL7 adapters; payment provider adapters; legacy DB schema
  translation layer.
related_patterns: |
  depends_on: OBS-01
  complements: CFG-01
  complements: CTX-01
  complements: POL-01
extended_definition: A boundary layer that translates between external systems’ models/protocols
  and your internal domain model. It prevents foreign concepts from leaking into core
  code by providing mapping, validation, and normalization, which reduces coupling
  and makes future replacements easier.
