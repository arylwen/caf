pattern_id: EXT-OUTBOX_PATTERN
name: Outbox Pattern
summary: Atomic DB write + event publish reliability
intent: Reliably publish events when the source of truth is a database write.
context: Distributed systems with unreliable networks and variable load; async workflows and integrations.
problem: Synchronous chaining and naive retries cause cascading failures, duplicate side effects, and poor elasticity under
  spikes.
forces_tradeoffs: Consistency vs availability; throughput vs ordering; retry aggressiveness vs dependency protection; simplicity
  vs correctness.
solution_structure_behavior: "A reliability pattern that records an outgoing event in an \u2018outbox\u2019 table within the\
  \ same database transaction as the business update. A separate publisher then reads the outbox and publishes events to the\
  \ broker, ensuring no lost messages and providing a replayable audit trail."
consequences: More resilient and scalable workflows; more components and operational complexity (queues, topics, retries,
  replays).
implementation_notes: Design for at-least-once delivery, idempotency, backoff+jitter, DLQs, and clear ownership for replay/compensation.
examples_known_uses: Order/payment workflows, event streams, background processing, third-party integration pipelines.
related_patterns: |
  depends_on: OBS-01
  complements: CAF-MRAD-05
  complements: CTX-01
  complements: POL-01
extended_definition: |
  A reliability pattern that records an outgoing event in an ‘outbox’ table within the same database transaction as the business update. A separate publisher then reads the outbox and publishes events to the broker, ensuring no lost messages and providing a replayable audit trail.


