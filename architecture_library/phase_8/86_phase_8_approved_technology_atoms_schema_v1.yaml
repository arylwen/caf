$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "contura://caf/schemas/phase8_approved_technology_atoms/v1"
title: "CAF Phase 8 Approved Technology Atoms (v1)"
type: object
additionalProperties: false

required:
  - schema_version
  - providers
  - runtimes
  - databases
  - deployments
  - iac_tools
  - ci_systems
  - observability_postures

properties:
  schema_version:
    type: string
    const: "phase8_approved_technology_atoms_v1"

  providers:
    type: array
    minItems: 1
    uniqueItems: true
    items:
      type: string
      enum: ["aws", "gcp", "azure", "local"]

  runtimes:
    type: object
    additionalProperties: false
    required: [languages, frameworks]
    properties:
      languages:
        type: array
        minItems: 1
        uniqueItems: true
        items:
          type: string
          enum: ["python", "typescript", "go", "java"]
      frameworks:
        type: array
        minItems: 1
        uniqueItems: true
        items:
          type: string
          enum: ["fastapi", "flask", "django", "express", "nestjs", "gin", "spring_boot", "none"]

  persistence:
    description: "Optional persistence access layer atoms (e.g., ORM posture)."
    type: object
    additionalProperties: false
    required: [orms]
    properties:
      orms:
        type: array
        minItems: 1
        uniqueItems: true
        items:
          type: string
          enum: ["none", "raw_sql", "sqlalchemy_orm", "sqlalchemy_core", "django_orm"]

  databases:
    description: "Persistent stateful stores (SQL, NoSQL, Vector, Search) representing the Data Plane storage layer."
    type: array
    minItems: 1
    uniqueItems: true
    items:
      type: string
      enum: ["postgresql", "mysql", "sqlite", "dynamodb", "spanner", "bigtable", "bigquery", "azure_ai_search", "aws_kendra", "none"]

  deployments:
    type: object
    additionalProperties: false
    required: [modes, targets]
    properties:
      modes:
        type: array
        minItems: 1
        uniqueItems: true
        items:
          type: string
          enum: ["container_service", "kubernetes", "serverless", "docker_compose", "podman_compose", "none"]
      targets:
        type: array
        minItems: 1
        uniqueItems: true
        items:
          type: string
          enum:
            - "ecs_fargate"
            - "eks"
            - "lambda"
            - "cloud_run"
            - "gke"
            - "cloud_functions"
            - "container_apps"
            - "aks"
            - "functions"
            - "docker_compose"
            - "podman_compose"
            - "localstack"

  iac_tools:
    type: array
    minItems: 1
    uniqueItems: true
    items:
      type: string
      enum: ["terraform", "cdk", "pulumi", "none"]

  ci_systems:
    type: array
    minItems: 1
    uniqueItems: true
    items:
      type: string
      enum: ["github_actions", "gitlab_ci", "none"]

  observability_postures:
    type: array
    minItems: 1
    uniqueItems: true
    items:
      type: string
      enum: ["opentelemetry", "cloud_native", "none"]
