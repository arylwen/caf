pattern_id: CAF-MODEL-01
name: Deprecated bridge — Architecture Style Selection (superseded by ABP family)
summary: Legacy compatibility bridge retained for older traces. New derivations must select architecture style via profile_parameters.yaml and resolve through the ABP family.
intent: Preserve backward compatibility while retiring pattern-owned architecture-style selection from primary CAF derivation surfaces.
context: Legacy CAF traces and specs that still reference CAF-MODEL-01 from the pre-ABP era.
problem: CAF-MODEL-01 mixed architecture style, plane interpretation, and derivation semantics in one CAF pattern, which blurred the intended separation between style, plane placement, and contracts.
forces_tradeoffs: Compatibility for existing traces vs keeping new derivations clean and strategically separated.
solution_structure_behavior: "**Compatibility posture**

- Keep CAF-MODEL-01 only as a legacy bridge for old traces and migrated specs.
- Do not use CAF-MODEL-01 as the primary style selection mechanism for new work.
- New derivations must select `architecture.architecture_style` in `profile_parameters.yaml` and resolve through the ABP catalog.
- Plane placement belongs to PBPs; cross-plane semantics belong to plane integration contracts; technology realization belongs to TBPs.
"
consequences: Reduces semantic blur for new work while preserving a migration path for older instances.
implementation_notes: 'When encountering legacy CAF-MODEL-01 decisions, preserve them for traceability but migrate the effective style selection to `profile_parameters.yaml -> architecture.architecture_style` and ABP resolution.'
examples_known_uses: Legacy CAF instances created before ABPs became first-class Phase 8 artifacts.
related_patterns: |
  complements: CAF-PLANE-01
  complements: CAF-XPLANE-01
  complements: PST-01
extended_definition: This bridge exists only to avoid breaking older traces immediately. New architecture style selection is owned by the ABP artifact family and the architecture style pin in profile parameters.
source_documents:
- path: architecture_library/phase_8/98_phase_8_architecture_binding_patterns_standard_v1.md
  sections:
  - Purpose
caf:
  layer: caf
  verifiability: plan_ready
  plane: both
  default_anchor_policy: requires_explicit_design_decision
  allowed_anchor_types:
  - checklist_item
  - caf_pattern
  - core_pattern
  - tbp
  - rail
  default_anchor:
    anchor_type: checklist_item
    anchor_id: REQUIRES_HUMAN_DECISION_ID
  minimum_evidence:
  - Legacy spec/design content still references CAF-MODEL-01.
  decision_prompts:
  - For legacy instances only, migrate effective style selection to `architecture.architecture_style` and ABP resolution.
  definition_of_done:
  - Legacy references are preserved or migrated without reintroducing CAF-MODEL-01 as a first-class new derivation input.
  capabilities_needed: []
  forbidden_assumptions:
  - Do not use CAF-MODEL-01 as the primary architecture style selector for new instances.
  - Do not encode plane interpretations here.
  - Do not encode technology or path mapping here.
  kind: decision_pattern
