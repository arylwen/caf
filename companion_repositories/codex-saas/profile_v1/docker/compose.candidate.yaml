# CAF_TRACE: generated_by=Contura Architecture Framework (CAF)
# CAF_TRACE: task_id=UX-TG-92-ux-service-packaging
# CAF_TRACE: capability=ux_service_packaging_wiring
# CAF_TRACE: instance=codex-saas
# CAF_TRACE: trace_anchor=pattern_id:deployment:docker_compose

name: codex-saas

services:
  postgres:
    image: postgres:16-alpine
    env_file:
      - ../.env
    environment:
      POSTGRES_DB: codex_saas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d codex_saas"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  cp:
    build:
      context: ..
      dockerfile: docker/Dockerfile.cp
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/codex_saas
      CP_POLICY_BASE_URL: http://cp:8001
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8001:8001"

  ap:
    build:
      context: ..
      dockerfile: docker/Dockerfile.ap
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/codex_saas
      CP_POLICY_BASE_URL: http://cp:8001
    depends_on:
      postgres:
        condition: service_healthy
      cp:
        condition: service_started
    ports:
      - "8000:8000"

  ui:
    build:
      context: ..
      dockerfile: docker/Dockerfile.ui
    env_file:
      - ../.env
    depends_on:
      ap:
        condition: service_started
      cp:
        condition: service_started
    ports:
      - "8080:80"

  ux:
    build:
      context: ..
      dockerfile: docker/Dockerfile.ux
    env_file:
      - ../.env
    depends_on:
      ap:
        condition: service_started
      cp:
        condition: service_started
    ports:
      - "8081:80"

volumes:
  postgres_data: {}
