pattern_id: EXT-RATE_LIMITING_QUOTAS
name: Rate Limiting / Quotas
summary: Prevent abuse and runaway costs
intent: Protect services and budgets by limiting request rates per client/tenant/key.
context: Distributed systems with unreliable networks and variable load; async workflows and integrations.
problem: Synchronous chaining and naive retries cause cascading failures, duplicate side effects, and poor elasticity under
  spikes.
forces_tradeoffs: Consistency vs availability; throughput vs ordering; retry aggressiveness vs dependency protection; simplicity
  vs correctness.
solution_structure_behavior: Controls that cap request rate or total usage per identity, API key, tenant, or resource. Rate
  limits protect availability and cost; quotas manage longer-term consumption. Effective designs define burst behavior, return
  clear errors (e.g., 429), and provide monitoring and override processes.
consequences: More resilient and scalable workflows; more components and operational complexity (queues, topics, retries,
  replays).
implementation_notes: Design for at-least-once delivery, idempotency, backoff+jitter, DLQs, and clear ownership for replay/compensation.
examples_known_uses: Order/payment workflows, event streams, background processing, third-party integration pipelines.
related_patterns: |
  depends_on: OBS-01
  complements: CFG-01
  complements: CTX-01
  complements: POL-01
extended_definition: Controls that cap request rate or total usage per identity, API key, tenant, or resource. Rate limits
  protect availability and cost; quotas manage longer-term consumption. Effective designs define burst behavior, return clear
  errors (e.g., 429), and provide monitoring and override processes.
