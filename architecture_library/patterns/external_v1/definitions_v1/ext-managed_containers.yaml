  - Manual server management and stateful designs hinder scaling, resilience, and
    deployment velocity.
  definition_of_done:
  - Verify that a container runtime platform where the provider manages orchestration,
    patching, and scaling mechanics so teams run containers without operating a Kubernetes
    control plane.
  capabilities_needed:
