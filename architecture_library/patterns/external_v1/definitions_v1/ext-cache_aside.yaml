pattern_id: EXT-CACHE_ASIDE
name: Cache-Aside
summary: App-managed caching strategy
intent: App-managed caching strategy
context: Systems needing low-latency reads, scalable storage, and fit-for-purpose data models.
problem: One-size-fits-all persistence and modeling leads to slow reads, complex queries, and scaling bottlenecks.
forces_tradeoffs: Duplication vs performance; consistency vs speed; operational burden vs specialization benefits.
solution_structure_behavior: A caching approach where the application checks the cache first; on a miss it loads from the
  source of truth and populates the cache. It is simple and widely used, but must handle invalidation (TTL vs explicit), cache
  stampedes, and consistency expectations.
consequences: Better performance and clearer models; more data stores/projections to manage.
implementation_notes: Start with simple caching/projections, measure hotspots, and introduce specialized stores/projections
  incrementally.
examples_known_uses: Read-heavy dashboards, search/catalog, reporting projections.
related_patterns: |
  depends_on: OBS-01
  complements: CFG-01
  complements: CTX-01
  complements: POL-01
extended_definition: A caching approach where the application checks the cache first; on a miss it loads from the source of
  truth and populates the cache. It is simple and widely used, but must handle invalidation (TTL vs explicit), cache stampedes,
  and consistency expectations.
