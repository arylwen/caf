pattern_id: CTX-01
name: Request Context and Propagation
summary: Establish a request-scoped context that carries identity, tenancy, and correlation
  metadata and ensure it is available to all layers handling the request.
intent: Establish a request-scoped context that carries identity, tenancy, and correlation
  metadata and ensure it is available to all layers handling the request.
context: This pattern applies when the spec or design implies multi-user behavior,
  multi-tenancy, auditing, or correlation. CAF's identity core requires tenant_id,
  user_id, and user_name, and the design must ensure these values are established
  at the application boundary and propagated through internal calls.
problem: Without a standard request context propagated through call flows, identity/tenant/request
  metadata becomes inconsistent or implicit, causing incorrect scoping, weak auditing,
  and policy enforcement gaps across module boundaries.
forces_tradeoffs: '- Passing context explicitly vs convenience of hidden global/thread-local
  state.

  - Immutability of primary context values vs need to enrich context (e.g., sub-span
  IDs).

  - Uniform propagation vs performance/verbosity overhead in interfaces.'
solution_structure_behavior: 'Introduces module roles: context_boundary; context_object;
  context_access_api


  Allowed dependencies: application_boundary may create or populate context_object;
  domain_core may read context via context_access_api; infrastructure_adapters may
  read context for tagging logs, queries, or outbound calls; no module may infer tenant
  or user identity from ad hoc globals.


  Assembly contract: The application boundary establishes a context instance per request.
  Downstream modules access context via a stable access API (explicit parameter passing
  or an equivalent scoped access mechanism declared in the module plan). Context propagation
  is mandatory for all operations that touch tenant-scoped data or user-scoped policy
  decisions.'
consequences: Context propagation is the minimal, stack-independent mechanism to preserve
  tenant isolation, policy enforcement inputs, and correlation across layers without
  relying on framework-specific behavior.
implementation_notes: See required evidence hooks, structural validations, and plan
  step archetypes in this definition. Legacy pattern IDs from core inventory (ASM-*/BND-*/DAT-*)
  are not yet published as core_v1 definitions; related_patterns point to canonical
  implemented core IDs only.
examples_known_uses: Typical in web APIs where each request carries identity/tenant
  and a request ID that must be available to authorization, logging, and persistence
  scoping.
