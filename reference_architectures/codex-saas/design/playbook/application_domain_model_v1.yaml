schema_version: phase8_plane_domain_model_v1
plane_scope: application
generated_from:
  inputs:
    - reference_architectures/codex-saas/spec/playbook/application_spec_v1.md
    - reference_architectures/codex-saas/spec/playbook/application_domain_model_v1.md
domain:
  summary: Tenant-scoped widget management with collaboration, sharing, tenant administration, and activity audit.
  bounded_contexts:
    - context_id: WIDGET_CATALOG
      name: Widget Catalog
      aggregates:
        - aggregate_id: WIDGET
          name: Widget
          persistence:
            required: true
            storage_intent: transactional_record
          entities:
            - entity_id: WIDGET
              name: Widget
              fields:
                - name: tenant_id
                  type: string
                  required: true
                - name: widget_id
                  type: string
                  required: true
                - name: title
                  type: string
                  required: true
                - name: description
                  type: string
                  required: true
                - name: status
                  type: enum(draft|published|archived)
                  required: true
                - name: current_version_id
                  type: string
                  required: true
                - name: created_at
                  type: datetime
                  required: true
                - name: updated_at
                  type: datetime
                  required: true
                - name: created_by_user_id
                  type: string
                  required: true
            - entity_id: WIDGET_VERSION
              name: Widget Version
              fields:
                - name: tenant_id
                  type: string
                  required: true
                - name: widget_id
                  type: string
                  required: true
                - name: version_id
                  type: string
                  required: true
                - name: payload
                  type: json
                  required: true
                - name: created_at
                  type: datetime
                  required: true
                - name: created_by_user_id
                  type: string
                  required: true
    - context_id: ORG_AND_SHARING
      name: Organization and Sharing
      aggregates:
        - aggregate_id: COLLECTION
          name: Collection
          persistence:
            required: true
            storage_intent: transactional_record
          entities:
            - entity_id: COLLECTION
              name: Collection
              fields:
                - name: tenant_id
                  type: string
                  required: true
                - name: collection_id
                  type: string
                  required: true
                - name: name
                  type: string
                  required: true
                - name: description
                  type: string
                  required: true
                - name: published
                  type: boolean
                  required: true
                - name: created_at
                  type: datetime
                  required: true
                - name: updated_at
                  type: datetime
                  required: true
            - entity_id: COLLECTION_MEMBERSHIP
              name: Collection Membership
              fields:
                - name: tenant_id
                  type: string
                  required: true
                - name: collection_id
                  type: string
                  required: true
                - name: widget_id
                  type: string
                  required: true
                - name: added_at
                  type: datetime
                  required: true
            - entity_id: COLLECTION_PERMISSION
              name: Collection Permission
              fields:
                - name: tenant_id
                  type: string
                  required: true
                - name: collection_id
                  type: string
                  required: true
                - name: role_id
                  type: string
                  required: true
                - name: permission
                  type: enum(view|edit)
                  required: true
                - name: granted_at
                  type: datetime
                  required: true
            - entity_id: TAG
              name: Tag
              fields:
                - name: tenant_id
                  type: string
                  required: true
                - name: tag_id
                  type: string
                  required: true
                - name: label
                  type: string
                  required: true
                - name: created_at
                  type: datetime
                  required: true
    - context_id: TENANT_ADMIN
      name: Tenant Administration
      aggregates:
        - aggregate_id: USER_ROLE_ASSIGNMENT
          name: User Role Assignment
          persistence:
            required: true
            storage_intent: transactional_record
          entities:
            - entity_id: USER_ROLE_ASSIGNMENT
              name: User Role Assignment
              fields:
                - name: tenant_id
                  type: string
                  required: true
                - name: user_id
                  type: string
                  required: true
                - name: role_id
                  type: string
                  required: true
                - name: assigned_at
                  type: datetime
                  required: true
                - name: assigned_by_user_id
                  type: string
                  required: true
        - aggregate_id: TENANT_SETTING
          name: Tenant Setting
          persistence:
            required: true
            storage_intent: transactional_record
          entities:
            - entity_id: TENANT_SETTING
              name: Tenant Setting
              fields:
                - name: tenant_id
                  type: string
                  required: true
                - name: setting_key
                  type: string
                  required: true
                - name: setting_value
                  type: string|json
                  required: true
                - name: updated_at
                  type: datetime
                  required: true
                - name: updated_by_user_id
                  type: string
                  required: true
    - context_id: ACTIVITY_AUDIT
      name: Activity and Audit
      aggregates:
        - aggregate_id: ACTIVITY_EVENT
          name: Activity Event
          persistence:
            required: true
            storage_intent: audit_log
          entities:
            - entity_id: ACTIVITY_EVENT
              name: Activity Event
              fields:
                - name: tenant_id
                  type: string
                  required: true
                - name: event_id
                  type: string
                  required: true
                - name: event_type
                  type: string
                  required: true
                - name: actor_user_id
                  type: string
                  required: true
                - name: target_type
                  type: string
                  required: true
                - name: target_id
                  type: string
                  required: true
                - name: occurred_at
                  type: datetime
                  required: true
                - name: metadata
                  type: json
                  required: true
  use_cases:
    - use_case_id: UC-CREATE-UPDATE-WIDGET
      title: Create or update widget
      intent: Allow team members to author and revise widgets within tenant scope.
      primary_context_id: WIDGET_CATALOG
      touches_entities:
        - Widget
        - Widget Version
        - Activity Event
    - use_case_id: UC-ORGANIZE-WIDGETS
      title: Organize widgets with tags and collections
      intent: Allow team leads to structure widget catalog for discoverability.
      primary_context_id: ORG_AND_SHARING
      touches_entities:
        - Widget
        - Tag
        - Collection
        - Collection Membership
        - Activity Event
    - use_case_id: UC-PUBLISH-COLLECTION
      title: Publish collection to tenant roles
      intent: Allow controlled sharing of curated widget sets within tenant.
      primary_context_id: ORG_AND_SHARING
      touches_entities:
        - Collection
        - Collection Permission
        - User Role Assignment
        - Activity Event
    - use_case_id: UC-MANAGE-TENANT
      title: Manage tenant roles and settings
      intent: Allow tenant admins to manage access model and core tenant configuration.
      primary_context_id: TENANT_ADMIN
      touches_entities:
        - User Role Assignment
        - Tenant Setting
        - Activity Event
api_candidates:
  resources:
    - name: widgets
      operations: [list, get, create, update, delete]
    - name: widget_versions
      operations: [list]
    - name: collections
      operations: [list, get, create, update]
    - name: tags
      operations: [list, create]
    - name: collection_permissions
      operations: [list, create, update]
    - name: tenant_users_roles
      operations: [list, create, delete]
    - name: tenant_settings
      operations: [get, update]
    - name: activity_events
      operations: [list]
