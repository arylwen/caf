    default_option_id: serve_cached_or_stale
  human_questions:
  - question_key: resilience_degradation_strategy
    question_id: Q-EXT-GD-01
    question: Which graceful degradation strategy should be used under stress or dependency failure?
    description: Choose a degradation strategy (serve cached/stale, shed features, or return partial results) to preserve
      core journeys.
    option_set_id: resilience.degradation_strategy
    specialization_notes:
    - Use when tail latency or dependency failures are expected and user journeys can tolerate reduced fidelity.
