pattern_id: EXT-CHOREOGRAPHY
name: Choreography
summary: Services coordinate via events (no central controller)
intent: Let services coordinate a workflow through events without a central controller.
context: Distributed systems with unreliable networks and variable load; async workflows and integrations.
problem: Synchronous chaining and naive retries cause cascading failures, duplicate side effects, and poor elasticity under
  spikes.
forces_tradeoffs: Consistency vs availability; throughput vs ordering; retry aggressiveness vs dependency protection; simplicity
  vs correctness.
solution_structure_behavior: A coordination style where services react to events and publish new events, with no single controller
  dictating the flow. It enables loose coupling and independent evolution, but can be harder to reason about end-to-end behavior
  and requires strong event contracts and tracing.
consequences: More resilient and scalable workflows; more components and operational complexity (queues, topics, retries,
  replays).
implementation_notes: Design for at-least-once delivery, idempotency, backoff+jitter, DLQs, and clear ownership for replay/compensation.
examples_known_uses: Order/payment workflows, event streams, background processing, third-party integration pipelines.
related_patterns: |
  depends_on: OBS-01
  complements: CFG-01
  complements: CTX-01
  complements: POL-01
extended_definition: A coordination style where services react to events and publish new events, with no single controller
  dictating the flow. It enables loose coupling and independent evolution, but can be harder to reason about end-to-end behavior
  and requires strong event contracts and tracing.
