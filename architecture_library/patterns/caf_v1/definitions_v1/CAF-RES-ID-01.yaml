  - persistence_schema
  forbidden_assumptions:
  - No persistence technology or API framework selection implied by this pattern.
  kind: decision_pattern
  option_sets:
  - option_set_id: resource.identifier_strategy
    description: Common tenant-scoped resource identifier + addressing candidates.
    options:
    - option_id: opaque_server_uuid_path
      summary: Opaque server-assigned UUID; tenant-scoped REST path.
      id_kind: opaque_server_assigned
      id_type: uuid
      addressing_scheme: /tenants/{tenant_id}/<resource_plural>/{resource_id}
    - option_id: opaque_server_ulid_path
      summary: Opaque server-assigned ULID; tenant-scoped REST path.
      id_kind: opaque_server_assigned
      id_type: ulid
      addressing_scheme: /tenants/{tenant_id}/<resource_plural>/{resource_id}
    - option_id: natural_key_path
      summary: Natural key per tenant; tenant-scoped REST path.
      id_kind: natural_key
      id_type: string
      addressing_scheme: /tenants/{tenant_id}/<resource_plural>/{resource_key}
    - option_id: custom
      summary: Custom (fill fields).
      id_kind: ''
      id_type: ''
      addressing_scheme: ''
    default_option_id: opaque_server_uuid_path
  human_questions:
  - question_key: primary_resource_identifier
    question_id: Q-AP-RES-IDENT-01
    question: What is the stable identifier strategy and addressing scheme for the primary resource (tenant-scoped id semantics)?
    description: Select the identifier strategy for the primary application resource; specialize placeholders to that resource.
    option_set_id: resource.identifier_strategy
    specialization_notes:
    - Specialize <resource_plural> placeholders to the resource name from application_spec_v1.md (e.g., widgets).
    - 'If multiple resources exist, either: (a) emit one question per resource, or (b) emit one question for the highest-risk
      / externally-addressable resource.'
    anchors:
    - caf_pattern: CAF-RES-ID-01
