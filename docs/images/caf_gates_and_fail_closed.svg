<svg xmlns="http://www.w3.org/2000/svg" width="940" height="780" viewBox="0 0 940 780" role="img" aria-label="CAF gates and fail-closed">

<style>
  .title { font: 700 22px Arial, Helvetica, sans-serif; fill: #0f172a; }
  .subtitle { font: 400 12px Arial, Helvetica, sans-serif; fill: #334155; }
  .box { fill: #ffffff; stroke: #475569; stroke-width: 2; rx: 14; ry: 14; }
  .accent { fill: #eff6ff; stroke: #2563eb; stroke-width: 2; rx: 14; ry: 14; }
  .side { fill: #fff7ed; stroke: #c2410c; stroke-width: 2; rx: 12; ry: 12; }
  .ok { fill: #ecfdf5; stroke: #15803d; stroke-width: 2; rx: 14; ry: 14; }
  .warn { fill: #fff1f2; stroke: #be123c; stroke-width: 2; rx: 14; ry: 14; }
  .label { font: 700 18px Arial, Helvetica, sans-serif; fill: #0f172a; }
  .small { font: 400 12px Arial, Helvetica, sans-serif; fill: #334155; }
  .arrow { stroke: #475569; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
  .dashed { stroke-dasharray: 7 6; }
  .note { font: 700 13px Arial, Helvetica, sans-serif; fill: #9a3412; }
</style>

<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
  </marker>
</defs>
<rect width="100%" height="100%" fill="#f8fafc" />
<text x="470" y="36" class="title" text-anchor="middle">CAF gates and fail-closed</text><text x="470" y="58" class="subtitle" text-anchor="middle">Pass work moves forward. Failing work is blocked and routed into remediation.</text><rect x="120" y="100" width="280" height="74" class="accent" /><text x="260" y="145" class="label" text-anchor="middle">Approved Architecture</text><rect x="120" y="220" width="280" height="74" class="box" /><text x="260" y="265" class="label" text-anchor="middle">Obligations / Constraints</text><rect x="540" y="220" width="240" height="74" class="box" /><text x="660" y="265" class="label" text-anchor="middle">Proposed Work / Change</text><polygon points="470,350 600,450 470,550 340,450" class="box" /><text x="470" y="445" class="label" text-anchor="middle">Gate Check</text><rect x="120" y="630" width="220" height="70" class="ok" /><text x="230" y="673" class="label" text-anchor="middle">Proceed</text><rect x="520" y="610" width="270" height="82" class="warn" /><text x="655" y="652" class="label" text-anchor="middle">Blocked +<tspan x="655" dy="20">Feedback Packet</tspan></text><rect x="520" y="710" width="270" height="54" class="box" /><text x="655" y="743" class="small" text-anchor="middle">Fix and Retry</text><line x1="260" y1="174" x2="260" y2="220" class="arrow" /><polyline points="260,294 260,450 340,450" class="arrow" /><polyline points="660,294 660,450 600,450" class="arrow" /><polyline points="390,540 390,665 340,665" class="arrow" /><polyline points="550,540 655,540 655,610" class="arrow" /><line x1="655" y1="692" x2="655" y2="710" class="arrow" /><polyline points="520,737 430,737 430,520" class="arrow" /><text x="315" y="602" class="small" text-anchor="middle">pass</text><text x="625" y="585" class="small" text-anchor="middle">fail</text></svg>