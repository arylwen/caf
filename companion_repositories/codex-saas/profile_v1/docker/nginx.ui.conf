# CAF_TRACE: generated_by=Contura Architecture Framework (CAF) | task_id=TG-90-runtime-wiring | capability=runtime_wiring | instance=codex-saas | trace_anchor=pattern_obligation_id:O-TBP-UI-REACT-VITE-01-ui-nginx-proxy
server {
  listen 80;
  server_name _;

  location / {
    root /usr/share/nginx/html;
    try_files $uri $uri/ /index.html;
  }

  location /api/ {
    proxy_pass http://ap:8000/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

