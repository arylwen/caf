pattern_id: EXT-CQRS
name: CQRS
summary: Separate the read model from the write model
intent: Optimize reads and writes independently by separating command and query models.
context: Read-heavy systems; complex write invariants; need specialized read projections or different scaling characteristics.
problem: 'A single data model is forced to serve conflicting needs: transactional integrity for writes and fast, denormalized
  reads.'
forces_tradeoffs: Simplicity vs scalability; strong consistency vs projection lag; duplication vs performance.
solution_structure_behavior: Command Query Responsibility Segregation separates write operations (commands) from read operations
  (queries), often using different models or data stores. This enables read scalability and optimized projections, but introduces
  complexity around synchronization, consistency, and operational overhead.
consequences: Faster reads and clearer write invariants; additional complexity (projections, eventual consistency, more storage).
implementation_notes: Start small with one projection. Use events/outbox to build read models. Define consistency expectations
  (staleness budgets).
examples_known_uses: E-commerce catalog/search vs order writes; reporting dashboards backed by projections.
related_patterns: |
  depends_on: OBS-01
  complements: CAF-MRAD-03
  complements: CTX-01
  complements: POL-01
extended_definition: |
  Command Query Responsibility Segregation separates write operations (commands) from read operations (queries), often using different models or data stores. This enables read scalability and optimized projections, but introduces complexity around synchronization, consistency, and operational overhead.


