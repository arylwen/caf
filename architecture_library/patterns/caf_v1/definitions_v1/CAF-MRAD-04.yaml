pattern_id: CAF-MRAD-04
name: MRAD-4 Coarse-Grained Interaction Pattern
summary: Avoid chatty sequences on critical paths by using coarse-grained operations and server-side aggregation.
intent: Reduce round trips and failure surfaces for constrained channels.
context: Mobile/voice channels where many small calls amplify latency and error probability.
problem: Chatty interactions require many round trips, leading to poor performance and higher failure rates.
forces_tradeoffs: API granularity vs flexibility; server aggregation cost vs client simplicity; reuse of generic endpoints
  vs tailored read models.
solution_structure_behavior: Express workflows as coarse-grained operations; shape read models for screen-level needs; aggregate
  server-side rather than requiring many client calls.
consequences: Improves UX and reliability; may increase endpoint count or introduce specialized read models.
implementation_notes: Use explicit contracts for aggregated responses; ensure consistent authorization and tenant scoping
  across aggregated data.
examples_known_uses: "Mobile \u201Cscreen load\u201D endpoints; workflow step endpoints that return updated state summary."
related_patterns: |
  complements: CAF-CH-01
  complements: CAF-MRAD-01
  complements: CAF-MRAD-02
  complements: CAF-MRAD-03
  complements: EXT-API_COMPOSITION_AGGREGATOR
  complements: EXT-BACKEND_FOR_FRONTEND_BFF
extended_definition: |
  This pattern reduces **chatty mobile interactions** by requiring **coarse-grained operations** and server-side aggregation on critical paths.

  **Normative constraints**
  - Mobile interactions MUST avoid chatty sequences on critical paths.
  - Workflows MUST be expressed as coarse-grained operations where appropriate.
  - Read models SHOULD be shaped for screen-level needs where appropriate.
  - Aggregation SHOULD occur server-side rather than requiring many client calls.

  **Evidence hooks**
  - The API exposes coarse-grained workflow endpoints rather than multi-call sequences.
  - Read endpoints provide screen-oriented shapes (bounded) where it improves reliability/latency.
  - Aggregation/composition is implemented server-side for critical flows.

  **Common failure modes**
  - Designing “fine-grained purity” endpoints that require many round trips.
  - Client-side aggregation with fragile sequencing and partial failures.
  - Coarse-grained endpoints without bounded payload controls.

