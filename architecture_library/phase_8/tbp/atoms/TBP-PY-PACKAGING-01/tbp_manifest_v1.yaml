schema_version: phase8_tbp_manifest_v1
tbp_id: TBP-PY-PACKAGING-01

binds_to:
  - atom_path: runtime.language
    atom_value: python

requires_tbps:
  - TBP-PY-01
conflicts_with_tbps: []

layout:
  scaffold_directories: []

  role_bindings:
    python_project_manifest:
      path_template: pyproject.toml
      artifact_class: config_stubs_non_executable
      evidence_contains:
        - "[project]"

    python_requirements_manifest:
      path_template: requirements.txt
      artifact_class: config_stubs_non_executable
      evidence_contains:
        - "fastapi"

extensions:
  obligations:
    - obligation_id: O-TBP-PY-PACKAGING-01-pyproject
      title: Materialize Python project manifest
      required_capability: observability_and_config
      role_binding_key: python_project_manifest

    - obligation_id: O-TBP-PY-PACKAGING-01-requirements
      title: Materialize Python requirements manifest
      required_capability: observability_and_config
      role_binding_key: python_requirements_manifest
