schema_version: phase8_tbp_manifest_v1
tbp_id: TBP-ASGI-01
binds_to:
- atom_path: runtime.framework
  atom_value: fastapi
- atom_path: plane.runtime_shape
  atom_value: api_service_http
requires_tbps:
- TBP-PY-01
conflicts_with_tbps: []
layout:
  role_bindings:
    asgi_entrypoint:
      path_template: asgi.py
      artifact_class: code_runnable_candidate
      evidence_contains:
      - "from .main import app"
    python_requirements_manifest:
      path_template: requirements.txt
      artifact_class: config_stubs_non_executable
      evidence_contains:
      - uvicorn
      validator_kind: python_requirements_manifest
      validator_config:
        package_names_all_of:
        - uvicorn
extensions:
  obligations:
  - obligation_id: O-TBP-ASGI-01-server-dependency
    title: Materialize the ASGI server dependency in the canonical Python dependency manifest.
    required_capability: observability_and_config
    role_binding_key: python_requirements_manifest
