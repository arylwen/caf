pattern_id: EXT-STRUCTURED_LOGGING
name: Structured Logging
summary: Queryable logs with a consistent schema
intent: Make logs queryable and consistent by using a standard schema and fields.
context: Microservices and async flows where debugging spans many components and failures are partial.
problem: Without consistent telemetry, issues are hard to detect, triage, and remediate quickly.
forces_tradeoffs: Signal quality vs cost/volume; cardinality vs queryability; instrumentation effort vs MTTR reduction.
solution_structure_behavior: Logging in a machine-parseable format (often JSON) with consistent fields such as timestamp,
  request_id, user/tenant, severity, and component. Structured logs enable powerful querying and dashboards, but must avoid
  sensitive data and enforce schema discipline.
consequences: Faster detection and lower MTTR; increased telemetry costs and governance requirements.
implementation_notes: Standardize correlation IDs, structured logs, tracing, and SLOs; alert on user impact; sample intelligently.
examples_known_uses: Production incident response, performance tuning, auditing critical flows.
related_patterns: |
  depends_on: OBS-01
  complements: CFG-01
  complements: CTX-01
  complements: POL-01
extended_definition: Logging in a machine-parseable format (often JSON) with consistent fields such as timestamp, request_id,
  user/tenant, severity, and component. Structured logs enable powerful querying and dashboards, but must avoid sensitive
  data and enforce schema discipline.
