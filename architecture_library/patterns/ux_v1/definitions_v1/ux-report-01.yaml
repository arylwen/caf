pattern_id: UX-REPORT-01
name: Editorial Findings and Report Composition
summary: Present findings, evidence, and exported reports with editorial readability so users can scan, trust, and present outcomes without deciphering raw scaffolding.
intent: Give review/result/report surfaces a readable narrative structure that supports trust, auditability, and hero-demo quality.
context: Review result pages, exported reports, evidence summaries, compliance findings, AI-assisted decisions, executive-ready output pages.
problem: Findings and reports lose credibility when dense evidence is dumped into raw tables or unstructured cards with little hierarchy.
forces_tradeoffs: Brevity vs completeness; narrative readability vs raw evidence density; export fidelity vs interactive richness.
solution_structure_behavior: Use a readable summary-first layout with section hierarchy, callout metrics, grouped findings, evidence drawers/appendices, and export-friendly composition.
consequences: Improves trust and presentation quality; requires stronger content hierarchy and more careful layout than generic CRUD detail pages.
implementation_notes: Use strong headings, summary callouts, restrained metric emphasis, readable line lengths, and clear transitions between summary, findings, and supporting evidence.
examples_known_uses: Compliance reports, review findings, decision memos, exported audit summaries, AI result summaries.
related_patterns: |
  complements: UX-EXPLAIN-01
  complements: UX-REVIEW-01
  complements: UX-VISUAL-01
  complements: UX-ASYNC-01
extended_definition: |
  Use a readable summary-first layout with section hierarchy, callout metrics, grouped findings, evidence drawers/appendices, and export-friendly composition.

