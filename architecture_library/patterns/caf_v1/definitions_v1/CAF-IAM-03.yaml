pattern_id: CAF-IAM-03
name: Identity Auditability and Traceability
summary: Make identity decisions and enforcement traceable via audit logs and telemetry that include principal attribution.
intent: Support compliance and incident response by making identity enforcement provable.
context: Systems where identity is used to authorize actions across planes and tenants.
problem: Without attribution and audit trails, it is impossible to prove who/what performed an action or why it was allowed.
forces_tradeoffs: Audit completeness vs storage/cost; privacy vs traceability; high-cardinality identities vs log volume.
solution_structure_behavior: Emit audit events for identity-relevant actions (authn/authz decisions, principal lifecycle changes)
  including tenant context, correlation IDs, and decision rationale where applicable.
consequences: Improves compliance readiness; requires governance around retention, access, and PII handling.
implementation_notes: Define mandatory audit fields; treat missing attribution as defect; ensure audit events are immutable.
examples_known_uses: Audit logs for admin actions and agent tool usage; traces linking request to principal and policy decision.
related_patterns: |
  depends_on: OBS-01
  refines: CAF-IAM-01
  complements: CAF-POL-03
  complements: CAF-ZT-01
extended_definition: |
  **Normative constraints**

  - Identity and access controls are only meaningful if behavior is **observable, auditable, and traceable**.
  - The system must be able to answer, at any time: **who acted**, under which identity and scope, **on whose behalf**, within which tenant, under which policy/delegation, and with what outcome.
  - Every significant action **MUST** be attributable to a governed identity (principal type + identifier) and include tenant context where applicable.
  - Actions performed by services or agents **MUST** retain linkage to their root identity (no anonymous security-relevant actions).

  **Evidence hooks**

  - Logs/traces for protected operations include: tenant_id, principal_type, principal_id, correlation/trace id, and policy/delegation identifiers (including policy version where applicable).
  - Audit records are structured and queryable; identity attribution is consistent across planes.

  **Common failure modes**

  - “Anonymous” or weakly attributed actions (free-form usernames, missing principal types).
  - Agent/service actions that cannot be tied back to an authorizing identity and delegation.
  - Missing tenant context in telemetry, preventing reliable isolation/audit.

