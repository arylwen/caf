$schema: https://json-schema.org/draft/2020-12/schema
$id: contura://caf/schemas/phase8_profile_parameters/v1
title: CAF Phase 8 Profile Parameters (Architect UX Inputs) (v1)
type: object
additionalProperties: false
description: >
  Architect-authored Phase 8 inputs (UX). This file is intentionally minimal: it pins lifecycle knobs,
  architecture style, the platform spine (infra_target, packaging, runtime_language, database_engine),
  and optional machine-consumed UI pins. Product-facing narrative belongs in specs/design, not in machine pins.
required:
  - schema_version
  - instance_name
  - lifecycle
  - architecture
  - platform
properties:
  schema_version:
    type: string
    const: phase8_profile_parameters_v1
    description: Schema identifier for Phase 8 Profile Parameters UX inputs.
  instance_name:
    type: string
    description: Reference architecture instance name (must match folder name under reference_architectures/).
    pattern: ^[a-z][a-z0-9]*(?:[-_][a-z0-9]+)*$
  created_at:
    type: string
    description: Optional ISO-8601 timestamp. If present, CAF carries it through exactly; if absent, CAF omits it.
    format: date-time
  lifecycle:
    type: object
    additionalProperties: false
    required:
      - evolution_stage
      - generation_phase
    properties:
      evolution_stage:
        type: string
        description: System maturity / risk posture (slow-changing).
        enum:
          - stage_0_local_prototype
          - stage_1_free_tier
          - stage_2_early_adopters
          - stage_3_growth
          - stage_4_scale_up
          - stage_5_enterprise
      generation_phase:
        type: string
        description: Kind of work this run is doing (medium-changing).
        enum:
          - architecture_scaffolding
          - implementation_scaffolding
          - pre_production
          - production_hardening
  architecture:
    type: object
    additionalProperties: false
    required:
      - architecture_style
    properties:
      architecture_style:
        type: string
        enum: [clean_architecture, layered_architecture, custom]
        description: >
          Architect-selected architecture style.
          This resolves to an ABP catalog entry and is used as a machine-consumed implementation binding.
  platform:
    type: object
    additionalProperties: false
    required:
      - infra_target
      - packaging
      - runtime_language
      - database_engine
    properties:
      infra_target:
        type: string
        enum: [local, aws, awslocal, azure, gcp, heroku]
        description: Target infrastructure context. Select one.
      packaging:
        type: string
        enum: [podman_compose, docker_compose, kubernetes, serverless]
        description: Packaging/deployment mode. Select one.
      runtime_language:
        type: string
        enum: [python, typescript, csharp, node, go, java]
        description: Primary runtime language for the candidate code. Select one.
      database_engine:
        type: string
        enum: [postgres, mysql, sqlserver, sqlite, none]
        description: Primary database engine. Select one.
      framework:
        type: string
        description: Optional runtime framework choice (validated deterministically by CAF guardrails).
      persistence_orm:
        type: string
        description: Optional persistence model choice (validated deterministically by CAF guardrails).
      auth_mode:
        type: string
        description: Optional authentication mode (validated deterministically by CAF guardrails).
      eventing_backend:
        type: string
        description: Optional eventing backend (validated deterministically by CAF guardrails).
      schema_management_strategy:
        type: string
        enum: [code_bootstrap, alembic_migrations]
        description: >
          Optional schema management strategy.
          - code_bootstrap: repositories/app bootstrap tables (default)
          - alembic_migrations: generate migrations (requires ORM-backed persistence)
  ui:
    type: object
    additionalProperties: false
    description: >
      Optional machine-consumed UI pins. These drive TBP resolution, retrieval/UI task seeding, and UI worker behavior.
      Product-facing UI description belongs in application_spec_v1.md.
    required:
      - present
    properties:
      present:
        type: boolean
        description: Whether a browser UI is in scope for this instance.
      kind:
        type: string
        enum: [web_spa]
        description: UI runtime shape. Launch surface supports web_spa.
      framework:
        type: string
        enum: [react]
        description: UI framework choice. Launch surface supports react.
      deployment_preference:
        type: string
        enum: [separate_ui_service, served_by_application_plane]
        description: How the UI should be deployed for local candidate runs.
  planes:
    type: object
    additionalProperties: false
    description: Optional plane runtime shape pins. If omitted, CAF derives defaults deterministically.
    properties:
      cp:
        type: object
        additionalProperties: false
        properties:
          runtime_shape:
            type: string
            enum: [api_service_http, worker_service_events]
      ap:
        type: object
        additionalProperties: false
        properties:
          runtime_shape:
            type: string
            enum: [api_service_http, worker_service_events]
  meta:
    type: object
    description: Optional UX metadata (copied through exactly).
    additionalProperties: true
