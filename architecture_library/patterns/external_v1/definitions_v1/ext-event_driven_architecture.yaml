pattern_id: EXT-EVENT_DRIVEN_ARCHITECTURE
name: Event-Driven Architecture
summary: React to events instead of synchronous chaining
intent: React to events instead of synchronous chaining
context: Distributed systems with unreliable networks and variable load; async workflows and integrations.
problem: Synchronous chaining and naive retries cause cascading failures, duplicate side effects, and poor elasticity under
  spikes.
forces_tradeoffs: Consistency vs availability; throughput vs ordering; retry aggressiveness vs dependency protection; simplicity
  vs correctness.
solution_structure_behavior: An architectural style where services communicate primarily through events representing state
  changes, rather than synchronous request chains. It decouples producers and consumers and improves resilience and scalability,
  but introduces eventual consistency and requires strong event governance and observability.
consequences: More resilient and scalable workflows; more components and operational complexity (queues, topics, retries,
  replays).
implementation_notes: Design for at-least-once delivery, idempotency, backoff+jitter, DLQs, and clear ownership for replay/compensation.
examples_known_uses: Order/payment workflows, event streams, background processing, third-party integration pipelines.
related_patterns: |
  depends_on: OBS-01
  complements: CFG-01
  complements: CTX-01
  complements: POL-01
extended_definition: An architectural style where services communicate primarily through events representing state changes,
  rather than synchronous request chains. It decouples producers and consumers and improves resilience and scalability, but
  introduces eventual consistency and requires strong event governance and observability.
