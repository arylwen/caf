<svg xmlns="http://www.w3.org/2000/svg" width="980" height="760" viewBox="0 0 980 760" role="img" aria-label="CAF two retrieval surfaces">

<style>
  .title { font: 700 22px Arial, Helvetica, sans-serif; fill: #0f172a; }
  .subtitle { font: 400 12px Arial, Helvetica, sans-serif; fill: #334155; }
  .box { fill: #ffffff; stroke: #475569; stroke-width: 2; rx: 14; ry: 14; }
  .accent { fill: #eff6ff; stroke: #2563eb; stroke-width: 2; rx: 14; ry: 14; }
  .side { fill: #fff7ed; stroke: #c2410c; stroke-width: 2; rx: 12; ry: 12; }
  .ok { fill: #ecfdf5; stroke: #15803d; stroke-width: 2; rx: 14; ry: 14; }
  .warn { fill: #fff1f2; stroke: #be123c; stroke-width: 2; rx: 14; ry: 14; }
  .label { font: 700 18px Arial, Helvetica, sans-serif; fill: #0f172a; }
  .small { font: 400 12px Arial, Helvetica, sans-serif; fill: #334155; }
  .arrow { stroke: #475569; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
  .dashed { stroke-dasharray: 7 6; }
  .note { font: 700 13px Arial, Helvetica, sans-serif; fill: #9a3412; }
</style>

<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
  </marker>
</defs>
<rect width="100%" height="100%" fill="#f8fafc" />
<text x="490" y="36" class="title" text-anchor="middle">CAF two retrieval surfaces</text><text x="490" y="58" class="subtitle" text-anchor="middle">Build architecture with one retrieval path. Ask architecture questions with another.</text><rect x="310" y="100" width="360" height="76" class="accent" /><text x="490" y="146" class="label" text-anchor="middle">User Intent / Work Request</text><rect x="90" y="230" width="240" height="72" class="box" /><text x="210" y="273" class="label" text-anchor="middle">Pattern Library</text><rect x="90" y="350" width="240" height="76" class="box" /><text x="210" y="394" class="label" text-anchor="middle">Pattern Retrieval</text><rect x="90" y="490" width="240" height="86" class="accent" /><text x="210" y="535" class="label" text-anchor="middle">Reference Architecture<tspan x="210" dy="20">State</tspan></text><rect x="560" y="350" width="260" height="76" class="box" /><text x="690" y="394" class="label" text-anchor="middle">Ask / Context<tspan x="690" dy="20">Retrieval</tspan></text><rect x="560" y="500" width="260" height="86" class="box" /><text x="690" y="545" class="label" text-anchor="middle">Context Pack<tspan x="690" dy="20">/ Answer</tspan></text><line x1="490" y1="176" x2="210" y2="350" class="arrow" /><line x1="490" y1="176" x2="690" y2="350" class="arrow" /><line x1="210" y1="302" x2="210" y2="350" class="arrow" /><line x1="210" y1="426" x2="210" y2="490" class="arrow" /><line x1="330" y1="533" x2="560" y2="388" class="arrow" /><line x1="690" y1="426" x2="690" y2="500" class="arrow" /><text x="210" y="210" class="note" text-anchor="middle">Build architecture</text><text x="690" y="330" class="note" text-anchor="middle">Ask about architecture</text></svg>