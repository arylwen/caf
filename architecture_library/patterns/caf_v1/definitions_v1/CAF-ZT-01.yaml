pattern_id: CAF-ZT-01
name: Zero Trust Norms Across Planes
summary: Assume no trusted internal network; require authentication/authorization and explicit context for every operation.
intent: Prevent implicit trust and ambient authority by making identity and policy checks explicit and auditable at boundaries.
context: Multi-tenant systems with agents/services/users executing actions across planes and trust boundaries.
problem: Ambient trust enables privilege escalation, inconsistent enforcement, and undetectable drift in AI/agent behavior.
forces_tradeoffs: Security and auditability vs friction and performance; strict rejection on missing context vs availability
  under partial failures.
solution_structure_behavior: Require authenticated principals, explicit context propagation, deterministic policy evaluation,
  and consistent enforcement. Reject operations when context is incomplete.
consequences: Improves security posture and traceability; requires robust identity/context propagation and careful error handling.
implementation_notes: "Make \u201Cmissing context\u201D a hard failure mode; centralize enforcement points; ensure telemetry\
  \ includes principal + tenant + policy decision lineage."
examples_known_uses: Per-request authz checks; policy decision telemetry; rejecting execution when caller identity/tenant
  is unknown.
