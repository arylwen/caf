pattern_id: EXT-BACKEND_FOR_FRONTEND_BFF
name: Backend-for-Frontend (BFF)
summary: Client-specific API to simplify UI and reduce chatty calls
intent: Provide a client-specific backend API that optimizes UX and reduces chatty calls.
context: Multiple frontends (web, mobile, partners) with different needs; microservices backends; latency-sensitive UI flows.
problem: Generic APIs force clients to orchestrate many calls, leading to high latency, duplicated logic, and fragile client behavior.
forces_tradeoffs: Client tailoring vs proliferation of BFFs; faster UI iteration vs more backend surface area; simplicity vs consistency across clients.
solution_structure_behavior: A thin backend tailored to a specific client (web, iOS, Android, partner) that shapes data and workflows to the UI’s needs. A BFF aggregates calls, reduces over/under-fetching, and isolates frontend teams from internal service boundaries and frequent backend changes.
consequences: Improves perceived performance and reduces client complexity; adds another service to operate and secure.
implementation_notes: Keep BFF thin (composition + shaping). Use caching where safe. Align ownership with the client team; version per client as needed.
examples_known_uses: Mobile BFF aggregating session, profile, and content; web BFF providing page-level view models.
related_patterns: |
  depends_on: OBS-01
  complements: CAF-MRAD-04
  complements: CTX-01
  complements: POL-01
extended_definition: |
  A thin backend tailored to a specific client (web, iOS, Android, partner) that shapes data and workflows to the UI’s needs. A BFF aggregates calls, reduces over/under-fetching, and isolates frontend teams from internal service boundaries and frequent backend changes.


