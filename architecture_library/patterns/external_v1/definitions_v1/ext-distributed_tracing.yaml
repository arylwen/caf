pattern_id: EXT-DISTRIBUTED_TRACING
name: Distributed Tracing
summary: Correlate calls across services
intent: Trace a request end-to-end across services using correlation/trace IDs.
context: Microservices and async flows where debugging spans many components and failures are partial.
problem: Without consistent telemetry, issues are hard to detect, triage, and remediate quickly.
forces_tradeoffs: Signal quality vs cost/volume; cardinality vs queryability; instrumentation effort vs MTTR reduction.
solution_structure_behavior: An observability technique that tracks a request across multiple services using trace and span identifiers propagated through headers/context. It reveals end-to-end latency, hotspots, and failure points, but requires consistent instrumentation, sampling strategies, and centralized trace storage.
consequences: Faster detection and lower MTTR; increased telemetry costs and governance requirements.
implementation_notes: Standardize correlation IDs, structured logs, tracing, and SLOs; alert on user impact; sample intelligently.
examples_known_uses: Production incident response, performance tuning, auditing critical flows.
related_patterns: |
  depends_on: OBS-01
  complements: CFG-01
  complements: CTX-01
  complements: POL-01
extended_definition: An observability technique that tracks a request across multiple services using trace and span identifiers propagated through headers/context. It reveals end-to-end latency, hotspots, and failure points, but requires consistent instrumentation, sampling strategies, and centralized trace storage.
