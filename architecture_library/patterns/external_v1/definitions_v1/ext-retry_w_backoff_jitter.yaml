pattern_id: EXT-RETRY_W_BACKOFF_JITTER
name: Retry w/ Backoff + Jitter
summary: Controlled retries for transient failures
intent: Recover from transient failures without causing retry storms or cascading overload.
context: Distributed systems with unreliable networks and variable load; async workflows and integrations.
problem: Synchronous chaining and naive retries cause cascading failures, duplicate side effects, and poor elasticity under
  spikes.
forces_tradeoffs: Consistency vs availability; throughput vs ordering; retry aggressiveness vs dependency protection; simplicity
  vs correctness.
solution_structure_behavior: A resiliency technique that retries transient failures with increasing delays (backoff) and randomized
  variation (jitter). This reduces thundering herds and coordinated retry storms, and should include caps, deadlines, and
  error classification to avoid amplifying persistent failures.
consequences: More resilient and scalable workflows; more components and operational complexity (queues, topics, retries,
  replays).
implementation_notes: Design for at-least-once delivery, idempotency, backoff+jitter, DLQs, and clear ownership for replay/compensation.
examples_known_uses: Order/payment workflows, event streams, background processing, third-party integration pipelines.
related_patterns: |
  depends_on: OBS-01
  complements: CFG-01
  complements: CTX-01
  complements: POL-01
extended_definition: A resiliency technique that retries transient failures with increasing delays (backoff) and randomized
  variation (jitter). This reduces thundering herds and coordinated retry storms, and should include caps, deadlines, and
  error classification to avoid amplifying persistent failures.
