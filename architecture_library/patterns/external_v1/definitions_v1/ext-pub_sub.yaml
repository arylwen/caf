pattern_id: EXT-PUB_SUB
name: Pub/Sub
summary: Fan-out events to multiple subscribers
intent: Distribute events to multiple independent subscribers without tight coupling.
context: Distributed systems with unreliable networks and variable load; async workflows and integrations.
problem: Synchronous chaining and naive retries cause cascading failures, duplicate side effects, and poor elasticity under
  spikes.
forces_tradeoffs: Consistency vs availability; throughput vs ordering; retry aggressiveness vs dependency protection; simplicity
  vs correctness.
solution_structure_behavior: A messaging pattern where publishers emit events to a topic and multiple subscribers receive
  copies asynchronously. It enables fan-out and loose coupling, but requires handling delivery semantics (at-least-once),
  ordering guarantees, schema evolution, and subscriber backpressure.
consequences: More resilient and scalable workflows; more components and operational complexity (queues, topics, retries,
  replays).
implementation_notes: Design for at-least-once delivery, idempotency, backoff+jitter, DLQs, and clear ownership for replay/compensation.
examples_known_uses: Domain event fan-out (billing, analytics, notifications); integration events for partners.
related_patterns: |
  depends_on: OBS-01
  complements: CFG-01
  complements: CTX-01
  complements: POL-01
extended_definition: A messaging pattern where publishers emit events to a topic and multiple subscribers receive copies asynchronously.
  It enables fan-out and loose coupling, but requires handling delivery semantics (at-least-once), ordering guarantees, schema
  evolution, and subscriber backpressure.
