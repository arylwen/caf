pattern_id: EXT-ORCHESTRATION
name: Orchestration
summary: The central coordinator controls the workflow
intent: Use a central coordinator to drive a multi-step workflow with explicit state transitions.
context: Distributed systems with unreliable networks and variable load; async workflows and integrations.
problem: Synchronous chaining and naive retries cause cascading failures, duplicate side effects, and poor elasticity under
  spikes.
forces_tradeoffs: Consistency vs availability; throughput vs ordering; retry aggressiveness vs dependency protection; simplicity
  vs correctness.
solution_structure_behavior: A coordination style where a dedicated orchestrator service directs each step of a multi-service
  workflow by issuing commands and tracking state. It improves visibility and control over the process, but can increase coupling
  to the orchestrator and concentrate complexity in one component.
consequences: More resilient and scalable workflows; more components and operational complexity (queues, topics, retries,
  replays).
implementation_notes: Design for at-least-once delivery, idempotency, backoff+jitter, DLQs, and clear ownership for replay/compensation.
examples_known_uses: Order/payment workflows, event streams, background processing, third-party integration pipelines.
related_patterns: |
  depends_on: OBS-01
  complements: CFG-01
  complements: CTX-01
  complements: POL-01
extended_definition: A coordination style where a dedicated orchestrator service directs each step of a multi-service workflow
  by issuing commands and tracking state. It improves visibility and control over the process, but can increase coupling to
  the orchestrator and concentrate complexity in one component.
