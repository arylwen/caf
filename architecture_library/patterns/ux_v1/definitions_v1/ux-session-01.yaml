pattern_id: UX-SESSION-01
name: Session, Role, and Tenant-Aware Browser Posture
summary: Use a session- and role-aware browser posture when the UX must reflect tenant context, privilege, session expiry, and action visibility rather than assuming a generic browser session.
intent: Make session, role, and tenant consequences visible in the UX so users understand available actions, scope changes, and interruption behavior.
context: Multi-tenant SaaS, admin/operator tools, products with elevated actions, session refresh pressure, workspace switching, role-dependent navigation.
problem: When session and role consequences are invisible, users see disappearing actions, stale tenant scope, confusing redirects, or hidden permission failures.
forces_tradeoffs: Visibility vs noise; strict security posture vs smooth navigation; proactive warnings vs interruption fatigue; tenant switching convenience vs context safety.
solution_structure_behavior: Show tenant/workspace scope, role-shaped navigation and actions, session-expiry/re-auth posture, and safe context-switch transitions. Keep privilege-sensitive surfaces explicit rather than implicit.
consequences: Improves predictability and security understanding; can add chrome and state complexity if overdone.
implementation_notes: This pattern is about browser-visible consequences of identity/context policy, not about redefining upstream IAM architecture.
examples_known_uses: Workspace switchers, role-aware menus, session timeout warnings, privileged action prompts, tenant-scoped navigation.
related_patterns: |
  depends_on: CAF-IAM-01
  depends_on: CAF-ZT-01
  depends_on: CTX-01
  complements: EXT-BACKEND_FOR_FRONTEND_BFF
  complements: UX-WIZARD-01
extended_definition: |
  Show tenant/workspace scope, role-shaped navigation and actions, session-expiry/re-auth posture, and safe context-switch transitions. Keep privilege-sensitive surfaces explicit rather than implicit.

