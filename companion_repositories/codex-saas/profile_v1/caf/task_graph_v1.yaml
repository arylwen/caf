        bearer token shape resolved by the role-bound shared auth helper (current canonical shape:
        `mock.<base64-json>.token`) rather than a lane-local raw base64 variant.
      - >-
        TBP Gate (TBP-AUTH-MOCK-01/G-AUTH-MOCK-CONTRACT-REALIZATION): UI claim construction and UI API header emission
        live in their actual owning surfaces rather than relying on a single proxy file to carry all evidence.
      - >-
