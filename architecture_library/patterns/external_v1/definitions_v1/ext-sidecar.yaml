pattern_id: EXT-SIDECAR
name: Sidecar
summary: Add cross-cutting features via companion container
intent: Add cross-cutting features via companion container
context: Services that must scale, deploy frequently, and run reliably with predictable
  operational burden.
problem: Manual server management and stateful designs hinder scaling, resilience,
  and deployment velocity.
forces_tradeoffs: Operational simplicity vs flexibility/control; portability vs managed
  constraints; cost vs performance.
solution_structure_behavior: A deployment pattern where a helper process runs alongside
  the main service (e.g., in the same Pod) to provide cross-cutting concerns such
  as proxies, TLS/mTLS, logging, metrics, or secrets fetching. Sidecars standardize
  capabilities without changing application code, but add resource use and debugging
  complexity.
consequences: Improved scale and reliability when done well; requires discipline around
  state, networking, and observability.
implementation_notes: Prefer statelessness, externalize state, standardize health
  checks, and automate deployments and rollbacks.
examples_known_uses: Domain microservices, async workers, and integration services.
related_patterns: |
  depends_on: OBS-01
  complements: CFG-01
  complements: CTX-01
  complements: POL-01
extended_definition: A deployment pattern where a helper process runs alongside the
  main service (e.g., in the same Pod) to provide cross-cutting concerns such as proxies,
  TLS/mTLS, logging, metrics, or secrets fetching. Sidecars standardize capabilities
  without changing application code, but add resource use and debugging complexity.
caf:
  layer: external
  verifiability: plan_ready
  plane: both
  default_anchor_policy: requires_explicit_design_decision
