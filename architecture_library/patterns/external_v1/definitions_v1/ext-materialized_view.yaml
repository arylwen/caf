pattern_id: EXT-MATERIALIZED_VIEW
name: Materialized View
summary: Precomputed read projection for speed
intent: Speed up reads by precomputing and storing a denormalized projection.
context: Systems needing low-latency reads, scalable storage, and fit-for-purpose data models.
problem: One-size-fits-all persistence and modeling leads to slow reads, complex queries, and scaling bottlenecks.
forces_tradeoffs: Duplication vs performance; consistency vs speed; operational burden vs specialization benefits.
solution_structure_behavior: "A precomputed, query-optimized representation of data\u2014often built from events or ETL\u2014\
  that accelerates reads and supports specialized queries. Materialized views must define refresh/update mechanisms, staleness\
  \ tolerances, and backfill/rebuild strategies."
consequences: Better performance and clearer models; more data stores/projections to manage.
implementation_notes: Start with simple caching/projections, measure hotspots, and introduce specialized stores/projections
  incrementally.
examples_known_uses: Read-heavy dashboards, search/catalog, reporting projections.
related_patterns: |
  depends_on: OBS-01
  complements: CAF-MRAD-03
  complements: CTX-01
  complements: POL-01
extended_definition: |
  A precomputed, query-optimized representation of data—often built from events or ETL—that accelerates reads and supports specialized queries. Materialized views must define refresh/update mechanisms, staleness tolerances, and backfill/rebuild strategies.


