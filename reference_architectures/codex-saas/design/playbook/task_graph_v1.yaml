  - task_id: TG-35-policy-enforcement-core
    title: Implement cross-plane policy enforcement core
    required_capabilities:
      - policy_enforcement
    depends_on:
      - TG-00-CONTRACT-BND-CP-AP-01-AP
      - TG-00-CONTRACT-BND-CP-AP-01-CP
    inputs:
      - path: reference_architectures/codex-saas/spec/playbook/system_spec_v1.md
        required: true
      - path: reference_architectures/codex-saas/design/playbook/control_plane_design_v1.md
        required: true
      - path: reference_architectures/codex-saas/design/playbook/contract_declarations_v1.yaml
        required: true
    steps:
      - Compile adopted policy-related decisions into enforcement invariants.
      - Define CP decision output contract consumed by AP execution pathways.
      - Specify fail-closed enforcement points for missing/invalid policy context.
      - Align enforcement sequencing with declared mixed CP/AP contract surface.
      - Document reusable enforcement semantics for API and service layers.
    definition_of_done:
      - Policy enforcement core defines consistent CP-to-AP enforcement semantics.
      - Fail-closed behavior is explicit when policy context is missing or invalid.
      - Enforcement logic remains architecture-aligned and avoids new policy models.
    semantic_review:
      severity_threshold: blocker
      review_questions:
        - Does enforcement core align with adopted policy decision intent?
        - Are fail-closed behaviors explicit for missing policy context?
        - Is CP/AP contract usage coherent with declared integration surface?
    trace_anchors:
      - pattern_id: pattern_obligation_id:OBL-POLICY-ENFORCEMENT
        anchor_kind: plan_step_archetype
      - pattern_id: selected_pattern:CAF-POL-01
        anchor_kind: structural_validation
  - task_id: TG-20-api-boundary-workspaces
    title: Implement API boundary for workspaces
    required_capabilities:
      - api_boundary_implementation
    depends_on:
