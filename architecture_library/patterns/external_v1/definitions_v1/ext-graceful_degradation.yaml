pattern_id: EXT-GRACEFUL_DEGRADATION
name: Graceful Degradation
summary: Reduce features instead of failing hard
intent: Continue providing core functionality by reducing non-critical features under stress.
context: Microservices and async flows where debugging spans many components and failures are partial.
problem: Without consistent telemetry, issues are hard to detect, triage, and remediate quickly.
forces_tradeoffs: Signal quality vs cost/volume; cardinality vs queryability; instrumentation effort vs MTTR reduction.
solution_structure_behavior: A resilience approach where, under stress or partial dependency failure, the system continues
  operating by reducing non-critical functionality. Examples include serving cached data, disabling optional features, or
  returning partial responses, prioritizing core journeys over completeness.
consequences: Faster detection and lower MTTR; increased telemetry costs and governance requirements.
implementation_notes: Standardize correlation IDs, structured logs, tracing, and SLOs; alert on user impact; sample intelligently.
examples_known_uses: Production incident response, performance tuning, auditing critical flows.
related_patterns: |
  depends_on: OBS-01
  complements: CFG-01
  complements: CTX-01
  complements: POL-01
extended_definition: A resilience approach where, under stress or partial dependency failure, the system continues operating
  by reducing non-critical functionality. Examples include serving cached data, disabling optional features, or returning
  partial responses, prioritizing core journeys over completeness.
