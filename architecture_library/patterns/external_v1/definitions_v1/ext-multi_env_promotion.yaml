    anchor_id: DECISION-EXT-MULTI_ENV_PROMOTION
  minimum_evidence:
  - Teams shipping frequently with high availability requirements and multiple environments.
  - Risky deployments and environment drift lead to outages and slow delivery.
  definition_of_done:
  - Verify that lower release risk and better repeatability
  capabilities_needed:
  - observability_emit
  - backup_restore
  forbidden_assumptions:
  - No cloud vendor or product selection implied by this pattern.
  - No assumption of a specific orchestration or deployment platform unless provided
    by platform pins (technology atoms) / TBPs.
  kind: decision_pattern
  decision_prompts:
  - Record an explicit design decision adopting or rejecting this pattern, including
    scope, required choices (option sets), and evidence anchors.
  option_sets:
  - option_set_id: ops.promotion_model
    description: How changes are promoted across environments (artifact vs config
      vs both).
    options:
    - option_id: artifact_promotion
      summary: Promote the same built artifact across environments; environment differences
        are config only.
      notes: ''
    - option_id: config_promotion
      summary: Promote configuration and environment-specific artifacts separately
        with explicit gates.
      notes: ''
    - option_id: artifact_and_config
      summary: Promote both artifact and config with explicit compatibility validation.
      notes: ''
    - option_id: custom
      summary: Custom (fill fields).
      notes: ''
    default_option_id: artifact_promotion
  human_questions:
  - question_key: ops_promotion_model
    question_id: Q-EXT-MEP-01
    question: How will you promote changes across environments?
    description: Select the promotion model across dev/stage/prod (artifact promotion
      vs config promotion).
    option_set_id: ops.promotion_model
    specialization_notes:
    - Warranted when multiple environments exist and releases must be promoted with
      controlled risk and reproducibility.
