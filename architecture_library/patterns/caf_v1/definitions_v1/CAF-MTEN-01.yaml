caf:
  layer: caf
  verifiability: plan_ready
  plane: both
  default_anchor_policy: requires_explicit_design_decision
  allowed_anchor_types:
  - checklist_item
  - caf_pattern
  - core_pattern
  - tbp
  - rail
  default_anchor:
    anchor_type: checklist_item
    anchor_id: REQUIRES_HUMAN_DECISION_ID
  minimum_evidence:
  - Spec/design matches the pattern context/problem as stated in the pattern definition.
  decision_prompts:
  - Record an explicit design decision adopting or rejecting this pattern, including scope, constraints/required choices,
    and evidence anchors.
  definition_of_done:
  - Verify that tenancy is explicit (tenant model + invariants) and enforced by construction rather than inferred.
  capabilities_needed: []
  forbidden_assumptions:
  - No cloud vendor or product selection implied by this pattern.
  option_sets:
  - option_set_id: tenancy.isolation_mode
    summary: Choose the baseline tenancy isolation mode for the system's default tier.
    options:
    - option_id: pooled_everything
      status: defer
      summary: Pooled everything (logical isolation; shared infra).
      related_pattern_id: CAF-MTEN-ISO-01
    - option_id: pooled_compute_partitioned_data
      status: defer
      summary: Pooled compute + partitioned data (bridge isolation).
      related_pattern_id: CAF-MTEN-ISO-02
    - option_id: silo_tenants_dedicated_infra
      status: defer
      summary: Silo tenants (dedicated infrastructure per tenant).
      related_pattern_id: CAF-MTEN-ISO-03
    - option_id: hybrid_tiered
      status: defer
      summary: Hybrid isolation (selective and tiered by tenant).
      related_pattern_id: CAF-MTEN-ISO-04
    - option_id: custom
      status: defer
      summary: Custom (describe your isolation approach; prefer adopting an existing mode when possible).
      notes: ''
    default_option_id: hybrid_tiered
  human_questions:
  - question_key: tenancy_isolation_mode
    question_id: Q-MTEN-ISO-MODE-01
    question: Which tenancy isolation mode is intended for the default product tier?
    description: Select one option. Use 'custom' only if none fit.
    option_set_id: tenancy.isolation_mode
    specialization_notes: If you expect enterprise tiering, choose 'hybrid_tiered' and note upgrade triggers.
    anchors:
    - caf_pattern: CAF-MTEN-01
  kind: decision_pattern
promotions:
  semantic_inputs:
