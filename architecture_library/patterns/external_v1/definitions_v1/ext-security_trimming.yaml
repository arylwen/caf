pattern_id: EXT-SECURITY_TRIMMING
name: Security Trimming
summary: Filter results by user permissions
intent: Filter results by user permissions
context: Systems handling sensitive data and multiple services/identities across networks
  and environments.
problem: Implicit trust, broad permissions, and ad-hoc secret handling create high
  breach impact and compliance risk.
forces_tradeoffs: Security depth vs developer friction; least privilege vs operational
  agility; privacy vs usability.
solution_structure_behavior: A technique—common in search and data APIs—where results
  are filtered to include only items the caller is authorized to see. It often requires
  ACL-aware indexing/metadata, consistent authorization checks across services, and
  careful handling of partial data and leakage via counts/aggregations.
consequences: Reduced blast radius and better compliance; requires governance, tooling,
  and ongoing hygiene.
implementation_notes: Centralize identity, enforce least privilege, store secrets
  in a vault, keep services private by default, and automate policy checks.
examples_known_uses: Enterprise SaaS, healthcare/finance workloads, multi-tenant platforms.
related_patterns: |
  depends_on: OBS-01
  complements: CFG-01
  complements: CTX-01
  complements: POL-01
extended_definition: A technique—common in search and data APIs—where results are
  filtered to include only items the caller is authorized to see. It often requires
  ACL-aware indexing/metadata, consistent authorization checks across services, and
  careful handling of partial data and leakage via counts/aggregations.
