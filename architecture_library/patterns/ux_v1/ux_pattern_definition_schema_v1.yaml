$schema: https://json-schema.org/draft/2020-12/schema
$title: CAF UX Pattern Definition Schema v1
$type: object
additionalProperties: false
required:
  - pattern_id
  - name
  - summary
  - intent
  - context
  - problem
  - forces_tradeoffs
  - solution_structure_behavior
  - consequences
  - implementation_notes
  - examples_known_uses
  - related_patterns
  - extended_definition
  - caf
properties:
  pattern_id:
    type: string
    minLength: 3
    pattern: '^UX-[A-Z0-9_-]+$'
  name:
    type: string
    minLength: 2
  summary:
    type: string
  intent:
    type: string
  context:
    type: string
  problem:
    type: string
  forces_tradeoffs:
    type: string
  solution_structure_behavior:
    type: string
  consequences:
    type: string
  implementation_notes:
    type: string
  examples_known_uses:
    type: string
  related_patterns:
    type: string
  extended_definition:
    type: string
  caf:
    type: object
    additionalProperties: false
    required:
      - layer
      - verifiability
      - plane
      - default_anchor_policy
      - allowed_anchor_types
      - default_anchor
      - minimum_evidence
      - definition_of_done
      - capabilities_needed
      - forbidden_assumptions
    properties:
      layer:
        type: string
        enum: [ux]
      verifiability:
        type: string
        enum: [plan_ready, advisory]
      plane:
        type: string
        enum: [application, control, both]
      default_anchor_policy:
        type: string
        enum: [requires_explicit_design_decision]
      allowed_anchor_types:
        type: array
        minItems: 1
        items:
          type: string
          enum: [checklist_item, caf_pattern, core_pattern, tbp, rail]
      default_anchor:
        type: object
        additionalProperties: false
        required: [anchor_type, anchor_id]
        properties:
          anchor_type:
            type: string
            enum: [checklist_item, caf_pattern, core_pattern, tbp, rail]
          anchor_id:
            type: string
            minLength: 1
      minimum_evidence:
        type: array
        items: { type: string }
      definition_of_done:
        type: array
        items: { type: string }
      capabilities_needed:
        type: array
        items: { type: string }
      forbidden_assumptions:
        type: array
        items: { type: string }
