pattern_id: PST-01
name: Persistence Boundary via Repositories
summary: Encapsulate all persistence access behind repository ports so domain and application services remain independent
  of storage technology. Establish a persistence boundary (ports/adapters or repository boundary) that enforces
  scope and isolation.
intent: Encapsulate all persistence access behind repository ports so domain and application services remain independent
  of storage technology.
context: This pattern applies whenever the system persists domain state and the design does not explicitly commit
  to an alternative boundary (for example, event sourcing). In CAF Layer 1, repository ports are the default persistence
  boundary.
problem: Without a persistence boundary (repository abstraction), domain logic couples to database/ORM details and
  query shapes, making changes risky, testing harder, and portability or substitution of data sources costly.
forces_tradeoffs: '- Abstraction (repository interfaces) vs direct ORM/SQL access for speed.

  - Domain purity/portability vs performance tuning that depends on storage specifics.

  - Testability via mocks/fakes vs the risk of over-abstracting query capabilities.'
solution_structure_behavior: 'Introduces module roles: repository_ports; persistence_adapters; persistence_models


  Allowed dependencies: domain_core and service_facades may depend on repository_ports; persistence_adapters implement
  repository_ports and may depend on persistence_models and storage SDKs; domain_core must not depend on persistence_adapters
  or storage SDKs.


  Assembly contract: service_facades interact with persistence exclusively through repository_ports. app_composition_root
  binds each repository port to a concrete persistence_adapters implementation. Persistence adapters are the only
  place where storage-specific logic appears.


  Create an explicit persistence boundary: domain-facing ports (or repositories) and infrastructure adapters. Require
  all reads/writes to flow through this boundary so enforcement (tenant/principal scope, auditing, consistency)
  is centralized and testable.'
consequences: This pattern provides a stack-independent persistence boundary that is easy to staff with specialized
  workers and easy to validate structurally.
implementation_notes: See required evidence hooks, structural validations, and plan step archetypes in this definition.
  Legacy pattern IDs from core inventory (ASM-*/BND-*/DAT-*) are not yet published as core_v1 definitions; related_patterns
  point to canonical implemented core IDs only.
examples_known_uses: Typical in services that persist domain entities and need to keep database/ORM choices isolated
  behind repository interfaces.
