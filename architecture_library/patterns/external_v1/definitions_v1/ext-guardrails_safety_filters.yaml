pattern_id: EXT-GUARDRAILS_SAFETY_FILTERS
name: Guardrails / Safety Filters
summary: Control unsafe output & injection
intent: Reduce unsafe outputs and prompt injection by validating inputs/outputs and
  enforcing policies.
context: LLM-powered apps needing reliability, safety, and change management across
  prompts and retrieval components.
problem: Model outputs can be unsafe or inconsistent; prompts and indexes change over
  time without traceability.
forces_tradeoffs: Safety vs helpfulness; latency/cost vs quality; rapid iteration
  vs stability and auditability.
solution_structure_behavior: Controls that constrain model inputs and outputs to reduce
  harmful or policy-violating behavior, and to mitigate prompt injection. Guardrails
  can include allow/deny policies, content filters, tool-use constraints, sandboxing,
  grounding requirements, and human-in-the-loop review for high-risk actions.
consequences: More trustworthy assistants; added evaluation, monitoring, and governance
  work.
implementation_notes: Version prompts, log inputs/outputs, implement guardrails, evaluate
  regularly, and enforce ACL-aware retrieval.
examples_known_uses: Enterprise assistants, copilots, automated document drafting
  with citations.
related_patterns: |
  depends_on: OBS-01
  complements: CFG-01
  complements: CTX-01
  complements: POL-01
extended_definition: Controls that constrain model inputs and outputs to reduce harmful
  or policy-violating behavior, and to mitigate prompt injection. Guardrails can include
  allow/deny policies, content filters, tool-use constraints, sandboxing, grounding
  requirements, and human-in-the-loop review for high-risk actions.
