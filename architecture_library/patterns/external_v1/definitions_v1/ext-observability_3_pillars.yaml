pattern_id: EXT-OBSERVABILITY_3_PILLARS
name: "Observability \u201C3 pillars\u201D"
summary: Metrics + logs + traces as default
intent: Metrics + logs + traces as default
context: Microservices and async flows where debugging spans many components and failures are partial.
problem: Without consistent telemetry, issues are hard to detect, triage, and remediate quickly.
forces_tradeoffs: Signal quality vs cost/volume; cardinality vs queryability; instrumentation effort vs MTTR reduction.
solution_structure_behavior: A foundational observability model that treats metrics, logs, and traces as complementary signals.
  Together they enable fast detection (metrics), detailed diagnosis (logs), and causal path analysis (traces), especially
  when correlated via shared IDs and consistent metadata.
consequences: Faster detection and lower MTTR; increased telemetry costs and governance requirements.
implementation_notes: Standardize correlation IDs, structured logs, tracing, and SLOs; alert on user impact; sample intelligently.
examples_known_uses: Production incident response, performance tuning, auditing critical flows.
related_patterns: |
  depends_on: OBS-01
  complements: CFG-01
  complements: CTX-01
  complements: POL-01
extended_definition: A foundational observability model that treats metrics, logs, and traces as complementary signals. Together
  they enable fast detection (metrics), detailed diagnosis (logs), and causal path analysis (traces), especially when correlated
  via shared IDs and consistent metadata.
