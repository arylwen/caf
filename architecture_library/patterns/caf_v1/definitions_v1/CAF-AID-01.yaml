pattern_id: CAF-AID-01
name: Agent Identity Pattern (Normative Summary)
summary: Treat agents as first-class principals with explicit identity, attribution, and policy-governed permissions.
intent: Ensure agent actions are attributable, governable, and constrained under deterministic policy.
context: Systems that execute agentic workflows that may act on behalf of users/tenants/services.
problem: Without explicit agent identity, systems cannot audit actions, bound permissions, or safely reason about autonomy.
forces_tradeoffs: Autonomy and convenience vs safety, attribution, and deterministic enforcement.
solution_structure_behavior: Define agent principals, bind them to tenants and permissions, require explicit attribution on
  actions, and enforce via policy evaluation at runtime.
consequences: Improves auditability and safety; requires identity lifecycle management and consistent attribution propagation.
implementation_notes: "Avoid \u201Canonymous agent\u201D execution; require correlation IDs and principal attribution in telemetry;\
  \ treat tool access as policy-governed."
examples_known_uses: Agents performing workflows with recorded principal identity; policy-enforced tool invocation.
related_patterns: |
  depends_on: CAF-IAM-01
  depends_on: CAF-POL-01
  depends_on: CAF-POL-02
  depends_on: OBS-01
  complements: CAF-AI-01
  complements: CAF-ZT-01
extended_definition: |
  Agents are **first-class principals**. Their actions must be attributable, policy-governed, and tenant-bound.

  **Normative constraints**
  - Agents MUST NOT operate anonymously or under implicit trust.
  - By default, an agent inherits the tenant context and authorization scope of the initiating principal (or a safe subset).
  - Any deviation from default inheritance (dedicated agent identities, delegated user identities) MUST be explicitly configured and governed in the Control Plane.
  - Agents MUST NOT change identity/scope at runtime or self-escalate privileges.
  - Agents MUST NOT bypass identity enforcement, policy delegation, or safety gates; they MUST NOT originate governance intent or lifecycle transitions.

  **Plane responsibilities**
  - Control Plane: defines agent identity types, allowable scopes, delegation boundaries, and lifecycle of dedicated agent identities.
  - Application Plane: instantiates agents under an explicit governed identity; ensures each tool/action is authorized within delegated scope; propagates tenant/principal context to all downstream calls and telemetry.
  - Data Plane: enforces access according to agent identity and tenant context; must not accept raw end-user credentials from agents.

  **Evidence hooks**
  - Design specifies the agent identity mode (service, per-agent, delegated user) and required claims, plus rejection behavior on missing/unverified claims.
  - Tool invocation and workflow steps include explicit principal attribution and correlation identifiers.
  - Audit/telemetry can answer who acted, under which identity/scope, for which tenant, under which policy, and with what outcome.

  **Common failure modes**
  - “Anonymous agent” execution or hidden identity inheritance.
  - Shared high-privilege credentials reused across tenants.
  - Tool access granted outside policy-gated, versioned governance intent.

