pattern_id: EXT-LANDING_ZONE
name: Landing Zone
summary: Standard org/accounts, network, logging, security baseline
intent: 'Provide standardized cloud foundation: accounts/subscriptions, networking, security, logging, and guardrails.'
context: Organizations with multiple teams/accounts/subscriptions needing consistent security, networking, and cost controls.
problem: Without standards, teams reinvent foundations and drift from security/cost best practices.
forces_tradeoffs: Standardization vs flexibility; speed vs governance; up-front platform work vs long-term savings.
solution_structure_behavior: A standardized cloud foundation that sets up accounts/projects, networking, IAM, logging, and
  security baselines to support scalable, governed adoption. Landing zones codify guardrails and shared services so teams
  can deploy safely and consistently from day one.
consequences: Faster onboarding and safer defaults; requires platform ownership and continuous improvement.
implementation_notes: Codify guardrails, provide templates, centralize logging/security, and use tagging/budgets for cost
  visibility.
examples_known_uses: Enterprise cloud foundations, multi-account orgs, platform engineering enablement.
related_patterns: |
  depends_on: OBS-01
  complements: CFG-01
  complements: CTX-01
  complements: POL-01
extended_definition: A standardized cloud foundation that sets up accounts/projects, networking, IAM, logging, and security
  baselines to support scalable, governed adoption. Landing zones codify guardrails and shared services so teams can deploy
  safely and consistently from day one.
