$schema: "http://json-schema.org/draft-07/schema#"
title: "CAF Phase 8 ABP/PBP Resolution (v1)"
type: object
additionalProperties: false
required:
  - schema_version
  - instance_name
  - derived_at
  - generated_from
  - selected_architecture_style
  - planes
properties:
  schema_version:
    type: string
    const: phase8_abp_pbp_resolution_v1
  instance_name:
    type: string
    minLength: 1
  derived_at:
    type: string
    minLength: 1
    description: "UTC ISO-8601 timestamp"
  generated_from:
    type: object
    additionalProperties: false
    required:
      - profile_parameters_resolved
      - abp_catalog
      - pbp_catalog
    properties:
      profile_parameters_resolved:
        type: string
        minLength: 1
      abp_catalog:
        type: string
        minLength: 1
      pbp_catalog:
        type: string
        minLength: 1
  selected_architecture_style:
    type: object
    additionalProperties: false
    required:
      - style_key
      - abp_id
      - manifest_path
      - role_ids
    properties:
      style_key:
        type: string
        minLength: 1
      abp_id:
        type: string
        pattern: "^ABP-[A-Z0-9-]+$"
      manifest_path:
        type: string
        minLength: 1
      role_ids:
        type: array
        items:
          type: string
          minLength: 1
  planes:
    type: array
    minItems: 1
    items:
      type: object
      additionalProperties: false
      required:
        - plane_id
        - pbp_manifest_path
        - scaffold_directories
        - static_role_binding_keys
        - selected_abp_role_bindings
      properties:
        plane_id:
          type: string
          enum: [CP, AP, DP, AI, ST]
        pbp_manifest_path:
          type: string
          minLength: 1
        scaffold_directories:
          type: array
          items:
            type: string
        static_role_binding_keys:
          type: array
          items:
            type: string
        selected_abp_role_bindings:
          type: object
          additionalProperties: false
          required:
            - status
            - role_paths
          properties:
            status:
              type: string
              enum: [present, absent]
            role_paths:
              type: array
              items:
                type: object
                additionalProperties: false
                required:
                  - role_id
                  - path_template
                properties:
                  role_id:
                    type: string
                    minLength: 1
                  path_template:
                    type: string
                    minLength: 1
  notes:
    type: string
