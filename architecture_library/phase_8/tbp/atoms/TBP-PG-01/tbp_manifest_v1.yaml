schema_version: phase8_tbp_manifest_v1
tbp_id: TBP-PG-01
binds_to:
- atom_path: database.engine
  atom_value: postgresql
- atom_path: runtime.language
  atom_value: python
requires_tbps:
- TBP-PY-01
conflicts_with_tbps: []
layout:
  scaffold_directories:
  - infrastructure/
  role_bindings:
    database_env_contract:
      path_template: infrastructure/postgres.env.example
      artifact_class: config_stubs_non_executable
      evidence_contains:
      - POSTGRES_
    postgres_compose_candidate:
      path_template: docker/compose.candidate.yaml
      artifact_class: config_stubs_non_executable
      evidence_contains:
      - postgres
    postgres_adapter_module:
      path_templates_any_of:
      - code/ap/persistence/postgres_adapter.py
      - code/cp/persistence/postgres_adapter.py
      artifact_class: code_placeholders_non_runnable
      evidence_contains:
      - get_database_url
      - get_session_factory
    python_requirements_manifest:
      path_template: requirements.txt
      artifact_class: config_stubs_non_executable
      evidence_contains:
      - psycopg
      validator_kind: python_requirements_manifest
      validator_config:
        package_names_any_of:
        - psycopg[binary]
        - psycopg
        - psycopg2-binary
extensions:
  obligations:
  - obligation_id: O-TBP-PG-01-compose-postgres-service
    title: Materialize PostgreSQL service in candidate compose wiring without inlining runtime DATABASE_URL ownership
    required_capability: postgres_persistence_wiring
    role_binding_key: postgres_compose_candidate
  - obligation_id: O-TBP-PG-01-env-contract
    title: Materialize PostgreSQL environment contract examples (POSTGRES_* and engine-owned references as applicable)
    required_capability: postgres_persistence_wiring
    role_binding_key: database_env_contract
  - obligation_id: O-TBP-PG-01-plane-adapter-hook
    title: Materialize minimal PostgreSQL persistence adapter hook for the selected plane persistence boundary without implying application-plane-only ownership
    required_capability: postgres_persistence_wiring
    role_binding_key: postgres_adapter_module
  - obligation_id: O-TBP-PG-01-driver-dependency
    title: Materialize the PostgreSQL Python driver dependency in the canonical dependency manifest.
    required_capability: observability_and_config
    role_binding_key: python_requirements_manifest
  gates:
  - gate_id: G-PG-CONFIG-EXTERNALIZATION
    title: Externalize PostgreSQL configuration and credentials
    gate_kind: coding_standard
    required_capability: postgres_persistence_wiring
    attachment_scope: all_matching_tasks
    criteria:
    - Database credentials and endpoints are provided via environment variables (DATABASE_URL
      and/or POSTGRES_*); no credentials are hard-coded in code or versioned config.
    - Runtime wiring uses internal service DNS names for DB connectivity in compose-based
      local runs.
    - "When compose materializes a postgres support service that AP/CP startup depends on, the postgres service exposes a healthcheck and dependent services use depends_on.postgres.condition: service_healthy."
    review_questions:
    - Are any database credentials embedded directly in source code or committed configuration?
    - If compose materializes postgres for local startup, does runtime wiring gate AP/CP startup on postgres health rather than service creation order alone?
    focus_areas:
    - security
    - portability
    severity_threshold_override: high
  - gate_id: G-PG-PERSISTENCE-SEAM-REALIZATION
    title: Realize the resolved persistence seam
    gate_kind: definition_of_done
    attachment_scope: all_matching_tasks
    required_capabilities:
    - persistence_implementation
    - postgres_persistence_wiring
    criteria:
    - Persistence implementation realizes the resolved persistence seam and keeps storage interaction inside the persistence boundary for the selected rails.
    - Repository logic is expressed through the declared persistence boundary and wiring surface so runtime composition can honor the resolved persistence strategy.
    review_questions:
    - Does the persistence implementation realize the resolved persistence seam rather than bypassing it from service or boundary layers?
    - Are repository and wiring assumptions coherent with the resolved persistence rails across persistence tasks?
    focus_areas:
    - correctness
    - architecture_alignment
