schema_version: phase8_tbp_manifest_v1
tbp_id: TBP-SQLALCHEMY-01
binds_to:
  - atom_path: persistence.orm
    atom_value: sqlalchemy_orm
  - atom_path: runtime.language
    atom_value: python
requires_tbps:
  - TBP-PY-01
conflicts_with_tbps: []
layout:
  scaffold_directories:
    - code/common/persistence/
    - code/ap/persistence/
    - code/cp/persistence/
  role_bindings:
    sqlalchemy_runtime_module:
      path_template: code/common/persistence/sqlalchemy_runtime.py
      path_templates_any_of:
        - code/cp/persistence/postgres_runtime.py
        - code/ap/persistence/postgres_runtime.py
      artifact_class: code_runnable_candidate
      evidence_contains:
        - create_engine
        - sessionmaker
    sqlalchemy_metadata_module:
      path_template: code/common/persistence/sqlalchemy_metadata.py
      path_templates_any_of:
        - code/cp/persistence/postgres_runtime.py
        - code/ap/persistence/postgres_runtime.py
      artifact_class: code_runnable_candidate
      evidence_contains:
        - Base = declarative_base()
    ap_sqlalchemy_schema_bootstrap:
      path_template: code/ap/persistence/schema_bootstrap.py
      artifact_class: code_runnable_candidate
      evidence_contains:
        - bootstrap_schema
    cp_sqlalchemy_schema_bootstrap:
      path_template: code/cp/persistence/schema_bootstrap.py
      artifact_class: code_runnable_candidate
      evidence_contains:
        - bootstrap_schema
    sqlalchemy_runtime_env_contract:
      path_template: .env
      artifact_class: config_stubs_non_executable
      evidence_contains:
        - DATABASE_URL
      validator_kind: dotenv_optional_var_prefix_any_of
      validator_config:
        variable_name: DATABASE_URL
        prefixes_any_of:
          - postgresql+psycopg://
          - postgresql://
          - postgres://
    sqlalchemy_postgres_env_example_contract:
      path_template: infrastructure/postgres.env.example
      artifact_class: config_stubs_non_executable
      evidence_contains:
        - DATABASE_URL
      validator_kind: dotenv_required_var_prefix_any_of
      validator_config:
        variable_name: DATABASE_URL
        prefixes_any_of:
          - postgresql+psycopg://
          - postgresql://
          - postgres://
    python_requirements_manifest:
      path_template: requirements.txt
      artifact_class: config_stubs_non_executable
      evidence_contains:
        - sqlalchemy
      validator_kind: python_requirements_manifest
      validator_config:
        package_names_all_of:
          - sqlalchemy
extensions:
  obligations:
    - obligation_id: O-TBP-SQLALCHEMY-01-runtime-module
      title: Materialize the role-bound shared SQLAlchemy runtime module (engine/session factory) for ORM-backed persistence.
      required_capability: persistence_implementation
      role_binding_key: sqlalchemy_runtime_module
    - obligation_id: O-TBP-SQLALCHEMY-01-metadata-module
      title: Materialize the framework-legible shared SQLAlchemy metadata/base surface used by ORM-backed repositories and plane-owned bootstrap entrypoints.
      required_capability: persistence_implementation
      role_binding_key: sqlalchemy_metadata_module
    - obligation_id: O-TBP-SQLALCHEMY-01-ap-schema-bootstrap
      title: Materialize the application-plane SQLAlchemy schema bootstrap entrypoint aligned to the resolved schema management strategy.
      required_capability: persistence_implementation
      role_binding_key: ap_sqlalchemy_schema_bootstrap
    - obligation_id: O-TBP-SQLALCHEMY-01-cp-schema-bootstrap
      title: Materialize the control-plane SQLAlchemy schema bootstrap entrypoint aligned to the resolved schema management strategy.
      required_capability: persistence_implementation
      role_binding_key: cp_sqlalchemy_schema_bootstrap
    - obligation_id: O-TBP-SQLALCHEMY-01-runtime-env-contract
      title: Keep emitted runtime `.env` DATABASE_URL wiring compatible with the selected SQLAlchemy-backed rails.
      required_capability: runtime_wiring
      role_binding_key: sqlalchemy_runtime_env_contract
    - obligation_id: O-TBP-SQLALCHEMY-01-postgres-env-example-contract
      title: Keep PostgreSQL env examples compatible with the selected SQLAlchemy-backed rails.
      required_capability: postgres_persistence_wiring
      role_binding_key: sqlalchemy_postgres_env_example_contract
    - obligation_id: O-TBP-SQLALCHEMY-01-orm-dependency
      title: Materialize the SQLAlchemy ORM dependency in the canonical Python dependency manifest.
      required_capability: observability_and_config
      role_binding_key: python_requirements_manifest
  gates:
    - gate_id: G-SQLALCHEMY-ORM-REALIZATION
      title: Preserve SQLAlchemy ORM realization for ORM-backed persistence rails
      gate_kind: definition_of_done
      attachment_scope: all_matching_tasks
      required_capability: persistence_implementation
      criteria:
        - ORM-backed persistence realizes SQLAlchemy-owned runtime surfaces explicitly, including engine or session-opening helper adoption and mapped-model metadata ownership inside the persistence boundary.
        - Repository logic opens SQLAlchemy sessions through the role-bound shared runtime helper contract rather than treating a raw `sessionmaker` object as the request-scoped session context.
        - Shared runtime helpers, emitted runtime `.env`, and PostgreSQL env examples remain coherent for the accepted SQLAlchemy DATABASE_URL contract when ORM-backed postgres rails are resolved.
      review_questions:
        - Do persistence modules adopt the role-bound shared SQLAlchemy engine/session helper surfaces rather than bypassing them with raw driver code?
        - Do repository modules open sessions through the role-bound shared helper contract instead of using a raw `sessionmaker` object as the context manager?
        - Do emitted runtime/env-example DATABASE_URL surfaces stay aligned to the SQLAlchemy helper contract for the resolved ORM rails?
      focus_areas:
        - correctness
        - architecture_alignment
      severity_threshold_override: high
    - gate_id: G-SQLALCHEMY-SCHEMA-STRATEGY-ALIGNMENT
      title: Align SQLAlchemy schema bootstrap behavior to the resolved schema strategy
      gate_kind: coding_standard
      attachment_scope: all_matching_tasks
      required_capability: persistence_implementation
      criteria:
        - When schema management is code_bootstrap, SQLAlchemy metadata/bootstrap remains ORM-owned, imports or registers mapped model modules before `create_all`, and any role-bound shared helper stays infrastructural rather than acting as the cross-plane bootstrap owner.
        - When schema management is code_bootstrap, the application-plane runtime composition root invokes an AP-owned ORM bootstrap entrypoint before serving AP traffic.
        - When schema management is code_bootstrap, the control-plane runtime composition root invokes a CP-owned ORM bootstrap entrypoint before serving CP traffic.
        - When schema management is code_bootstrap, repository factories and request-scoped handlers do not own unsynchronized lazy schema bootstrap as the primary realization path; any fallback convergence stays secondary to startup ownership.
        - When schema management uses migrations, runtime persistence code avoids silently creating schema and remains compatible with migration-owned evolution.
      review_questions:
        - Do plane-owned ORM bootstrap entrypoints exist under both `code/ap/persistence/` and `code/cp/persistence/` when both planes are realized?
        - Does each runtime composition root invoke its own plane-owned bootstrap entrypoint before traffic reaches persistence adapters?
        - Do shared SQLAlchemy helpers avoid acting as the effective cross-plane bootstrap registry?
        - Do repository factories avoid request-path-first schema bootstrap as the primary realization path?
        - Does runtime persistence behavior match the resolved schema_management_strategy without introducing silent schema drift?
      focus_areas:
        - correctness
        - maintainability
