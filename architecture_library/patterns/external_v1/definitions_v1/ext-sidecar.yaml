  kind: decision_pattern
  decision_prompts:
  - Record an explicit design decision adopting or rejecting this pattern, including
    scope, required choices (option sets), and evidence anchors.
  option_sets:
  - option_set_id: ops.sidecar_responsibility
    description: Primary responsibilities assigned to sidecars and how they integrate
      with app containers.
    options:
    - option_id: network_policy_and_mtls
      summary: Sidecar handles network policy, mTLS, retries/timeouts, and traffic
        shaping.
      notes: ''
    - option_id: observability_only
      summary: Sidecar handles telemetry emission/collection only (logs/metrics/traces).
      notes: ''
    - option_id: policy_and_routing
      summary: Sidecar handles policy enforcement and routing, including authz checks
        at the edge of the pod.
      notes: ''
    - option_id: custom
      summary: Custom (fill fields).
      notes: ''
    default_option_id: network_policy_and_mtls
  human_questions:
  - question_key: ops_sidecar_responsibility
    question_id: Q-EXT-SC-01
    question: What responsibilities will sidecars handle?
    description: Select the primary responsibilities assigned to sidecars and the
      expected integration boundaries.
    option_set_id: ops.sidecar_responsibility
    specialization_notes:
    - Warranted when cross-cutting concerns should be separated from app code and
      enforced consistently per workload.
    anchors:
    - caf_pattern: EXT-SIDECAR
