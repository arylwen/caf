    - option_id: feature_shedding
      summary: Disable non-critical features under stress (e.g., via feature flags/policy).
      notes: ''
    - option_id: partial_results
      summary: Return partial responses with clear indicators and degrade non-critical sections.
      notes: ''
    - option_id: custom
      summary: Custom (fill fields).
