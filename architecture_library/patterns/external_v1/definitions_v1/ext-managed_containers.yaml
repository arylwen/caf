  kind: decision_pattern
  decision_prompts:
  - Record an explicit design decision adopting or rejecting this pattern, including
    scope, required choices (option sets), and evidence anchors.
  option_sets:
  - option_set_id: ops.managed_containers_deployment_model
    description: How container workloads are packaged and deployed on a managed container
      runtime.
    options:
    - option_id: single_service_per_unit
      summary: One service per deploy unit (task/service) with clear scaling and isolation.
      notes: ''
    - option_id: multi_service_with_sidecars
      summary: Primary container plus sidecars (proxy/telemetry/policy) in the same
        deploy unit.
      notes: ''
    - option_id: batch_and_services_mixed
      summary: Mix long-running services with scheduled/batch tasks using the same
        platform.
      notes: ''
    - option_id: custom
      summary: Custom (fill fields).
      notes: ''
