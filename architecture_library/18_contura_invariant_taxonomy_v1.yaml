notes:
- Use this taxonomy to normalize audit rows across target-system and CAF-operational catalogs.
- Automated audit reports should cite invariant IDs and docs_anchor_id values rather than raw source statement IDs.
- Selected option branches are first-class invariant rows once adopted.
reference_fields:
- id: pin_reference_ids
  description: Architect-selectable pins or pin families that shape, activate, or contextualize the invariant row.
- id: option_reference_ids
  description: Option sets or selected option branches that shape the invariant row.
- id: classification_tags
  description: Lightweight categories that help readers and audit tooling group rows without creating a second competing taxonomy.
- id: normalization_basis
  description: Short explanation of why multiple raw statements were normalized into this row and how pins/options are represented.
classification_tags:
- id: pin
  description: The row is shaped or activated by one or more architect-selectable pins.
- id: option
  description: The row is shaped or activated by one or more option sets or branches.
- id: adopted_shape
  description: The row is an option-branch invariant that becomes binding once selected.
- id: tenancy
  description: Tenant ownership, isolation, or tenant-context semantics.
- id: tenant_context
  description: Tenant-context ingress, propagation, or conflict semantics.
- id: identity
  description: Identity, trust, actor, or attribution semantics.
- id: policy
  description: Policy authority, distribution, or no-bypass semantics.
- id: runtime
  description: Runtime posture, eventing, framework, or behavior semantics.
- id: ui_binding
  description: UI boundary, deployment, or component binding semantics.
- id: integration
  description: Integration ports, adapters, or external contract semantics.
- id: storage
  description: Data plane, persistence, or storage semantics.
- id: evidence
  description: Telemetry, audit, or compliance evidence semantics.
counting_rules:
- Family summaries explain the forest but are not part of the flat invariant-row count.
- Atomic invariants are the main normalized target-system rows.
- Option-branch invariants are the adopted-shape rows.
- Pins and options remain references and tags inside invariant rows; they are not counted as a separate top-level row type in this taxonomy.
