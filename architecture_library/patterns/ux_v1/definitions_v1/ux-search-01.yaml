pattern_id: UX-SEARCH-01
name: Search, Filter, and Sort Workspace
summary: Use a search/filter/sort workspace when users need repeatable query control over operationally meaningful result sets, not just a decorative search box.
intent: Provide a durable result-management surface with query controls, saved or shareable state, and clear handling of empty, stale, or partial results.
context: Operational listings, admin catalogs, review backlogs, audit/history browsing, analytics support screens, tenant-scoped inventories.
problem: Ad hoc search bars and disconnected filters fail once datasets matter operationally; users lose state, cannot share views, and do not trust result freshness or scope.
forces_tradeoffs: Flexibility vs simplicity; live updates vs stable result sets; dense controls vs cognitive load; exactness vs speed.
solution_structure_behavior: Use an explicit search/filter/sort workspace with persistent criteria, visible scope, result metadata, and deterministic transitions into detail/worklist/review flows. Make no-results, stale-results, and partial-failure states first-class.
consequences: Improves navigability and operational trust; requires careful control of filter sprawl and clear explanations of applied scope.
implementation_notes: Treat search as a workspace when result handling is the job. Do not collapse large operational query behavior into a generic header search.
examples_known_uses: Case search, tenant inventory views, audit/event history, reviewer queues with filters, content moderation search.
related_patterns: |
  depends_on: CTX-01
  depends_on: EXT-MATERIALIZED_VIEW
  complements: UX-WORKLIST-01
  complements: UX-BULK-01
  complements: UX-RECOVERY-01
extended_definition: |
  Use an explicit search/filter/sort workspace with persistent criteria, visible scope, result metadata, and deterministic transitions into detail/worklist/review flows. Make no-results, stale-results, and partial-failure states first-class.

