  option_sets:
  - option_set_id: caching.cache_aside_invalidation_model
    description: How cache-aside entries are invalidated or refreshed.
    options:
    - option_id: ttl_only
      summary: Use TTL-based invalidation only; accept bounded staleness and occasional misses.
      notes: ''
    - option_id: explicit_invalidation
      summary: Explicitly invalidate/refresh cache entries on writes or via events.
      notes: ''
    - option_id: mixed_ttl_plus_invalidation
      summary: Use explicit invalidation for key flows plus TTL as a safety net.
      notes: ''
    - option_id: custom
      summary: Custom (fill fields).
      notes: ''
    default_option_id: mixed_ttl_plus_invalidation
  human_questions:
  - question_key: caching_cache_aside_invalidation_model
    question_id: Q-EXT-CA-01
    question: Which cache-aside invalidation model should be used?
    description: Select TTL-only, explicit invalidation/refresh, or a mixed approach with TTL safety net.
    option_set_id: caching.cache_aside_invalidation_model
    specialization_notes:
