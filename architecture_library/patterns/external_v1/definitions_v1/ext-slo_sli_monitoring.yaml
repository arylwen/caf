pattern_id: EXT-SLO_SLI_MONITORING
name: SLO/SLI Monitoring
summary: Alert on user-impacting metrics
intent: Measure user-facing reliability and alert on meaningful error budget burn.
context: Microservices and async flows where debugging spans many components and failures are partial.
problem: Without consistent telemetry, issues are hard to detect, triage, and remediate quickly.
forces_tradeoffs: Signal quality vs cost/volume; cardinality vs queryability; instrumentation effort vs MTTR reduction.
solution_structure_behavior: A reliability practice that defines Service Level Indicators (SLIs) to measure user-facing behavior
  (latency, availability, correctness) and Service Level Objectives (SLOs) as targets. Alerting focuses on error budget burn
  and user impact, reducing noisy alerts and guiding prioritization.
consequences: Faster detection and lower MTTR; increased telemetry costs and governance requirements.
implementation_notes: Standardize correlation IDs, structured logs, tracing, and SLOs; alert on user impact; sample intelligently.
examples_known_uses: Production incident response, performance tuning, auditing critical flows.
related_patterns: |
  depends_on: OBS-01
  complements: CFG-01
  complements: CTX-01
  complements: POL-01
extended_definition: A reliability practice that defines Service Level Indicators (SLIs) to measure user-facing behavior (latency,
  availability, correctness) and Service Level Objectives (SLOs) as targets. Alerting focuses on error budget burn and user
  impact, reducing noisy alerts and guiding prioritization.
