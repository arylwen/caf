<svg xmlns="http://www.w3.org/2000/svg" width="980" height="760" viewBox="0 0 980 760" role="img" aria-label="CAF operating loop">

<style>
  .title { font: 700 22px Arial, Helvetica, sans-serif; fill: #0f172a; }
  .subtitle { font: 400 12px Arial, Helvetica, sans-serif; fill: #334155; }
  .box { fill: #ffffff; stroke: #475569; stroke-width: 2; rx: 14; ry: 14; }
  .accent { fill: #eff6ff; stroke: #2563eb; stroke-width: 2; rx: 14; ry: 14; }
  .side { fill: #fff7ed; stroke: #c2410c; stroke-width: 2; rx: 12; ry: 12; }
  .ok { fill: #ecfdf5; stroke: #15803d; stroke-width: 2; rx: 14; ry: 14; }
  .warn { fill: #fff1f2; stroke: #be123c; stroke-width: 2; rx: 14; ry: 14; }
  .label { font: 700 18px Arial, Helvetica, sans-serif; fill: #0f172a; }
  .small { font: 400 12px Arial, Helvetica, sans-serif; fill: #334155; }
  .arrow { stroke: #475569; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
  .dashed { stroke-dasharray: 7 6; }
  .note { font: 700 13px Arial, Helvetica, sans-serif; fill: #9a3412; }
</style>

<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
  </marker>
</defs>
<rect width="100%" height="100%" fill="#f8fafc" />
<text x="490" y="36" class="title" text-anchor="middle">CAF operating loop</text><text x="490" y="58" class="subtitle" text-anchor="middle">CAF is an operating model, not a one-time pipeline.</text><rect x="350" y="100" width="280" height="74" class="accent" /><text x="490" y="145" class="label" text-anchor="middle">Human / Team</text><rect x="350" y="210" width="280" height="74" class="box" /><text x="490" y="255" class="label" text-anchor="middle">CAF Command Surface</text><rect x="350" y="330" width="280" height="86" class="box" /><text x="490" y="378" class="label" text-anchor="middle">Reference Architecture<tspan x="490" dy="20">State</tspan></text><rect x="120" y="500" width="280" height="86" class="box" /><text x="260" y="548" class="label" text-anchor="middle">Planned Work /<tspan x="260" dy="20">Candidate Code</tspan></text><rect x="580" y="500" width="280" height="86" class="box" /><text x="720" y="548" class="label" text-anchor="middle">Ask / Query<tspan x="720" dy="20">Surface</tspan></text><rect x="350" y="620" width="280" height="74" class="warn" /><text x="490" y="665" class="label" text-anchor="middle">Gates / Enforcement</text><line x1="490" y1="174" x2="490" y2="210" class="arrow" /><line x1="490" y1="284" x2="490" y2="330" class="arrow" /><polyline points="430,416 260,416 260,500" class="arrow" /><polyline points="550,416 720,416 720,500" class="arrow" /><polyline points="260,586 260,657 350,657" class="arrow" /><polyline points="720,586 720,657 630,657" class="arrow" /><polyline points="720,543 910,543 910,150 630,150" class="arrow" /><text x="875" y="135" class="small" text-anchor="middle">next change</text></svg>