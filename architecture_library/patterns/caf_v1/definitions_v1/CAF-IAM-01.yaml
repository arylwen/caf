pattern_id: CAF-IAM-01
name: Identity Principal Taxonomy (Platform/Tenant/Service/Agent)
summary: Define canonical principal types and treat identity as a platform concern with explicit governance.
intent: Provide a shared identity vocabulary and prevent authority leakage and semantic drift in identity decisions.
context: Multi-tenant systems where users, services, and agents perform operations that require attribution and policy.
problem: Conflating identity types or treating identity as an implementation detail leads to inconsistent enforcement and
  poor auditability.
forces_tradeoffs: Centralized governance vs local implementation flexibility; strict identity typing vs integration friction.
solution_structure_behavior: Define principal categories (platform user, tenant user, service, agent) with explicit attributes
  and lifecycle governance in CP; downstream planes consume identity deterministically.
consequences: Improves consistency and traceability; requires explicit principal modeling and propagation contracts.
implementation_notes: Avoid vendor/protocol prescriptions; define minimal required attributes and propagation requirements.
examples_known_uses: Differentiating admin control actions from tenant workflow actions; service-to-service auth with explicit
  principals.
related_patterns: |
  complements: CAF-AID-01
  complements: CAF-MTEN-01
  complements: CAF-POL-02
  complements: CAF-XPLANE-02
  complements: CAF-ZT-01
extended_definition: |
  **Normative constraints**

  - Identity is a **platform concern** (not an application-local detail): authority for identity primitives and trust relationships **MUST** be governed centrally and applied consistently across planes.
  - The system **MUST** use a **bounded, platform-defined set of principal types** (e.g., platform users, tenant users, services, agents). Downstream components **MUST NOT** invent new principal categories with platform-wide meaning.
  - Platform actors (operators/automation) **MUST** remain distinguishable from tenant actors; platform identities **MUST NOT** be used to execute tenant business workflows.
  - Identity decisions **MUST** make tenant and trust boundaries explicit (who/what is acting, on whose behalf, under which tenant/scope).

  **Canonical principal taxonomy (minimum)**

  - **Platform users:** Contura operators/admins/automation governed by the Control Plane; platform-level actions only; always auditable as platform actors.
  - **Tenant users:** end-users acting within a tenant’s business workflows.
  - **Services:** backend components acting under a governed service identity.
  - **Agents:** AI or automated workflows operating under bounded, reviewable authority.

  **Evidence hooks**

  - Specs/designs name the principal types the system recognizes and where each is issued/governed.
  - Cross-plane interfaces and protected operations require explicit principal identifiers and scope (tenant + principal type).

  **Common failure modes**

  - Treating “user” as a single undifferentiated identity (mixing platform admin and tenant actor authority).
  - Allowing ungoverned service/agent identities or ad-hoc principal categories that drift across teams.
  - Using platform identities to perform tenant workflow actions (authority leakage).

