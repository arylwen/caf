pattern_id: EXT-CANARY_RELEASE
name: Canary Release
summary: Gradual traffic shift to new version
intent: Gradual traffic shift to new version
context: Teams shipping frequently with high availability requirements and multiple environments.
problem: Risky deployments and environment drift lead to outages and slow delivery.
forces_tradeoffs: Speed vs safety; cost of parallel environments vs reduced downtime; flexibility vs standardization.
solution_structure_behavior: A progressive delivery strategy that exposes a new version to a small subset of traffic first,
  then increases exposure as health metrics remain stable. It reduces blast radius and supports quick rollback, but depends
  on strong observability, automated analysis, and stable routing/traffic-splitting controls.
consequences: Lower release risk and better repeatability; added pipeline and environment management overhead.
implementation_notes: Automate builds, use IaC, bake artifacts once, promote through environments, and use progressive delivery
  with fast rollback.
examples_known_uses: Zero-downtime deploys, regulated releases, multi-tenant SaaS releases.
related_patterns: |
  depends_on: OBS-01
  complements: CFG-01
  complements: CTX-01
  complements: POL-01
extended_definition: A progressive delivery strategy that exposes a new version to a small subset of traffic first, then increases
  exposure as health metrics remain stable. It reduces blast radius and supports quick rollback, but depends on strong observability,
  automated analysis, and stable routing/traffic-splitting controls.
