# architecture_library/phase_8/84_phase_8_profile_parameters_template_v1.yaml
#
# Phase 8 Profile Parameters (UX inputs, minimal).
#
# Architects should edit ONLY the pinned UX knobs:
# - lifecycle.evolution_stage
# - lifecycle.generation_phase
# - architecture.architecture_style
# - platform.infra_target
# - platform.packaging
# - platform.runtime_language
# - platform.database_engine
# - ui.present / ui.kind / ui.framework / ui.deployment_preference / ui.component_system (when a browser UI is in scope)
#
# Canonical source of supported pinned values for this file:
# - architecture_library/phase_8/84_phase_8_profile_parameters_template_v1.yaml
# Starter templates under architecture_library/phase_8/profile_templates/* must remain aligned to this file.
#
# Everything else is derived by CAF into:
# - reference_architectures/<name>/spec/guardrails/profile_parameters_resolved.yaml
#   - includes the canonical deployment identity (`deployment.stack_name`), derived from `instance_name`
#
schema_version: "phase8_profile_parameters_v1"
instance_name: "{{instance_name}}"
# created_at: "2026-01-10T12:34:56Z"  # optional ISO-8601 timestamp (copied through exactly if present)

lifecycle:
  # evolution_stage (allowed values):
  # - stage_0_local_prototype
  # - stage_1_free_tier
  # - stage_2_early_adopters
  # - stage_3_growth
  # - stage_4_scale_up
  # - stage_5_enterprise
  evolution_stage: "stage_0_local_prototype"

  # generation_phase (allowed values):
  # - architecture_scaffolding
  # - implementation_scaffolding
  # - pre_production
  # - production_hardening
  generation_phase: "architecture_scaffolding"

architecture:
  # architecture_style (allowed values):
  # - clean_architecture
  # - layered_architecture
  # - custom
  architecture_style: "clean_architecture"

platform:
  # infra_target (allowed values):
  # - local
  # - aws
  # - awslocal
  # - azure
  # - gcp
  # - heroku
  infra_target: "local"

  # packaging (allowed values):
  # - podman_compose
  # - docker_compose
  # - kubernetes
  # - serverless
  packaging: "docker_compose"

  # runtime_language (allowed values):
  # - python
  # - typescript
  # - csharp
  # - node
  # - go
  # - java
  runtime_language: "python"

  # database_engine (allowed values):
  # - postgres
  # - mysql
  # - sqlserver
  # - sqlite
  # - none
  database_engine: "postgres"

  # dependency_wiring_mode (allowed values):
  # - framework_managed
  # - manual_composition_root
  dependency_wiring_mode: "manual_composition_root"

ui:
  # UI pins are machine-consumed. Product-facing UI description belongs in application_spec_v1.md.
  present: true

  # kind (allowed values):
  # - web_spa
  kind: "web_spa"

  # framework (allowed values):
  # - react
  framework: "react"

  # deployment_preference (allowed values):
  # - separate_ui_service
  # - served_by_application_plane
  deployment_preference: "separate_ui_service"

  # component_system (allowed values):
  # - shadcn
  component_system: "shadcn"

meta:
  # Optional metadata. If present, values MUST be non-empty (CAF rejects empty strings as placeholders).
  # requested_by: "caf-saas-init"
  # change_reason: "initial_instance_creation"
  # notes: "Initialized by caf-saas-init."
