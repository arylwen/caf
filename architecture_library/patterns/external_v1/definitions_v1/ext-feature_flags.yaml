pattern_id: EXT-FEATURE_FLAGS
name: Feature Flags
summary: Toggle behavior safely
intent: Safely control rollout and behavior changes without redeploying.
context: Microservices and async flows where debugging spans many components and failures are partial.
problem: Without consistent telemetry, issues are hard to detect, triage, and remediate quickly.
forces_tradeoffs: Signal quality vs cost/volume; cardinality vs queryability; instrumentation effort vs MTTR reduction.
solution_structure_behavior: "A technique to control application behavior via runtime-configurable toggles. Flags enable gradual\
  \ rollouts, A/B tests, and rapid kill switches without redeploying. They require governance for lifecycle cleanup, blast-radius\
  \ scoping, and preventing \u2018flag debt.\u2019"
consequences: Faster detection and lower MTTR; increased telemetry costs and governance requirements.
implementation_notes: Standardize correlation IDs, structured logs, tracing, and SLOs; alert on user impact; sample intelligently.
examples_known_uses: Production incident response, performance tuning, auditing critical flows.
related_patterns: |
  depends_on: OBS-01
  complements: CFG-01
  complements: CTX-01
  complements: POL-01
extended_definition: |
  A technique to control application behavior via runtime-configurable toggles. Flags enable gradual rollouts, A/B tests, and rapid kill switches without redeploying. They require governance for lifecycle cleanup, blast-radius scoping, and preventing ‘flag debt.’
