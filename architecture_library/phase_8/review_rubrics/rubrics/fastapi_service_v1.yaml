schema_version: v1
kind: review_rubric
rubric_id: RR-FASTAPI-SVC-01
title: FastAPI service best practices (v1)
applies_when:
  - condition: "platform.runtime_language == python AND adopted.runtime.framework == fastapi"
checks:
  - check_id: RR-FA-CORR-01
    severity: blocker
    category: correctness
    rule: "Router wiring is complete: API endpoints are reachable from the app entrypoint (include_router or equivalent)."
    evidence_hints:
      - "verify app factory / main registers routers"
  - check_id: RR-FA-SEC-01
    severity: high
    category: security
    rule: "Request validation is enforced via Pydantic models (or equivalent), not ad-hoc dict parsing in route handlers."
    evidence_hints:
      - "route signatures should use typed models"
  - check_id: RR-FA-BOUNDARY-ERR-01
    severity: high
    category: correctness
    rule: "Fail-closed auth/policy exceptions are translated at the boundary/composition root into explicit HTTP responses instead of leaking as raw 500 errors."
    evidence_hints:
      - "inspect the FastAPI composition root and boundary wiring for exception handlers or equivalent fail-closed mapping"
      - "fail if PermissionError/authorization failure paths can bubble through API routes as uncaught framework 500s"
  - check_id: RR-FA-SCHEMA-BOOTSTRAP-01
    severity: blocker
    category: correctness
    rule: "When resolved schema_management_strategy is code_bootstrap, the FastAPI composition root invokes its plane-owned schema bootstrap entrypoint before serving traffic, and repository/request paths are not the primary bootstrap owner."
    evidence_hints:
      - "inspect main/app factory surfaces for lifespan or startup wiring that calls the plane-owned bootstrap entrypoint for the plane served by that runtime"
      - "inspect repository factory / dependency-provider surfaces for request-path-first bootstrap ownership"
      - "fail if code_bootstrap is selected but schema bootstrap remains dormant, or if the composition root still relies on a shared cross-plane bootstrap seam as the primary proof surface"
  - check_id: RR-FA-ARCH-01
    severity: medium
    category: architecture
    rule: "Keep route handlers thin: delegate business logic to service layer; avoid large handlers doing persistence and policy inline."
    evidence_hints:
      - "handlers call services/facades"
