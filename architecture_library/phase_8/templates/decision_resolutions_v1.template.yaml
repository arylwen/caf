# Decision Resolutions Registry (v1)
# Canonical path: reference_architectures/<name>/spec/playbook/decision_resolutions_v1.yaml
#
# Purpose:
# - Record human resolution (adopt/reject/defer) of CAF-proposed candidates emitted in specs.
# - Enable traceability across hops (specs → design → plan → build).
#
# Rules:
# - Only status=adopt is binding input to downstream steps.
# - Missing semantics MUST be captured as status=defer + rationale and/or resolved_values.
# - Every entry MUST include at least one legitimacy anchor.
#
schema_version: decision_resolutions_v1

decisions: []
