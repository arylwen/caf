caf:
  layer: caf
  verifiability: plan_ready
  plane: both
  default_anchor_policy: requires_explicit_design_decision
  allowed_anchor_types:
  - checklist_item
  - caf_pattern
  - core_pattern
  - tbp
  - rail
  default_anchor:
    anchor_type: checklist_item
    anchor_id: REQUIRES_HUMAN_DECISION_ID
  minimum_evidence:
  - System scope includes governance/control concerns distinct from tenant-facing workflows and data/compute responsibilities.
  decision_prompts:
  - Record an explicit design decision adopting or rejecting this pattern, including scope, constraints/required choices,
    and evidence anchors.
  definition_of_done:
  - Verify that each cross-plane interaction follows an approved interaction shape (explicit interface/event) and does not
    leak authority.
  capabilities_needed: []
  forbidden_assumptions:
  - No cloud vendor or product selection implied by this pattern.
  kind: decision_pattern
  option_sets:
  - option_set_id: cross_plane.interaction_mode
    description: Which cross-plane interaction mode(s) are allowed for this boundary.
    options:
    - option_id: synchronous_api
      summary: Synchronous request/response API call across the plane boundary.
      mode: synchronous_api
      notes: ''
    - option_id: async_message
      summary: Asynchronous message/event across the plane boundary.
      mode: async_message
      notes: ''
    - option_id: artifact_handoff
      summary: Artifact/handle handoff (e.g., contract, plan, or data artifact) across the boundary.
      mode: artifact_handoff
      notes: ''
    - option_id: custom
      summary: Custom (fill fields).
      mode: ''
      notes: ''
    default_option_id: synchronous_api
  human_questions:
  - question_key: cross_plane_interaction
    question_id: Q-XPLANE-MODE-01
    question: Which cross-plane interaction mode(s) are allowed (synchronous API, async message, artifact handoff)?
    description: Select allowed interaction modes for cross-plane boundaries.
    option_set_id: cross_plane.interaction_mode
    specialization_notes:
    - Warranted whenever two planes integrate; constrain modes to reduce implicit coupling.
    - If an existing Plane Integration Contract section already pins modes, keep this consistent.
    anchors:
    - caf_pattern: CAF-XPLANE-01
