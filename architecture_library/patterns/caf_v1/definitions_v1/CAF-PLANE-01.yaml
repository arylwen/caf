caf:
  layer: caf
  verifiability: plan_ready
  plane: both
  default_anchor_policy: requires_explicit_design_decision
  allowed_anchor_types:
  - checklist_item
  - caf_pattern
  - core_pattern
  - tbp
  - rail
  default_anchor:
    anchor_type: checklist_item
    anchor_id: REQUIRES_HUMAN_DECISION_ID
  minimum_evidence:
  - Spec/design explicitly states multi-tenancy or tenant isolation requirements.
  - System scope includes governance/control concerns distinct from tenant-facing
    workflows and data/compute responsibilities.
  decision_prompts:
  - Record an explicit design decision adopting or rejecting this pattern, including
    scope, constraints/required choices, and evidence anchors.
  definition_of_done:
  - Verify that responsibilities are separated into Control, Application, and Data
    planes in the design artifact and module structure.
  - Verify that cross-plane interactions are documented and constrained (allowed/prohibited).
  capabilities_needed: []
  forbidden_assumptions:
  - No cloud vendor or product selection implied by this pattern.
  kind: decision_pattern
  option_sets:
  - option_set_id: cp_ap.contract_surface
    description: Primary CP↔AP integration surface for control/coordination flows.
    options:
    - option_id: synchronous_http
      summary: CP↔AP calls via HTTP APIs.
    - option_id: async_events
      summary: CP↔AP coordination via async events/messages.
    - option_id: mixed
      summary: 'Mix: sync for enforcement, async for lifecycle and audit.'
    - option_id: custom
      summary: Custom (fill notes).
    default_option_id: mixed
  human_questions:
  - question_key: cp_ap_contract_surface
    question_id: Q-CP-AP-SURFACE-01
    question: What is the primary CP↔AP contract surface (sync HTTP APIs, async events/messages, or a mixed approach)?
    description: Select the primary integration surface between Control Plane and Application Plane for governance and coordination flows.
    option_set_id: cp_ap.contract_surface
    specialization_notes:
    - Warranted when CAF-PLANE-01 is adopted and CP↔AP interactions exist.
    - If a plane integration contract section is present, populate this question there rather than duplicating elsewhere.
    anchors:
    - caf_pattern: CAF-PLANE-01
    semantic_acceptance:
      attachments:
      - attachment_id: cp_ap_contract_surface_realization
        attachment_scope: all_matching_tasks
        required_capabilities:
        - contract_scaffolding
        - runtime_wiring
        criteria:
        - Contract and runtime wiring surfaces realize the adopted CP↔AP contract surface consistently across the boundary.
        - Control/Application interaction semantics remain explicit and coherent with the adopted boundary shape through runtime wiring.
        review_questions:
        - Do contract and runtime tasks realize one coherent CP↔AP surface aligned to the adopted decision?
        - Is the adopted CP↔AP surface preserved consistently between boundary definition and runtime wiring?
        focus_areas:
        - architecture_alignment
        - correctness

