<svg xmlns="http://www.w3.org/2000/svg" width="920" height="740" viewBox="0 0 920 740" role="img" aria-label="CAF traceability chain">

<style>
  .title { font: 700 22px Arial, Helvetica, sans-serif; fill: #0f172a; }
  .subtitle { font: 400 12px Arial, Helvetica, sans-serif; fill: #334155; }
  .box { fill: #ffffff; stroke: #475569; stroke-width: 2; rx: 14; ry: 14; }
  .accent { fill: #eff6ff; stroke: #2563eb; stroke-width: 2; rx: 14; ry: 14; }
  .side { fill: #fff7ed; stroke: #c2410c; stroke-width: 2; rx: 12; ry: 12; }
  .ok { fill: #ecfdf5; stroke: #15803d; stroke-width: 2; rx: 14; ry: 14; }
  .warn { fill: #fff1f2; stroke: #be123c; stroke-width: 2; rx: 14; ry: 14; }
  .label { font: 700 18px Arial, Helvetica, sans-serif; fill: #0f172a; }
  .small { font: 400 12px Arial, Helvetica, sans-serif; fill: #334155; }
  .arrow { stroke: #475569; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
  .dashed { stroke-dasharray: 7 6; }
  .note { font: 700 13px Arial, Helvetica, sans-serif; fill: #9a3412; }
</style>

<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
  </marker>
</defs>
<rect width="100%" height="100%" fill="#f8fafc" />
<text x="460" y="36" class="title" text-anchor="middle">CAF traceability chain</text><text x="460" y="58" class="subtitle" text-anchor="middle">CAF keeps visible lineage from requirement to candidate code.</text><rect x="120" y="100" width="320" height="80" class="accent" /><text x="280.0" y="146" class="label" text-anchor="middle">Requirement</text><rect x="120" y="210" width="320" height="80" class="box" /><text x="280.0" y="256" class="label" text-anchor="middle">Architecture<tspan x="280.0" dy="20">Decision</tspan></text><rect x="120" y="320" width="320" height="80" class="box" /><text x="280.0" y="366" class="label" text-anchor="middle">Pattern /<tspan x="280.0" dy="20">Obligation</tspan></text><rect x="120" y="430" width="320" height="80" class="box" /><text x="280.0" y="476" class="label" text-anchor="middle">Planned Work</text><rect x="120" y="540" width="320" height="80" class="box" /><text x="280.0" y="586" class="label" text-anchor="middle">Candidate Code</text><line x1="280.0" y1="180" x2="280.0" y2="210" class="arrow" /><line x1="280.0" y1="290" x2="280.0" y2="320" class="arrow" /><line x1="280.0" y1="400" x2="280.0" y2="430" class="arrow" /><line x1="280.0" y1="510" x2="280.0" y2="540" class="arrow" /><rect x="560" y="250" width="240" height="120" class="side" /><text x="680.0" y="298" class="label" text-anchor="middle">Ask / Audit /<tspan x="680.0" dy="20">Impact Queries</tspan></text><polyline points="560,310 470,360 440,360" class="arrow dashed" /><polyline points="560,340 470,470 440,470" class="arrow dashed" /><polyline points="560,280 470,250 440,250" class="arrow dashed" /><text x="680" y="410" class="note" text-anchor="middle">Queries inspect the chain<tspan x="680" dy="16">instead of guessing.</tspan></text></svg>