- family_id: SHAPE-FAM-02
  family_name: Multi-tenant isolation and explicit tenant-context discipline
  family_statement: Tenant ownership, explicit tenant binding, immutable context, end-to-end propagation, and fail-closed rejection of missing or unverifiable tenant scope are intended system invariants rather than implementation details.
  why_architects_care: Tenant isolation is one of the core reasons to architect the system deliberately. If tenant context can be inferred, dropped, or softened, cross-tenant leakage becomes a structural risk.
  activation_summary: Isolation and explicit context are always-on. Carrier and propagation-mechanism options choose how the invariant is realized, not whether it exists.
  major_pin_families:
  - tenancy.*
  - tenant_context.*
  - request_context.*
