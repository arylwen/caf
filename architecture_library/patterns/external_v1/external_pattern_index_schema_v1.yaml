$schema: https://json-schema.org/draft/2020-12/schema
$title: CAF External Pattern Index Schema v1
$type: object
additionalProperties: false
required:
  - index_version
  - patterns
properties:
  index_version:
    type: string
    const: external_pattern_index_v1
  patterns:
    type: array
    minItems: 1
    items:
      type: object
      additionalProperties: false
      required:
        - pattern_id
        - name
        - layer
        - verifiability
        - plane
        - source_path
      properties:
        pattern_id:
          type: string
          pattern: '^EXT-[A-Z0-9_]+$'
        name:
          type: string
        layer:
          type: string
          enum:
            - external
        verifiability:
          type: string
          enum:
            - plan_ready
            - overlay_candidate
            - deferred_advisory
        plane:
          type: string
          enum:
            - application
            - control
            - both
        source_path:
          type: string
          pattern: "^architecture_library/patterns/external_v1/definitions_v1/.+\\.yaml$"
