      summary: Snapshots only with periodic backups; recovery limited to snapshot points.
      notes: ''
    - option_id: continuous_logs
      summary: Continuous log capture enabling point-in-time restore within the retention window.
      notes: ''
    - option_id: snapshots_plus_logs
      summary: Snapshots plus continuous logs for faster restore and flexible PITR.
      notes: ''
    - option_id: custom
      summary: Custom (fill fields).
