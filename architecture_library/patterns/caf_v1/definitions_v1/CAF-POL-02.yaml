extended_definition: |
  **Normative constraints**

  - Policy responsibilities are intentionally separated across planes to prevent semantic drift and authority leakage.
  - **Control Plane** is the **source of policy truth** and lifecycle authority. CP **MUST** author/validate, version, distribute, and govern who may change policy, and record lineage/intent. CP **MUST NOT** execute tenant business workflows or interpret policy ad-hoc at runtime.
  - **Application Plane** is the primary runtime evaluation/enforcement surface. AP **MUST** invoke policy evaluation deterministically, provide complete context, enforce outcomes consistently, and **reject execution when required context is missing**. AP **MUST NOT** bypass evaluation or modify policy semantics.
  - **Data Plane** is the final enforcement boundary. DP **MUST** enforce policy-derived constraints (access/retention/isolation), validate tenant/identity scope on data access, reject non-compliant operations, and emit immutable tenant-scoped audit records. DP **MUST NOT** define policy or execute governance logic independently.

  **Evidence hooks**

  - Plane interfaces specify how policy artifacts/versions are distributed and bound to evaluations.
  - Designs identify enforcement points per plane and define fail-closed behavior on missing policy/context.

  **Common failure modes**

  - AP embedding “policy truth” (ad-hoc overrides, semantic reinterpretation).
  - DP implementing independent policy logic rather than enforcing derived constraints.
  - Caching decisions without version binding, causing silent drift.

