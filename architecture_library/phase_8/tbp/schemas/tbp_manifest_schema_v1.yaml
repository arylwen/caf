$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "contura://caf/schemas/phase8_tbp_manifest/v1"
title: "CAF Phase 8 TBP Manifest (v1)"
type: object
additionalProperties: false

required:
  - schema_version
  - tbp_id
  - binds_to
  - requires_tbps
  - conflicts_with_tbps

$defs:
  semantic_acceptance_gate:
    type: object
    additionalProperties: false
    required: [gate_id, gate_kind, criteria]
    anyOf:
      - required: [required_capability]
      - required: [required_capabilities]
      - required: [role_binding_key]
    properties:
      gate_id:
        type: string
        minLength: 3
      title:
        type: string
        minLength: 1
      gate_kind:
        type: string
        enum: [definition_of_done, coding_standard, guardrail]
        description: 'How this gate should be compiled into planning artifacts (semantic only).'
      attachment_scope:
        type: string
        enum: [single_execution_anchor, all_matching_tasks]
        description: 'How planners should attach this semantic acceptance to tasks. Defaults to single_execution_anchor when omitted.'
      phase_applicability:
        type: array
        description: 'Optional list of lifecycle.generation_phase values where this gate applies. If omitted, it applies to all phases that run the planner.'
        items:
          type: string
          enum: [implementation_scaffolding, pre_production, production_hardening]
      required_capability:
        type: string
        minLength: 3
        description: 'Capability whose tasks should receive this gate (typically the capability used by a TBP obligation group).'
      required_capabilities:
        type: array
        minItems: 1
        uniqueItems: true
        items:
          type: string
          minLength: 3
        description: 'Optional multi-capability attachment surface for the same semantic acceptance rule.'
      role_binding_key:
        type: string
        minLength: 1
        description: 'Optional role binding key used to deterministically attach the gate to TBP obligations/tasks. If used, the planner must resolve it via extensions.obligations.'
      criteria:
        type: array
        minItems: 1
        items:
          type: string
          minLength: 1
        description: "Semantic acceptance criteria (Definition of Done / coding standards / guardrails). MUST NOT encode file-path or 'path exists' assertions."
      review_questions:
        type: array
        default: []
        items:
          type: string
          minLength: 1
        description: 'Optional semantic review questions to be merged into Task Graph semantic_review.review_questions.'
      focus_areas:
        type: array
        default: []
        items:
          type: string
          minLength: 1
        description: 'Optional semantic review focus area tags (e.g., security, correctness, observability).'
      severity_threshold_override:
        type: string
        enum: [blocker, high, medium, low]
        description: 'Optional override: planner may raise the task semantic_review.severity_threshold to at least this value.'
      notes:
        type: string
        description: 'Optional additional guidance (semantic only).'
properties:
  schema_version:
    type: string
    const: "phase8_tbp_manifest_v1"

  tbp_id:
    type: string
    pattern: "^TBP-[A-Z0-9]+-[0-9]{2}$"

  binds_to:
    description: "Exact-match bindings from a resolved technology profile atom path to a value."
    type: array
    items:
      type: object
      additionalProperties: false
      required: [atom_path, atom_value]
      properties:
        atom_path:
          type: string
          minLength: 1
        atom_value:
          type: string
          minLength: 1

  requires_tbps:
    type: array
    items:
      type: string
      pattern: "^TBP-[A-Z0-9]+-[0-9]{2}$"
    default: []

  conflicts_with_tbps:
    type: array
    items:
      type: string
      pattern: "^TBP-[A-Z0-9]+-[0-9]{2}$"
    default: []

  layout:
    description: "Optional deterministic layout and role bindings used by planners (e.g., Application Architect) to compute concrete output paths without hardcoding language/framework specifics."
    type: object
    additionalProperties: false
    required: []
    properties:
      code_root:
        type: string
        minLength: 1
        description: "Root path for candidate source code in the companion repo (e.g., 'code/')."

      module_conventions:
        type: object
        additionalProperties: false
        description: >
          Optional deterministic language/runtime module conventions that workers should consume
          via normal TBP resolution rather than re-deriving ad hoc.
        properties:
          absolute_import_root:
            type: string
            minLength: 1
            description: "Canonical absolute import root for stack-owned code packages (for example 'code')."
          intra_package_import_style:
            type: string
            enum: [explicit_relative_preferred, absolute_from_root]
            description: "Preferred import style for imports within the same package tree."
          plane_module_roots:
            type: object
            additionalProperties: false
            description: "Canonical module roots for CAF planes when absolute imports are needed."
            properties:
              ap:
                type: string
                minLength: 1
              cp:
                type: string
                minLength: 1

      scaffold_directories:
        type: array
        items:
          type: string
          minLength: 1
        description: "Directories that must exist for the stack (e.g., code/, tests/, docs/)."

      role_bindings:
        type: object
        additionalProperties:
          type: object
          additionalProperties: false
          required: [path_template]
          properties:
            path_template:
              type: string
              minLength: 1
              description: "Path template with optional placeholders: {resource}, {resource_lower}, {resource_snake}."
            artifact_class:
              type: string
              description: "CAF artifact class for the output path."
            evidence_contains:
              type: array
              items:
                type: string
              description: "Optional implementation hints (not deterministic checks). Workers may use these as cues when realizing the role."
            evidence_not_contains:
              type: array
              items:
                type: string
              description: "Optional implementation hints (not deterministic checks). Workers may use these as cues when realizing the role."
            validator_kind:
              type: string
              minLength: 1
              description: "Optional library-owned validator kind consumed by tools/caf generic gates when deterministic realization verification is required for this role binding."
            validator_config:
              type: object
              additionalProperties: true
              description: "Optional validator-specific configuration. Shape is defined by the validator kind, not by the generic TBP manifest schema."

  extensions:
    description: >
      Optional extension surface for TBP-declared obligations and semantic gates.
      This is intentionally "soft": v1 skills treat extensions as optional inputs.
      If present, planners must compile these declarations into Task Graph tasks and
      semantic acceptance signals using role_binding_keys (not hardcoded paths).
    type: object
    additionalProperties: false
    required: []
    properties:
      obligations:
        type: array
        default: []
        items:
          type: object
          additionalProperties: false
          required: [obligation_id, required_capability, role_binding_key]
          properties:
            obligation_id:
              type: string
              minLength: 3
            title:
              type: string
              minLength: 1
            required_capability:
              type: string
              minLength: 3
              description: "Worker capability required to materialize the obligated output."
            role_binding_key:
              type: string
              minLength: 1
              description: "Role binding key in layout.role_bindings that provides the path_template and artifact_class."
      gates:
        type: array
        default: []
        items:
          $ref: '#/$defs/semantic_acceptance_gate'
