pattern_id: UX-ASYNC-01
name: Async Job Progress and Result Surface
summary: Use an async progress/result surface when work continues after the initiating interaction and users need trustworthy visibility into pending, running, completed, or failed outcomes.
intent: Provide a UX shape for background execution that preserves operator trust, supports refresh/retry behavior, and prevents hidden long-running work.
context: Evaluations, exports, imports, report generation, background processing, queued jobs, AI-assisted generation, workflow execution.
problem: If background execution is hidden behind synchronous UI assumptions, users do not know whether work started, what state it is in, or how to recover from failure.
forces_tradeoffs: Immediate feedback vs truthful latency; live updates vs polling simplicity; per-job detail vs list-level overview; retry convenience vs idempotency and duplicate-work risks.
solution_structure_behavior: Use explicit job states, progress/result surfaces, status transitions, and retry-safe actions. Connect initiation points to result lookup and failure-recovery guidance.
consequences: Improves trust for long-running work; adds status/state complexity and may require coordination with queues, notifications, or rate limits.
implementation_notes: Async UX is not only a spinner. It needs durable state, clear transitions, and visible recovery posture.
examples_known_uses: Background report generation, AI evaluation runs, exports/imports, file processing, batch workflows.
related_patterns: |
  depends_on: OBS-01
  depends_on: EXT-QUEUE_BASED_LOAD_LEVELING
  complements: UX-RECOVERY-01
  complements: UX-WORKLIST-01
  complements: UX-BULK-01
extended_definition: |
  Use explicit job states, progress/result surfaces, status transitions, and retry-safe actions. Connect initiation points to result lookup and failure-recovery guidance.

