pattern_id: CAF-XPLANE-01
name: Allowed Cross-Plane Interaction Patterns
summary: "Define the approved shapes for Control\u2194Application\u2194Data plane interactions and delegation."
intent: Enable necessary inter-plane collaboration without leaking authority or creating hidden coupling.
context: Tri-plane Contura systems where planes must collaborate via explicit interfaces and delegated enforcement.
problem: Teams often create convenience backdoors (direct DB access, bypassing policy/identity checks) that erode governance
  and create non-auditable behavior.
forces_tradeoffs: Minimize latency and duplication while preserving authority boundaries, auditability, and deterministic
  evaluation.
solution_structure_behavior: Use explicit interfaces/events for plane interactions; CP coordinates governance and delegates
  enforcement; AP executes tenant workflows; DP provides data/compute services behind AP-mediated access and policy checks.
consequences: Prevents authority leakage and drift; may introduce additional hops and requires clear interface ownership and
  versioning.
implementation_notes: Document interaction shapes in design; enforce via dependency rules and interface contracts; use TBPs
  for implementation mechanisms (HTTP/eventing/etc.).
examples_known_uses: Platform governance services issuing policies/entitlements consumed by application services; application
  services invoking data/inference services with enforced context.
related_patterns: |
  depends_on: CAF-TCTX-01
  depends_on: OBS-01
  complements: CAF-IAM-02
  complements: CAF-MODEL-01
  complements: CAF-PLANE-01
  complements: CAF-POL-02
  complements: CAF-XPLANE-02
extended_definition: |
  **Allowed cross-plane interaction shapes (normative examples)**
  
  - **Control → Application (orchestrated):** CP instructs AP to bootstrap tenant data, rotate secrets, trigger maintenance; CP remains source of truth.
  - **Control → Data (policy distribution and provisioning):** CP provisions resources (databases/schemas/indexes/queues/retention rules) and distributes policy intent.
  - **Application → Data (tenant business operations):** AP executes tenant-scoped queries/retrieval/inference calls against DP using validated tenant context.
  - **Application → Control (feedback and requests):** AP emits usage/anomaly events and submits requests for CP to evaluate changes; CP remains authoritative.
  
  **Workflow constraints: orchestration vs choreography**
  
  - Platform-level workflows (tenant lifecycle, policy rollout, AI configuration) **MUST** be orchestrated by the Control Plane.
  - Tenant business workflows **MUST** be orchestrated in the Application Plane.
  - AP may use internal choreography (event-driven services) only if tenant context is preserved and CP-defined global invariants are not violated.
  - Data Plane **MUST NOT** orchestrate governance or tenant lifecycle; it may only coordinate data-internal maintenance.
  
  **Evidence hooks (what to show in design/spec)**
  
  - A Plane Integration Contract that lists allowed interaction modes (sync API, async message, artifact handoff) per boundary and names the owning interfaces/events.
  - For each cross-plane call: required authn/authz checks, required context (tenant + principal), and required audit/telemetry emission.
  
  **Common failure modes**
  
  - Convenience backdoors: direct DB access, bypassed policy enforcement, or “shared admin” services that collapse plane boundaries.
  - Using events as uncontrolled choreography between planes (CP must remain the orchestrator for platform workflows).
  - Losing tenant context across async boundaries or background jobs.
  
