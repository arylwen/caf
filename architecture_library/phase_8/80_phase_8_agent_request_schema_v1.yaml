$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "contura://caf/schemas/phase8_agent_request/v1"
title: "CAF Phase 8 Agent Request (v1)"
type: object
additionalProperties: false

required:
  - schema_version
  - request_id
  - created_at
  - instance
  - pins
  - missing_capabilities
  - requested_agents
  - constraints
  - acceptance

properties:
  schema_version:
    type: string
    const: "phase8_agent_request_v1"

  request_id:
    type: string
    minLength: 8
    description: "Stable identifier for the request (e.g., AR-YYYYMMDD-<slug>)."

  created_at:
    type: string
    minLength: 8

  instance:
    type: object
    additionalProperties: false
    required: [instance_name]
    properties:
      instance_name:
        type: string
        minLength: 1

  pins:
    type: object
    additionalProperties: false
    required:
      - lifecycle.evolution_stage
      - lifecycle.generation_phase
      - platform pins (infra_target/packaging/runtime_language/database_engine)
    properties:
      lifecycle.evolution_stage:
        type: string
      lifecycle.generation_phase:
        type: string
      platform pins (infra_target/packaging/runtime_language/database_engine):
        type: string

  missing_capabilities:
    description: "Capabilities required by the Task Graph that cannot be resolved to an existing agent/skill."
    type: array
    minItems: 1
    items:
      type: object
      additionalProperties: false
      required: [capability_id, used_by_tasks]
      properties:
        capability_id:
          type: string
          minLength: 3
        used_by_tasks:
          type: array
          minItems: 1
          items:
            type: string

  requested_agents:
    description: "Proposed agents to implement the missing capabilities. These proposals must not introduce new architecture choices."
    type: array
    minItems: 1
    items:
      type: object
      additionalProperties: false
      required: [agent_id, role_kind, capabilities]
      properties:
        agent_id:
          type: string
          minLength: 3
        role_kind:
          type: string
          enum: [worker]
        capabilities:
          type: array
          minItems: 1
          items:
            type: string
        skill_entrypoint:
          type: string
          description: "Relative skill path (default: skills/<agent_id>/SKILL.md)."

  constraints:
    type: object
    additionalProperties: false
    required:
      - allowed_artifact_classes
      - allowed_write_path_prefixes
      - forbidden_actions
    properties:
      allowed_artifact_classes:
        type: array
        minItems: 1
        items:
          type: string
      allowed_write_path_prefixes:
        type: array
        minItems: 1
        items:
          type: string
      forbidden_actions:
        type: array
        minItems: 1
        items:
          type: string

  acceptance:
    description: "Minimum agent contract needed for the Manager to safely execute tasks using the new agent."
    type: object
    additionalProperties: false
    required: [task_interfaces, validations]
    properties:
      task_interfaces:
        type: array
        minItems: 1
        items:
          type: object
          additionalProperties: false
          required: [task_id, inputs, definition_of_done]
          properties:
            task_id:
              type: string
            inputs:
              type: array
              items:
                type: string

              type: array
              items:
                type: string

              type: array
              minItems: 1
              items:
                type: string

      validations:
        type: array
        minItems: 1
        items:
          type: object
          additionalProperties: false
          required: [validation_id, description]
          properties:
            validation_id:
              type: string
            description:
              type: string
