pattern_id: CAF-MRAD-02
name: MRAD-2 Resumable Workflow Pattern
summary: Long-running actions return durable identifiers and can be resumed/observed without restarting.
intent: Support reliable completion of long-running actions under intermittent client connectivity.
context: Mobile workflows where clients may disconnect, background, or lose connectivity mid-operation.
problem: If progress depends on continuous connectivity, users must restart operations, creating poor UX and inconsistent
  state.
forces_tradeoffs: Operational complexity vs UX; durability/visibility of workflow state vs storage cost; synchronous simplicity
  vs async orchestration.
solution_structure_behavior: Return a durable workflow/operation ID; persist progress; provide status endpoints; ensure operations
  can continue server-side without client connectivity.
consequences: Improves reliability and user experience; requires workflow state persistence and status models.
implementation_notes: Define status model and retention; ensure status queries are authorized and tenant-scoped; avoid leaking
  workflow internals.
examples_known_uses: Uploads, AI processing jobs, batch operations, provisioning flows.
related_patterns: |
  complements: CAF-CH-01
  complements: CAF-MRAD-01
  complements: CAF-MRAD-03
  complements: CAF-MRAD-04
  complements: CAF-MRAD-05
  complements: EXT-QUEUE_BASED_LOAD_LEVELING
  complements: EXT-SAGA
extended_definition: |
  This pattern ensures **long-running actions are resumable** so mobile clients can disconnect and reconnect without restarting workflows.

  **Normative constraints**
  - Long-running actions MUST be resumable.
  - Operations MUST return a durable identifier for progress tracking.
  - Clients MUST be able to reconnect and observe status without restarting the operation.
  - Workflows MUST NOT depend on continuous client connectivity.

  **Evidence hooks**
  - The API contract exposes a durable operation/workflow identifier and a status endpoint (or equivalent).
  - Progress/state is persisted durably and can be queried by identifier.
  - The workflow can resume from a persisted state after retries or restarts.

  **Common failure modes**
  - “Fire-and-forget” operations with no durable tracking identifier.
  - Status stored only in ephemeral memory (lost on restart).
  - Resumption requires replaying all client steps (not resumable).

