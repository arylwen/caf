schema_version: caf_invariant_catalog_v1
catalog_status: public_machine_readable_catalog
notes:
- This catalog is a normalized starter sweep of CAF invariants across patterns, contracts, pins, resolved guardrails, gates, workers, and public docs.
- It now distinguishes semantic family, activation, source class, and derivation lineage so the catalog can represent both always-on framework invariants and instance-activated binding invariants.
- The current row count is still intentionally conservative; more rows should be added as maintainers sweep the full ABP/PBP/TBP/EXT and pattern-definition surfaces.
source_coverage:
  included_source_classes:
  - pins
  - profile_parameters
  - resolved_guardrails
  - abp
  - pbp
  - tbp
  - ext_pattern
  - meta_pattern
  - contract
  - schema
  - gate
  - validator
  - worker_contract
  - playbook_block
  - public_docs
  - runtime_evidence
  pending_source_classes:
  - full_pattern_definition_library
  - all_ext_pack_surfaces
  - all_companion_repo_runtime_evidence
  - all_instance_specific_manifests
public_docs:
  human_catalog_path: docs/architect/13_architecture_invariants_and_catalog.md
  generator_path: tools/caf/render_invariant_catalog_docs_v1.mjs
  public_examples:
  - INV-DECISION-EXACTLY-ONE-ADOPTED-OPTION
  - INV-LAYER8-RESOLVED-VIEW-AUTHORITATIVE
  - INV-ABP-PBP-RESOLUTION-CANONICAL-STYLE-TO-PLANE
  - INV-WORKERS-NO-TBP-ID-LEAKAGE
  - INV-EXT-NON-AUTHORITATIVE-UPSTREAM-DECLARATION
invariants:
- invariant_id: INV-DECISION-EXACTLY-ONE-ADOPTED-OPTION
  title: Each adopted decision question must have exactly one adopted option
  statement: For CAF decision patterns, every adopted question must resolve to exactly one adopted option; zero or multiple adopted options violates the canonical decision integrity contract.
  family: decision_option_integrity
  subject_area: decision_integrity
  source_classes:
  - playbook_block
  - meta_pattern
  - contract
  - validator
  - public_docs
  scope:
    lifecycle_phase: spec
    plane_scope: framework
    artifact_scope: 'ARCHITECT_EDIT_BLOCK: decision_resolutions_v1'
  activation:
    kind: always_on
    condition: Applies whenever decision_resolutions_v1 contains adopted decision questions.
  posture:
    severity: blocker
    enforcement_mode: fail_closed
  canonical_owner:
    kind: architect_edit_block_plus_deterministic_validator
    path: tools/caf/analyze_decisions_v1.mjs
  defined_in:
  - path: docs/architect/05_traceability_chain_and_data_model.md
    anchor: Decision patterns -> exactly 1 adopted option
    role: primary
  - path: tools/caf/contracts/playbook_blocks_ownership_and_invariants_v1.md
    anchor: 'ARCHITECT_EDIT_BLOCK: decision_resolutions_v1'
    role: secondary
  enforced_by:
  - kind: architect_resolution_surface
    path: reference_architectures/<instance>/spec/playbook/system_spec_v1.md
    note: architect must make adopt/defer/reject explicit in the canonical block
  - kind: deterministic_validator
    path: tools/caf/analyze_decisions_v1.mjs
    note: diagnoses adopted-option invariant violations
  checked_by:
  - kind: deterministic_validator
    path: tools/caf/analyze_decisions_v1.mjs
    note: emits adopted option invariant errors for zero or multi-adopt selections
  evidence_surfaces:
  - path: reference_architectures/<instance>/spec/playbook/system_spec_v1.md
    anchor: 'ARCHITECT_EDIT_BLOCK: decision_resolutions_v1'
  downstream_consumers:
  - path: tools/caf/materialize_planning_pattern_payload_v1.mjs
    note: adopted options feed planning payload materialization
  failure_mode:
    symptom: adopted decision question has zero or more than one adopted option
    packet_or_gate: analyze_decisions_v1 diagnostics; downstream planning surfaces become invalid
  lineage:
    origin_stage: pattern
    derived_from: []
  current_status: enforced
  docs_anchor_id: inv-caf-inv-decision-exactly-one-adopted-option
