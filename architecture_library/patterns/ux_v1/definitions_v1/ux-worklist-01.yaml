pattern_id: UX-WORKLIST-01
name: Operational Worklist and Triage Surface
summary: Use a queue- or list-first surface that lets operators triage, prioritize, assign, and act on many items without losing context.
intent: Provide a high-density operational surface for queue management, triage, prioritization, and fast navigation into detail actions.
context: Operator-heavy SaaS products with backlogs, inboxes, case queues, evaluation runs, moderation tasks, or tenant-scoped dashboards.
problem: Without an explicit worklist pattern, teams either overload dashboards with action semantics or force operators through repetitive detail navigation that slows throughput and hides state.
forces_tradeoffs: High information density vs cognitive load; fast action vs safe confirmation; per-item detail vs batch productivity; stable sorting/filtering vs live-updating results.
solution_structure_behavior: Use a worklist or triage surface that centers queue state, priority, assignment, status, filters, and rapid transitions into detail/review/action flows. Keep row actions and bulk posture consistent with permissions and tenant scope.
consequences: Improves operator throughput and situational awareness; requires disciplined empty/loading/error states and clear coordination with search, review, and bulk-action flows.
implementation_notes: Prefer persistent filters, saved views, and visible status/ownership cues. Avoid pretending a decorative dashboard can substitute for a real worklist when repeated action-taking is the dominant behavior.
examples_known_uses: Moderation queues, support triage, review inboxes, evaluation runs, incident lists, approval backlogs.
