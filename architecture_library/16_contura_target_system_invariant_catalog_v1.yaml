- family_id: SHAPE-FAM-08
  family_name: ABP/PBP/TBP resolution authority and deterministic carry-through
  family_statement: Architecture style selection resolves deterministically into authoritative style-to-plane mappings. ABPs stay plane-neutral and technology-neutral; PBPs stay plane-local; TBP catalogs/manifests and resolution views stay complete and internally consistent.
  why_architects_care: This is the bridge from intended architecture style to concrete implementation rails. If resolution is ambiguous or reinterpreted, planners and generators can each drift in a different direction.
  activation_summary: Resolution authority is always-on once style-based derivation is in scope. The selected architecture style activates a single ABP and its per-plane bindings.
  major_pin_families:
  - architecture.architecture_style
  - abp_pbp_resolution.*
  - tbp_resolution.*
  major_option_activators:
