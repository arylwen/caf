pattern_id: EXT-STATELESS_SERVICE
name: Stateless Service
summary: Scale horizontally; no server-side session
intent: Scale horizontally; no server-side session
context: Services that must scale, deploy frequently, and run reliably with predictable operational burden.
problem: Manual server management and stateful designs hinder scaling, resilience, and deployment velocity.
forces_tradeoffs: Operational simplicity vs flexibility/control; portability vs managed constraints; cost vs performance.
solution_structure_behavior: A service design where each request is self-contained and does not rely on server-local session
  state. Any required state is stored externally (databases, caches, tokens), enabling easy horizontal scaling, simpler failover,
  and more predictable behavior under load.
consequences: Improved scale and reliability when done well; requires discipline around state, networking, and observability.
implementation_notes: Prefer statelessness, externalize state, standardize health checks, and automate deployments and rollbacks.
examples_known_uses: Domain microservices, async workers, and integration services.
related_patterns: |
  depends_on: OBS-01
  complements: CFG-01
  complements: CTX-01
  complements: POL-01
extended_definition: A service design where each request is self-contained and does not rely on server-local session state.
  Any required state is stored externally (databases, caches, tokens), enabling easy horizontal scaling, simpler failover,
  and more predictable behavior under load.
