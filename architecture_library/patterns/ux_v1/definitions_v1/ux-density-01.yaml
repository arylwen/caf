pattern_id: UX-DENSITY-01
name: Dense Panel, Card, and Toolbar Rhythm
summary: Use a repeatable rhythm for cards, panels, toolbars, and tables so information-dense screens stay readable and visually composed.
intent: Help operational screens feel intentionally designed by controlling spacing, grouping, and toolbar/action placement across worklists and detail surfaces.
context: Worklists, split-view detail screens, review surfaces, dashboards, data-heavy SaaS pages.
problem: Information-dense pages become visually exhausting when cards, tables, side panels, and toolbars use inconsistent spacing and grouping logic.
forces_tradeoffs: Density vs readability; reuse vs local optimization; panel nesting vs simplicity; more visual grouping vs heavier chrome.
solution_structure_behavior: Establish a small number of repeatable surface patterns for header+actions, primary content panel, side rail, summary cards, and inline status sections. Keep spacing and grouping consistent across pages.
consequences: Makes dense screens easier to scan and style consistently; may constrain local freedom in individual screens.
implementation_notes: Favor consistent panel padding, toolbar alignment, compact-but-readable row density, and predictable side-rail widths.
examples_known_uses: Review queues, submission detail screens, admin workspaces, analytics dashboards, report preparation tools.
related_patterns: |
  complements: UX-WORKLIST-01
  complements: UX-REVIEW-01
  complements: UX-VISUAL-01
  complements: UX-SEARCH-01
extended_definition: |
  Establish a small number of repeatable surface patterns for header+actions, primary content panel, side rail, summary cards, and inline status sections. Keep spacing and grouping consistent across pages.

