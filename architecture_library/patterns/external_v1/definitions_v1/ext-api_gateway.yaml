pattern_id: EXT-API_GATEWAY
name: API Gateway
summary: Central API policy enforcement (auth, quotas, transforms, versioning)
intent: Enforce consistent API policies (auth, quotas, transforms, versioning) at a single control point.
context: Multiple APIs/microservices; external or partner clients; need centralized auth, throttling, request/response shaping, and lifecycle management.
problem: Duplicating auth/throttling/versioning logic in every service causes inconsistency, security gaps, and slower API evolution.
forces_tradeoffs: Central governance vs service independence; policy features vs gateway becoming a bottleneck; flexibility vs standardization.
solution_structure_behavior: A specialized gateway for APIs that enforces cross-cutting policies like authentication/authorization, rate limits/quotas, request/response transforms, and API versioning. It provides a consistent API façade, often handling API keys/OAuth, schema validation, logging, and developer onboarding while keeping backend services simpler.
consequences: Faster rollout of cross-cutting policies and better visibility; risk of overloading the gateway with business logic or creating a single choke point.
implementation_notes: Use lightweight transforms; keep authn/z at gateway + service-level authorization where needed. Treat gateway config as code and test changes.
examples_known_uses: Public REST/GraphQL APIs; partner integrations requiring keys/OAuth, quotas, and version routing.
related_patterns: |
  depends_on: OBS-01
  complements: CFG-01
  complements: CTX-01
  complements: POL-01
extended_definition: A specialized gateway for APIs that enforces cross-cutting policies like authentication/authorization, rate limits/quotas, request/response transforms, and API versioning. It provides a consistent API façade, often handling API keys/OAuth, schema validation, logging, and developer onboarding while keeping backend services simpler.
