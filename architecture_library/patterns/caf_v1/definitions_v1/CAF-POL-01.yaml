caf:
  layer: caf
  verifiability: plan_ready
  plane: control
  default_anchor_policy: core_patterns_are_normative
  allowed_anchor_types:
  - checklist_item
  - caf_pattern
  - core_pattern
  - tbp
  - rail
  default_anchor:
    anchor_type: checklist_item
    anchor_id: REQUIRES_HUMAN_DECISION_ID
  minimum_evidence:
  - Spec/design explicitly states multi-tenancy or tenant isolation requirements.
  - Spec/design explicitly requires deterministic policy enforcement (not ad-hoc checks) for one or more operations.
  decision_prompts:
  - Record an explicit design decision adopting or rejecting this pattern, including scope, constraints/required choices,
    and evidence anchors.
  definition_of_done:
  - Verify that policy is represented as explicit, versioned artifacts and that evaluations emit decision telemetry.
  capabilities_needed:
  - policy_enforcement
  - policy_decision_telemetry
  - observability_emit
  forbidden_assumptions:
  - No cloud vendor or product selection implied by this pattern.
  - No assumption of a specific policy language or rule engine unless provided by TBPs/technology profile.
  kind: decision_pattern
  option_sets:
  - option_set_id: policy_gating.default_crud
    description: Default CRUD policy gating shapes; resource-specific id field may vary.
    options:
    - option_id: gate_all_ops
      summary: Gate all CRUD operations.
      policy_gates:
      - operation: list
        gated: true
        inputs_required:
        - tenant_id
        - principal_id
      - operation: get
        gated: true
        inputs_required:
        - tenant_id
        - principal_id
        - resource_id
      - operation: create
        gated: true
        inputs_required:
        - tenant_id
        - principal_id
      - operation: update
        gated: true
        inputs_required:
        - tenant_id
        - principal_id
        - resource_id
      - operation: delete
        gated: true
        inputs_required:
        - tenant_id
        - principal_id
        - resource_id
    - option_id: gate_write_only
      summary: Gate write operations; list may be ungated; gate get.
      policy_gates:
      - operation: list
        gated: false
        inputs_required: []
      - operation: get
        gated: true
        inputs_required:
        - tenant_id
        - principal_id
        - resource_id
      - operation: create
        gated: true
        inputs_required:
        - tenant_id
        - principal_id
      - operation: update
        gated: true
        inputs_required:
        - tenant_id
        - principal_id
        - resource_id
      - operation: delete
        gated: true
        inputs_required:
        - tenant_id
        - principal_id
        - resource_id
    - option_id: custom
      summary: Custom policy gates (fill fields).
      policy_gates: []
    default_option_id: gate_all_ops
  human_questions:
  - question_key: primary_resource_policy_gates
    question_id: Q-AP-POLICY-POINTS-01
    question: Which operations require policy gating (list/get/create/update/delete), and what decision inputs are required?
    description: Select default policy gating posture for CRUD ops; specialize resource_id token to the actual resource id
      field.
    option_set_id: policy_gating.default_crud
    specialization_notes:
    - Specialize 'resource_id' to the resource id token (e.g., widget_id) when materializing inputs_required.
    - Warranted when authorization/policy enforcement is in scope for the API boundary.
    anchors:
    - caf_pattern: CAF-POL-01
