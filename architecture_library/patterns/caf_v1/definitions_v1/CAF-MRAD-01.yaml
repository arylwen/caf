caf:
  layer: caf
  verifiability: plan_ready
  plane: application
  default_anchor_policy: requires_explicit_design_decision
  allowed_anchor_types:
  - checklist_item
  - caf_pattern
  - core_pattern
  - tbp
  - rail
  default_anchor:
    anchor_type: checklist_item
    anchor_id: REQUIRES_HUMAN_DECISION_ID
  minimum_evidence:
  - Spec/design explicitly identifies a constrained channel (e.g., mobile) with intermittent connectivity/latency constraints.
  decision_prompts:
  - Record an explicit design decision adopting or rejecting this pattern, including scope, constraints/required choices,
    and evidence anchors.
  definition_of_done:
  - Verify that state-changing operations are retry-safe and deduplicate repeated submissions deterministically.
  capabilities_needed:
  - idempotency_support
  forbidden_assumptions:
  - No cloud vendor or product selection implied by this pattern.
  - No assumption of a specific mobile protocol, client framework, or edge product.
  kind: decision_pattern
  option_sets:
  - option_set_id: idempotency.key_carrier
    description: Where idempotency keys are carried for command requests and how they are validated.
    options:
    - option_id: request_header
      summary: Idempotency key in a dedicated request header.
      carrier_kind: header
      carrier_name: Idempotency-Key
      scope: request
      rejection_conditions:
      - missing
      - malformed
    - option_id: request_body_field
      summary: Idempotency key as an explicit field in the request body.
      carrier_kind: body_field
      carrier_name: idempotency_key
      scope: request
      rejection_conditions:
      - missing
      - malformed
    - option_id: derived_from_resource_key
      summary: Idempotency derived from a stable resource key (no explicit client key).
      carrier_kind: derived
      carrier_name: <stable_resource_key>
      scope: resource
      rejection_conditions:
      - missing_key
      - ambiguous
    - option_id: custom
      summary: Custom (fill fields).
      carrier_kind: ''
      carrier_name: ''
      scope: ''
      rejection_conditions: []
    default_option_id: request_header
  human_questions:
  - question_key: idempotency_key
    question_id: Q-MRAD-IDEMP-01
    question: How is the idempotency key carried for command requests and what are the rejection conditions?
    description: Select how idempotency is represented at the API boundary for command-style operations.
    option_set_id: idempotency.key_carrier
    specialization_notes:
    - Warranted when commands can be retried (client retries, timeouts, or at-least-once delivery).
    - If an upstream gateway enforces idempotency keys, record that and keep this consistent across ingress paths.
    anchors:
    - caf_pattern: CAF-MRAD-01
