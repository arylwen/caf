pattern_id: EXT-DEFENSE_IN_DEPTH
name: Defense in Depth
summary: Layered security controls
intent: Layered security controls
context: Systems handling sensitive data and multiple services/identities across networks and environments.
problem: Implicit trust, broad permissions, and ad-hoc secret handling create high breach impact and compliance risk.
forces_tradeoffs: Security depth vs developer friction; least privilege vs operational agility; privacy vs usability.
solution_structure_behavior: A security strategy that uses multiple, overlapping controls across layers (identity, network,
  application, data, and monitoring) so that failure of one control does not result in compromise. It pairs preventive measures
  with detection and response capabilities.
consequences: Reduced blast radius and better compliance; requires governance, tooling, and ongoing hygiene.
implementation_notes: Centralize identity, enforce least privilege, store secrets in a vault, keep services private by default,
  and automate policy checks.
examples_known_uses: Enterprise SaaS, healthcare/finance workloads, multi-tenant platforms.
related_patterns: |
  depends_on: OBS-01
  complements: CFG-01
  complements: CTX-01
  complements: POL-01
extended_definition: A security strategy that uses multiple, overlapping controls across layers (identity, network, application,
  data, and monitoring) so that failure of one control does not result in compromise. It pairs preventive measures with detection
  and response capabilities.
