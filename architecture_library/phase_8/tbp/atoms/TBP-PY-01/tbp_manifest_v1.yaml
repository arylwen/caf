schema_version: phase8_tbp_manifest_v1
tbp_id: TBP-PY-01
binds_to:
- atom_path: runtime.language
  atom_value: python
requires_tbps: []
conflicts_with_tbps: []
layout:
  code_root: code/
  module_conventions:
    absolute_import_root: code
    intra_package_import_style: explicit_relative_preferred
    plane_module_roots:
      ap: code.ap
      cp: code.cp
  scaffold_directories:
  - code/
  - tests/
  - infrastructure/
  - docs/
  - validation/
  role_bindings:
    python_package_marker_code_root:
      path_template: code/__init__.py
      artifact_class: code_runnable_candidate
      evidence_contains:
      - "Generated by CAF"
      - "CAF_TRACE:"
    policy_boundary_dir:
      path_template: policy/
      artifact_class: directories
    domain_model:
      path_template: domain/{resource_snake}_model.py
      artifact_class: code_runnable_candidate
      evidence_contains:
      - tenant_id
    persistence_repo:
      path_template: persistence/{resource_snake}_repo.py
      artifact_class: code_runnable_candidate
      evidence_contains:
      - tenant_id
    service_facade:
      path_template: services/{resource_snake}_service.py
      artifact_class: code_runnable_candidate
      evidence_not_contains:
      - fastapi
      - django
    unit_test:
      path_template: tests/test_{resource_snake}_unit.py
      artifact_class: tests_runnable_candidate
    smoke_test:
      path_template: tests/test_{resource_snake}_smoke.py
      artifact_class: tests_runnable_candidate
extensions:
  obligations:
  - obligation_id: O-TBP-PY-01-python-package-markers
    title: Materialize Python package markers for candidate code packages
    required_capability: python_package_markers_materialization
    role_binding_key: python_package_marker_code_root
  gates:
  - gate_id: G-PY-MODULE-ROOT-COHERENCE
    title: Preserve resolved Python module-root coherence
    gate_kind: definition_of_done
    attachment_scope: all_matching_tasks
    required_capabilities:
    - plane_runtime_scaffolding
    - runtime_wiring
    criteria:
    - Runtime package structure, imports, and entrypoints align to the resolved Python module-root conventions across generated plane surfaces.
    - Canonical plane module roots are realized consistently across runtime scaffolds, operator entrypoints, and tests.
    - Cross-package imports into sibling packages beneath the canonical `code` root (for example shared helpers under `code/common/`) use module-root-coherent relative or absolute imports rather than inventing plane-local pseudo-packages such as `code.ap.common`.
    review_questions:
    - Do generated Python package roots, imports, and entrypoints all reflect the same resolved module-root conventions?
    - Are plane package markers and import paths coherent across runtime surfaces?
    - When a runtime surface imports a shared helper from a sibling package under `code/`, does the import path land on the real package root rather than a non-existent plane-local child package?
    focus_areas:
    - maintainability
    - correctness
