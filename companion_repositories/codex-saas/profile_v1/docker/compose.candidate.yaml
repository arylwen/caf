# CAF_TRACE: generated_by=Contura Architecture Framework (CAF)
# CAF_TRACE: task_id=UX-TG-92-ux-service-packaging
# CAF_TRACE: capability=ux_service_packaging_wiring
# CAF_TRACE: instance=codex-saas
# CAF_TRACE: trace_anchor=pattern_obligation_id:OBL-RUNTIME-WIRING

name: codex-saas

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  cp:
    build:
      context: ..
      dockerfile: docker/Dockerfile.cp
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      AUTH_MODE: ${AUTH_MODE}
      TENANT_CLAIM_KEY: ${TENANT_CLAIM_KEY}
      CP_API_BASE_URL: http://cp:8001
      AP_API_BASE_URL: http://ap:8000
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/cp/health').read()\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  ap:
    build:
      context: ..
      dockerfile: docker/Dockerfile.ap
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      AUTH_MODE: ${AUTH_MODE}
      TENANT_CLAIM_KEY: ${TENANT_CLAIM_KEY}
      CP_API_BASE_URL: http://cp:8001
      AP_API_BASE_URL: http://ap:8000
    depends_on:
      postgres:
        condition: service_healthy
      cp:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/ap/health').read()\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  ui:
    build:
      context: ..
      dockerfile: docker/Dockerfile.ui
    depends_on:
      ap:
        condition: service_healthy
      cp:
        condition: service_healthy
    ports:
      - "8080:80"

  ux:
    build:
      context: ..
      dockerfile: docker/Dockerfile.ux
    depends_on:
      ap:
        condition: service_healthy
      cp:
        condition: service_healthy
    ports:
      - "8081:80"

volumes:
  postgres_data:
