extended_definition: '## 6. Policy Lifecycle and Versioning


  Policy lifecycle is explicit and controlled.


  A policy lifecycle MUST include:


  1. Authoring

  2. Validation

  3. Versioning

  4. Distribution

  5. Activation

  6. Evaluation

  7. Enforcement

  8. Observation

  9. Deprecation


  Policy changes MUST:


  - Produce a new version

  - Declare backward compatibility

  - Define migration or rollback behavior

  - Be auditable


  Silent policy mutation is forbidden.


  ---'
