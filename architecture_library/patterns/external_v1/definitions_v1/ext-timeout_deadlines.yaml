      summary: Use local hop-by-hop timeouts without explicit deadline propagation.
      notes: ''
    - option_id: mixed_deadline_plus_local_timeouts
      summary: Propagate deadlines for critical paths plus local timeouts for non-critical calls.
      notes: ''
