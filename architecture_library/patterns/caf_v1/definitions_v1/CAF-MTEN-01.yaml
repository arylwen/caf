pattern_id: CAF-MTEN-01
name: Multi-Tenancy as First-Class Architectural Concern
summary: Make tenancy explicit, enforce invariants, and plan for enterprise/compliance evolution without redesign.
intent: Avoid common multi-tenancy failure modes by treating tenancy as explicit architecture rather than an emergent implementation
  detail.
context: SaaS systems where multiple customers share infrastructure and must be isolated by construction.
problem: Tenancy introduced late or implicitly leads to data leaks, authorization failures, cost overruns, and costly redesign
  as the system scales.
forces_tradeoffs: Speed vs safety; shared efficiency vs isolation strength; simplicity vs enterprise evolution requirements.
solution_structure_behavior: Define a canonical tenant model, explicit boundaries, and non-negotiable invariants. Use composable
  patterns for routing/context, identity/access, lifecycle, cost/usage enforcement, observability, and compliance evolution.
consequences: Improves tenant safety and evolvability; increases upfront design work and enforcement requirements.
implementation_notes: Use MUST/MUST NOT invariants; make tradeoffs explicit early; design for evolution paths without redesign.
examples_known_uses: Tenant-safe SaaS baselines that scale from early adopters to enterprise compliance requirements.
related_patterns: |
  depends_on: CAF-TCTX-01
  depends_on: OBS-01
  complements: CAF-IAM-01
  complements: CAF-POL-01
  complements: CAF-ZT-01
  complements: PST-01
extended_definition: |
  **Why this pattern is first-class**
  
  Multi-tenancy failures (data leaks, authorization gaps, cost overruns, compliance violations, late redesign) commonly arise when tenancy is implicit, emergent, or introduced late. This pattern requires tenancy to be treated as explicit architecture with hard invariants.
  
  **Normative framing**
  
  - Statements using **MUST/MUST NOT** are hard architectural invariants; violating them is an architectural defect.
  - Informative sections explain rationale; they do not weaken normative requirements.
  
  **Core invariants (normative)**
  
  - Every resource **MUST** belong to exactly one tenant.
  - No resource may be accessed, executed, or evaluated without explicit tenant context.
  - AccountScope is the authority for billing, authentication configuration, and compliance policy.
  - Workspaces **MUST NOT** be treated as tenants.
  - CostCenters **MUST NOT** alter isolation or access semantics.
  - Tenancy boundaries **MUST** be intentional and high-friction (avoid “soft” boundaries that drift).
  
  **Evidence hooks (what to show in design/spec)**
  
  - A canonical tenant model (what “tenant” means in this system) plus the above invariants written explicitly.
  - A declared isolation mode (pooled/silo/hybrid) with upgrade triggers for enterprise tiering and compliance evolution.
  - Explicit routing + tenant context propagation + enforcement (see CAF-TCTX-01, CAF-IAM-*, CAF-POL-*).
  
  **Common failure modes**
  
  - Conflating tenant with UX constructs (org/team/workspace) or using billing constructs as an isolation primitive.
  - Retrofitting “enterprise mode” late, forcing redesign of identity, policy, and data boundaries.
  - Allowing ambiguous or inferred tenancy, which makes authorization, routing, and audit non-deterministic.
  
