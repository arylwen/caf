pattern_id: CAF-TCTX-01
name: Tenant Context Propagation (Normative)
summary: Treat tenant as a first-class concept and require explicit tenant context propagation across planes.
intent: Prevent cross-tenant data leakage and enforce per-tenant governance and entitlements deterministically.
context: Multi-tenant SaaS where many tenants share infrastructure and the system must prove isolation by construction.
problem: If tenant context is implicit or inferred, authorization and routing become inconsistent and hard to audit; leakage
  risk increases non-linearly with system growth.
forces_tradeoffs: Ease-of-use (implicit context) vs correctness and auditability (explicit context); performance vs comprehensive
  context propagation.
solution_structure_behavior: Require tenant context to be explicit at boundaries and propagated through service calls, workflows,
  and data/inference requests; reject execution when tenant context is missing or ambiguous.
consequences: Improves safety and compliance posture; increases need for consistent context carriers and validation across
  layers.
implementation_notes: "Define a canonical context carrier and validate it at ingress and internal boundaries; avoid \u201C\
  best-effort\u201D inference."
examples_known_uses: Tenant-scoped request handling and policy evaluation; per-tenant usage enforcement and audit trails.
related_patterns: |
  complements: CAF-EDGE-01
  complements: CAF-IAM-02
  complements: CAF-MODEL-01
  complements: CAF-MTEN-01
  complements: CAF-PLANE-01
  complements: CAF-POL-01
  complements: CAF-POL-02
  complements: CAF-RES-ID-01
  complements: CAF-SAFE-DP-01
  complements: CAF-XPLANE-01
  complements: CAF-ZT-01
  complements: PST-01
extended_definition: |
  **Normative constraints**

  - Tenant context **MUST** be established at the first entry boundary (e.g., verified token claim, trusted routing signal).
  - Every tenant-facing request **MUST** carry explicit tenant context end-to-end (ingress → AP → DP).
  - Tenant context **MUST** be applied to logs, traces, metrics, and data/inference operations.
  \
    - Any processing path that cannot reliably propagate tenant context is **not allowed** for multi-tenant workloads.
  - A Contura system **MUST NOT** rely on implicit inference, ambient defaults, UI-selected state alone, or unverified client-supplied tenant identifiers.
  - If tenant context is missing, ambiguous, or unverifiable, the operation **MUST** fail closed.
   n**What tenant context includes (minimum)**

  - Tenant identifier
  - Acting principal (user, service, or agent)
  - Applicable entitlements/policies
  - Optional workspace identifier (if present in the product model)

  **Evidence hooks (what to show in design/spec)**

  - Canonical context carrier (claims/header/context object) plus validation points at ingress and internal service boundaries.
  - Explicit propagation requirements across synchronous calls, async messages, and background jobs.
  - Telemetry schema: tenant identifiers present in logs/traces/metrics unless explicitly justified in an ADR.

  \
    **Common failure modes**

  - Tenant inferred from mutable UI state or “current workspace”, creating cross-tenant ambiguity.
  - Multiple tenant carriers present with no precedence/conflict rule.
  - Async processing or scheduled jobs executed without tenant context and enforcement.
  - Tenant identifiers missing from telemetry, making audit/evaluation non-deterministic.


