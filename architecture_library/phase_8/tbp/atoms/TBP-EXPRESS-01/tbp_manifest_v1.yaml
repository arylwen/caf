schema_version: phase8_tbp_manifest_v1
tbp_id: TBP-EXPRESS-01
binds_to:
- atom_path: runtime.framework
  atom_value: express
requires_tbps:
- TBP-TS-01
conflicts_with_tbps: []
layout:
  code_root: code/
  scaffold_directories:
  - code/
  - tests/
  - infrastructure/
  - docs/
  - validation/
  role_bindings:
    cp_runtime_repository_health_owner:
      path_template: code/cp/application/services.ts
      artifact_class: code_runnable_candidate
      evidence_contains:
      - export
      validator_kind: cp_runtime_repository_health_alignment
      validator_config:
        execution_surfaces_any_of:
        - build_postgate_cp_runtime_repository_health
        persistence_role_binding_keys_any_of:
        - cp_sqlalchemy_schema_bootstrap
        - sqlalchemy_runtime_module
        - sqlalchemy_metadata_module
        - postgres_adapter_module
        - raw_sql_runtime_module
        - raw_sql_schema_bootstrap
    cp_ap_contract_shared_transport_module:
      path_template: code/common/contracts/{boundary_id_snake}/transport.ts
      artifact_class: code_contract_surface
      evidence_contains:
      - payload
      - correlationId
    cp_ap_contract_ap_http_emitter:
      path_template: code/ap/contracts/{boundary_id_snake}/http_client.ts
      artifact_class: code_contract_surface
      evidence_contains:
      - payload
      validator_kind: contract_transport_envelope_alignment
      validator_config:
        boundary_id_snake: bnd_cp_ap_01
        shared_transport_role_binding_key: cp_ap_contract_shared_transport_module
        cp_boundary_router_role_binding_key: cp_ap_contract_cp_boundary_router
        cp_http_handler_role_binding_key: cp_ap_contract_cp_http_handler
        ap_envelope_role_binding_key: cp_ap_contract_ap_envelope
        cp_envelope_role_binding_key: cp_ap_contract_cp_envelope
        shared_transport_markers_all_of:
        - payload
        - correlationId
        ap_emitter_shared_markers_all_of:
        - toTransportPayload(
        cp_boundary_router_shared_markers_all_of:
        - parseTransportPayload(
        ap_emitter_split_markers_all_of:
        - ContractRequestEnvelope
        - ContractResponseEnvelope
        - payload
        cp_handler_split_markers_all_of:
        - ContractRequestEnvelope
        - ContractResponseEnvelope
        envelope_fields_all_of:
        - tenantId
        - principalId
        - correlationId
        - payload
    cp_ap_contract_cp_http_handler:
      path_template: code/cp/contracts/{boundary_id_snake}/http_server.ts
      artifact_class: code_contract_surface
      evidence_contains:
      - payload
    cp_ap_contract_ap_envelope:
      path_template: code/ap/contracts/{boundary_id_snake}/envelope.ts
      artifact_class: code_contract_surface
      evidence_contains:
      - tenantId
      - principalId
      - correlationId
      - payload
    cp_ap_contract_cp_envelope:
      path_template: code/cp/contracts/{boundary_id_snake}/envelope.ts
      artifact_class: code_contract_surface
      evidence_contains:
      - tenantId
      - principalId
      - correlationId
      - payload
    cp_ap_contract_cp_boundary_router:
      path_template: code/cp/api/routers/cp_ap_boundary.ts
      artifact_class: code_runnable_candidate
      evidence_contains:
      - router
      - payload
    ap_http_entrypoint:
      path_template: ap/runtime/server.ts
      artifact_class: code_runnable_candidate
      evidence_contains:
      - express
      validator_kind: runtime_entry_topology_alignment
      validator_config:
        root_entrypoint_witness_names_any_of:
        - main.ts
        - app.ts
        - server.ts
        - index.ts
        - main.js
        - app.js
        - server.js
        - index.js
    ap_http_routes:
      path_template: ap/api/routes.ts
      artifact_class: code_runnable_candidate
      evidence_contains:
      - router
    ap_runtime_policy_owner:
      path_template: code/ap/application/services.ts
      artifact_class: code_runnable_candidate
      evidence_contains:
      - export
      validator_kind: policy_preview_runtime_action_alignment
      validator_config:
        execution_surfaces_any_of:
        - build_postgate_policy_preview_action_alignment
        lane_entry_role_binding_keys_any_of:
        - ui_src_entrypoints
        - ux_src_entrypoints
