pattern_id: CAF-MRAD-05
name: MRAD-5 Offline/Degraded Mode Pattern
summary: Where meaningful, support offline/degraded behavior such as draft capture and later synchronization.
intent: Maintain user productivity under connectivity loss by enabling meaningful local progress and later reconciliation.
context: Workflows where capturing intent offline is valuable and safe (not all workflows qualify).
problem: Strict online-only flows fail under intermittent networks, causing loss of work and poor experience.
forces_tradeoffs: UX vs complexity and consistency; offline capability vs conflict resolution burden; local storage risk vs
  usability.
solution_structure_behavior: Allow drafts or queued actions locally; provide server-side reconciliation/sync behavior; ensure
  operations remain authorized and tenant-scoped upon sync.
consequences: Improves resilience; requires explicit conflict handling and careful security around local data.
implementation_notes: Define which workflows support offline mode and why; define conflict strategy; avoid offline mode for
  operations that require strict real-time policy.
examples_known_uses: Draft creation and later submission; offline note capture; deferred upload workflows.
related_patterns: |
  complements: CAF-MRAD-01
  complements: CAF-MRAD-02
  complements: EXT-IDEMPOTENCY
  complements: EXT-OUTBOX_PATTERN
extended_definition: |
  This pattern supports **offline or degraded behavior** for workflows where it is meaningful, with explicit sync/reconcile and deterministic conflict handling.

  **Normative constraints**
  - For workflows where degraded mode is meaningful, systems SHOULD support offline/degraded behavior.
  - Draft capture SHOULD be allowed without continuous connectivity.
  - Sync/reconcile MUST be explicit and auditable.
  - Conflict resolution and reconciliation MUST be handled deterministically.

  **Evidence hooks**
  - The client and server contract defines how drafts are captured and later synced.
  - Sync/reconcile is modeled explicitly (events/operations) with auditability.
  - Reconciliation rules are deterministic and testable for the relevant resource types.

  **Common failure modes**
  - Implicit background sync with no audit trail or user-visible state.
  - Non-deterministic conflict handling (“last write wins” without rules).
  - Offline mode attempted without idempotency, causing duplicate effects on reconnect.

