  - Manual server management and stateful designs hinder scaling, resilience, and
    deployment velocity.
  definition_of_done:
  - Verify that a deployment pattern where a helper process runs alongside the main
    service (e.g., in the same Pod) to provide cross-cutting concerns such as proxies,
    TLS/mTLS, logging, metrics, or secrets fetching.
  capabilities_needed:
  - observability_emit
