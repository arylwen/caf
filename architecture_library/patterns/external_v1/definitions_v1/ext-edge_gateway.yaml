pattern_id: EXT-EDGE_GATEWAY
name: Edge Gateway
summary: Single global entry for TLS/WAF/DDoS & routing
intent: Provide a single global entry point for traffic with consistent security and routing controls.
context: Internet-facing systems; multi-region or multi-service backends; need WAF/DDoS/TLS termination and routing in one
  place.
problem: Without a unified edge, security policies and routing logic drift across services, increasing attack surface and
  operational overhead.
forces_tradeoffs: Central control vs team autonomy; added edge latency vs stronger protection; global consistency vs regional
  customization.
solution_structure_behavior: "A network-edge entry point (often a Layer 7 load balancer) that terminates TLS and applies perimeter\
  \ controls such as WAF rules, DDoS protection, and request routing. It centralizes north-south traffic management (public\
  \ \u2192 internal) and standardizes security headers, certificates, and routing policies across services."
consequences: Improves posture and simplifies client entry, but can become a critical dependency requiring HA, careful config
  management, and strong change controls.
implementation_notes: Keep it policy/routing-only (no business logic). Use managed WAF/DDoS + CDN. Enforce standard headers,
  TLS versions, and observability at the edge.
examples_known_uses: CDN + WAF + DDoS protection fronting APIs and web apps; global traffic steering across regions.
related_patterns: |
  depends_on: OBS-01
  complements: CFG-01
  complements: CTX-01
  complements: POL-01
extended_definition: |
  A network-edge entry point (often a Layer 7 load balancer) that terminates TLS and applies perimeter controls such as WAF rules, DDoS protection, and request routing. It centralizes north-south traffic management (public → internal) and standardizes security headers, certificates, and routing policies across services.
