pattern_id: EXT-IDEMPOTENCY
name: Idempotency
summary: Safe retries without duplicate side effects
intent: Ensure safe retries by making repeated requests produce the same outcome.
context: Distributed systems with unreliable networks and variable load; async workflows and integrations.
problem: Synchronous chaining and naive retries cause cascading failures, duplicate side effects, and poor elasticity under
  spikes.
forces_tradeoffs: Consistency vs availability; throughput vs ordering; retry aggressiveness vs dependency protection; simplicity
  vs correctness.
solution_structure_behavior: A property where repeating the same operation produces the same outcome, enabling safe retries
  in distributed systems. Common approaches include idempotency keys, deduplication tables, and idempotent writes/updates,
  especially for payments, provisioning, and message processing.
consequences: More resilient and scalable workflows; more components and operational complexity (queues, topics, retries,
  replays).
implementation_notes: Design for at-least-once delivery, idempotency, backoff+jitter, DLQs, and clear ownership for replay/compensation.
examples_known_uses: Order/payment workflows, event streams, background processing, third-party integration pipelines.
related_patterns: |
  depends_on: OBS-01
  complements: CAF-MRAD-01
  complements: CAF-MRAD-05
  complements: CTX-01
  complements: POL-01
extended_definition: |
  A property where repeating the same operation produces the same outcome, enabling safe retries in distributed systems. Common approaches include idempotency keys, deduplication tables, and idempotent writes/updates, especially for payments, provisioning, and message processing.


