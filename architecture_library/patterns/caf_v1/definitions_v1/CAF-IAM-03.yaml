caf:
  layer: caf
  verifiability: plan_ready
  plane: control
  default_anchor_policy: decision_pattern
  allowed_anchor_types:
  - checklist_item
  - caf_pattern
  - core_pattern
  - tbp
  - rail
  default_anchor:
    anchor_type: checklist_item
    anchor_id: REQUIRES_HUMAN_DECISION_ID
  minimum_evidence:
  - Spec/design explicitly distinguishes principal types or requires authn/authz and attribution across operations.
  decision_prompts:
  - Record an explicit design decision adopting or rejecting this pattern, including scope, constraints/required choices,
    and evidence anchors.
  definition_of_done:
  - Verify that principal identity and required context are propagated across boundaries and validated.
  capabilities_needed:
  - observability_emit
  forbidden_assumptions:
  - No cloud vendor or product selection implied by this pattern.
  - No assumption of a specific identity provider, protocol, or token format.
  kind: decision_pattern
  option_sets:
  - option_set_id: iam.audit_event_capture_level
    summary: Choose among bounded variants for `iam.audit_event_capture_level` (or use `custom`).
    options:
    - option_id: decision_only
      status: defer
      summary: Capture authn/authz decisions with correlation identifiers.
    - option_id: decision_plus_policy_version
      status: defer
      summary: Capture decisions plus policy/version identifiers and principal/tenant identifiers.
    - option_id: decision_plus_inputs_and_reason
      status: defer
      summary: Capture decisions plus key evaluation inputs and denial reasons (bounded; avoid sensitive spill).
    - option_id: custom
      status: defer
      summary: Custom (describe your approach; prefer adopting a bounded variant when possible).
      notes: ''
    default_option_id: decision_plus_policy_version
  - option_set_id: iam.audit_retention_policy
    summary: Choose among bounded variants for `iam.audit_retention_policy` (or use `custom`).
    options:
    - option_id: retention_30d_ops
      status: defer
      summary: Retain audit records for 30 days for operational troubleshooting; extend for incidents as needed.
    - option_id: retention_90d_standard
      status: defer
      summary: Retain audit records for 90 days as standard baseline for investigations and compliance-lite needs.
    - option_id: retention_1y_compliance
      status: defer
      summary: Retain audit records for 1 year (or per regulation); enforce access controls and immutability.
    - option_id: custom
      status: defer
      summary: Custom retention/access policy (document constraints; include legal/regulatory drivers).
      notes: ''
    default_option_id: retention_90d_standard
  human_questions:
  - question_id: Q-CAF-IAM-03-01
