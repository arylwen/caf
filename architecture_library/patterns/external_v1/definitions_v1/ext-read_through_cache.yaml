pattern_id: EXT-READ_THROUGH_CACHE
name: Read-Through Cache
summary: Cache fetches on miss (library/pattern)
intent: Cache fetches on miss (library/pattern)
context: Systems needing low-latency reads, scalable storage, and fit-for-purpose data models.
problem: One-size-fits-all persistence and modeling leads to slow reads, complex queries, and scaling bottlenecks.
forces_tradeoffs: Duplication vs performance; consistency vs speed; operational burden vs specialization benefits.
solution_structure_behavior: A caching strategy where the cache layer (or client library) automatically loads data from the
  backing store on a miss and stores it in the cache. It centralizes caching logic and simplifies application code, but must
  manage stampedes, TTLs, and error propagation.
consequences: Better performance and clearer models; more data stores/projections to manage.
implementation_notes: Start with simple caching/projections, measure hotspots, and introduce specialized stores/projections
  incrementally.
examples_known_uses: Read-heavy dashboards, search/catalog, reporting projections.
related_patterns: |
  depends_on: OBS-01
  complements: CFG-01
  complements: CTX-01
  complements: POL-01
extended_definition: A caching strategy where the cache layer (or client library) automatically loads data from the backing
  store on a miss and stores it in the cache. It centralizes caching logic and simplifies application code, but must manage
  stampedes, TTLs, and error propagation.
