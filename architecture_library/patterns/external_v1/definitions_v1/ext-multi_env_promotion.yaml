pattern_id: EXT-MULTI_ENV_PROMOTION
name: Multi-Env Promotion
summary: Dev→Test→Prod via pipelines and IaC
intent: Dev→Test→Prod via pipelines and IaC
context: Teams shipping frequently with high availability requirements and multiple
  environments.
problem: Risky deployments and environment drift lead to outages and slow delivery.
forces_tradeoffs: Speed vs safety; cost of parallel environments vs reduced downtime;
  flexibility vs standardization.
solution_structure_behavior: A delivery model where the same build artifact is promoted
  through environments (dev → test → prod) via automated pipelines and infrastructure-as-code.
  It reduces environment drift and improves auditability by making promotions explicit,
  gated, and repeatable.
consequences: Lower release risk and better repeatability; added pipeline and environment
  management overhead.
implementation_notes: Automate builds, use IaC, bake artifacts once, promote through
  environments, and use progressive delivery with fast rollback.
examples_known_uses: Zero-downtime deploys, regulated releases, multi-tenant SaaS
  releases.
related_patterns: |
  depends_on: OBS-01
  complements: CFG-01
  complements: CTX-01
  complements: POL-01
extended_definition: A delivery model where the same build artifact is promoted through
  environments (dev → test → prod) via automated pipelines and infrastructure-as-code.
  It reduces environment drift and improves auditability by making promotions explicit,
  gated, and repeatable.
caf:
  layer: external
  verifiability: plan_ready
  plane: both
  default_anchor_policy: requires_explicit_design_decision
  allowed_anchor_types:
  - checklist_item
  - caf_pattern
  - core_pattern
