  activation:
    kind: always_on
    condition: Applies to every CAF-managed playbook block.
  posture:
    severity: blocker
    enforcement_mode: deterministic_helper
  canonical_owner:
    kind: contract
    path: tools/caf/contracts/playbook_blocks_ownership_and_invariants_v1.md
  defined_in:
  - path: tools/caf/contracts/playbook_blocks_ownership_and_invariants_v1.md
    anchor: This document is the single source of truth
    role: primary
  enforced_by:
  - kind: ownership_contract
    path: tools/caf/contracts/playbook_blocks_ownership_and_invariants_v1.md
