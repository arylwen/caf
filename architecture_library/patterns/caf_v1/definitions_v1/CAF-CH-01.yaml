pattern_id: CAF-CH-01
name: Channel Constraints Do Not Change Plane Authority
summary: Treat channels as delivery constraints; do not use channel limitations to justify control-plane authority leakage.
intent: Keep plane invariants intact while adapting interaction semantics for constrained channels.
context: Systems exposing web/mobile/voice surfaces with different reliability constraints.
problem: "Teams often \u201Cbend\u201D architecture to accommodate channel constraints, accidentally moving governance logic\
  \ into channel-facing services."
forces_tradeoffs: User experience vs strict governance boundaries; immediate responsiveness vs reliable completion under intermittent
  connectivity.
solution_structure_behavior: Apply channel patterns at interaction surfaces (API shapes, workflow semantics) while keeping
  identity/policy/tenancy authority unchanged.
consequences: Preserves governance model; requires explicit workflow patterns for constrained channels.
implementation_notes: Express constraints in API contracts and workflow execution; do not introduce new authority semantics
  due to channel.
examples_known_uses: Mobile-friendly workflows with resumable operations while retaining CP-owned policy/identity rules.
related_patterns: |
  depends_on: CAF-ZT-01
  complements: CAF-MRAD-01
  complements: CAF-MRAD-02
  complements: CAF-MRAD-03
  complements: CAF-MRAD-04
extended_definition: |
  Channels (web/mobile/voice/etc.) are **delivery constraints**. They change interaction shape, not governance authority.

  **Normative constraints**
  - Channel constraints apply to interaction surfaces and request/workflow semantics; they MUST NOT be used to justify authority leakage between planes.
  - Delivery adapters (e.g., BFFs) MUST NOT introduce new business logic or authority.
  - Delivery adapters MUST operate under Application Plane identity and policy constraints and MUST NOT bypass Control Plane governance or Data Plane enforcement.

  **Responsibilities and boundaries**
  - Keep identity, policy, tenancy, and lifecycle authority semantics unchanged while adapting UX/API shapes (bounded payloads, resumable flows, retries).
  - Use explicit workflow patterns (durable jobs, status retrieval/notifications) to handle intermittent connectivity rather than moving governance into channel-facing code.

  **Evidence hooks**
  - Spec/design identifies channel constraints (latency, retries, payload limits, offline/background limits) and the delivery patterns used to satisfy them.
  - If a BFF exists, its responsibilities are documented as delivery-only (aggregation/shaping/versioning) with explicit prohibitions on governance semantics.
  - Cross-plane calls remain Zero-Trust: authenticated, authorized, and tenant-context-bound.

  **Common failure modes**
  - “Bending” plane boundaries to meet channel constraints (governance logic in delivery layer).
  - BFF becomes a second Control Plane or performs lifecycle/policy authority decisions.
  - Client/channel surfaces directly access Data Plane without enforced identity/tenant scope.

