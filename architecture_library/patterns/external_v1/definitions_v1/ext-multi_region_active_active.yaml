pattern_id: EXT-MULTI_REGION_ACTIVE_ACTIVE
name: Multi-Region Active/Active
summary: Serve traffic in multiple regions
intent: Serve traffic in multiple regions
context: High availability and disaster recovery needs across regions and failure domains.
problem: Regional outages or data loss can take the system down without redundancy and recoverability.
forces_tradeoffs: Cost vs resilience; consistency vs multi-region performance; operational complexity vs RTO/RPO targets.
solution_structure_behavior: A high-availability design where multiple regions serve production traffic simultaneously. It
  improves resilience and latency, but requires global traffic management, multi-region data replication, and strategies for
  conflict resolution, consistency, and regional degradation.
consequences: Improved uptime and recoverability; more complex data replication and failover testing.
implementation_notes: Define RTO/RPO, practice failover, automate backups, and validate restores regularly.
examples_known_uses: Critical SaaS platforms, regulated workloads, global customer bases.
related_patterns: |
  depends_on: OBS-01
  complements: CFG-01
  complements: CTX-01
  complements: POL-01
extended_definition: A high-availability design where multiple regions serve production traffic simultaneously. It improves
  resilience and latency, but requires global traffic management, multi-region data replication, and strategies for conflict
  resolution, consistency, and regional degradation.
