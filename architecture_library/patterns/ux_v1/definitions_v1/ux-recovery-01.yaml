pattern_id: UX-RECOVERY-01
name: Empty, Error, and Recovery Guidance
summary: Use explicit empty, error, and recovery states when operator trust depends on knowing what happened, what is safe to retry, and what next action is appropriate.
intent: Provide user-facing recovery posture that helps people continue safely after no-data, partial failure, validation failure, or background execution issues.
context: Operational SaaS, review/admin tools, async job surfaces, search-heavy products, high-consequence actions.
problem: Generic “something went wrong” screens or silent empty states destroy operator trust and push recovery work into support or logs.
forces_tradeoffs: Concise messaging vs actionable detail; generic handling vs context-specific remediation; retry convenience vs duplicate side effects.
solution_structure_behavior: Make empty, error, warning, and recovery states explicit and task-aware. Offer next actions, refresh/retry guidance, and partial-failure explanation without exposing internal noise.
consequences: Improves trust and reduces abandonment; requires intentional copy, state design, and coupling to validation/async/bulk behaviors.
implementation_notes: Recovery belongs in the UX lane even when the architectural cause is already handled upstream.
examples_known_uses: No-results states, partial-failure summaries, retry guidance after background job failure, safe refresh after stale session.
related_patterns: |
  depends_on: VAL-01
  depends_on: OBS-01
  depends_on: EXT-GRACEFUL_DEGRADATION
  complements: UX-ASYNC-01
  complements: UX-BULK-01
  complements: UX-SEARCH-01
extended_definition: |
  Make empty, error, warning, and recovery states explicit and task-aware. Offer next actions, refresh/retry guidance, and partial-failure explanation without exposing internal noise.

