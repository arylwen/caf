version: 1
inventory_id: contura_command_surface_v1
commands:
  - command_id: CAF
    ux_surface: core
    skill: skills/caf/SKILL.md
    summary: Single-entry CAF router (single-command surface).
    args:
      - name: subcommand
        required: true
        kind: string
      - name: args
        required: false
        kind: string
    subcommands:
      - verb: help
        skill: skills/caf-help/SKILL.md
        summary: Help and onboarding guidance for CAF.
        args:
          - name: question
            required: false
            kind: string
      - verb: ask
        skill: skills/caf-ask/SKILL.md
        summary: Ask a stakeholder question about an instance (CAF selects minimal context and answers).
        args:
          - name: question
            required: true
            kind: string
      - verb: saas
        skill: skills/caf-saas/SKILL.md
        summary: Initialize (or re-seed) a reference architecture instance.
        args:
          - name: instance_name
            required: true
            kind: string
      - verb: arch
        skill: skills/caf-arch/SKILL.md
        summary: Run the architecture pipeline for the current phase.
        args:
          - name: instance_name
            required: true
            kind: string
      - verb: plan
        skill: skills/caf-plan/SKILL.md
        summary: Generate planning artifacts (obligations + task graph) after design outputs exist.
        args:
          - name: instance_name
            required: true
            kind: string
      - verb: ux
        skill: skills/caf-ux/SKILL.md
        summary: Derive and ground the canonical UX design artifact after the second architecture pass.
        args:
          - name: instance_name
            required: true
            kind: string
        nested_subcommands:
          - verb: plan
            skill: skills/caf-ux-plan/SKILL.md
            summary: Generate the first bounded UX planning artifacts from the canonical UX design surface.
            args:
              - name: instance_name
                required: true
                kind: string
          - verb: build
            skill: skills/caf-ux-build/SKILL.md
            summary: Realize the separate UX build lane from ux_task_graph_v1.yaml after the main build lane has completed.
            args:
              - name: instance_name
                required: true
                kind: string
      - verb: next
        skill: skills/caf-next/SKILL.md
        summary: Preview or apply the next phase transition.
        args:
          - name: instance_name
            required: true
            kind: string
          - name: apply
            required: false
            kind: literal
            accepted_values:
              - apply
            notes: Omit for dry-run preview; include `apply` to checkpoint and advance.
      - verb: prd
        skill: skills/caf-prd/SKILL.md
        summary: Default lifecycle step after /caf saas; resolves PRD input into a lifecycle-ready architecture shape.
        args:
          - name: instance_name
            required: true
            kind: string
          - name: promote
            required: false
            kind: boolean
      - verb: build
        skill: skills/caf-build-candidate/SKILL.md
        summary: Build candidate artifacts when gates allow.
        args:
          - name: instance_name
            required: true
            kind: string
removed_commands:
  - command_id: LEGACY_MULTI_COMMAND_SURFACE
    notes: "Removed: CAF now exposes a single router command (/caf). Legacy skills remain internal only and must not be advertised."
