name: codex-saas
services:
  cp:
    build:
      context: ..
      dockerfile: docker/Dockerfile.cp
    env_file:
      - ../.env
    ports:
      - "${CP_PORT:-8001}:8001"
    depends_on:
      postgres:
        condition: service_healthy
  ap:
    build:
      context: ..
      dockerfile: docker/Dockerfile.ap
    env_file:
      - ../.env
    ports:
      - "${AP_PORT:-8000}:8000"
    depends_on:
      cp:
        condition: service_started
      postgres:
        condition: service_healthy
  ui:
    build:
      context: ..
      dockerfile: docker/Dockerfile.ui
    env_file:
      - ../.env
    ports:
      - "${UI_PORT:-8080}:80"
    depends_on:
      ap:
        condition: service_started
      cp:
        condition: service_started
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-codex_saas}"
      POSTGRES_USER: "${POSTGRES_USER:-codex_saas}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-codex_saas_local_dev}"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-codex_saas} -d ${POSTGRES_DB:-codex_saas}"]
      interval: 5s
      timeout: 5s
      retries: 12
volumes:
  postgres-data:
x-caf-role-bindings:
  ui_nginx_proxy_conf: docker/nginx.ui.conf
  ui_api_contract_path: /api
