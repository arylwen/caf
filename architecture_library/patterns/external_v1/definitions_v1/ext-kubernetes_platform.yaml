pattern_id: EXT-KUBERNETES_PLATFORM
name: Kubernetes Platform
summary: Full Kubernetes for complex platform needs
intent: Full Kubernetes for complex platform needs
context: Services that must scale, deploy frequently, and run reliably with predictable
  operational burden.
problem: Manual server management and stateful designs hinder scaling, resilience,
  and deployment velocity.
forces_tradeoffs: Operational simplicity vs flexibility/control; portability vs managed
  constraints; cost vs performance.
solution_structure_behavior: A full Kubernetes-based platform for running containerized
  workloads with rich scheduling, service discovery, policies, and extensibility.
  It supports complex multi-service systems and platform capabilities (service mesh,
  custom controllers), but adds operational overhead and requires strong platform
  engineering maturity.
consequences: Improved scale and reliability when done well; requires discipline around
  state, networking, and observability.
implementation_notes: Prefer statelessness, externalize state, standardize health
  checks, and automate deployments and rollbacks.
examples_known_uses: Domain microservices, async workers, and integration services.
related_patterns: |
  depends_on: OBS-01
  complements: CFG-01
  complements: CTX-01
  complements: POL-01
extended_definition: A full Kubernetes-based platform for running containerized workloads
  with rich scheduling, service discovery, policies, and extensibility. It supports
  complex multi-service systems and platform capabilities (service mesh, custom controllers),
  but adds operational overhead and requires strong platform engineering maturity.
caf:
