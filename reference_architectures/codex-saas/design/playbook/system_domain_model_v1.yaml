schema_version: phase8_plane_domain_model_v1
plane_scope: system
generated_from:
  inputs:
    - reference_architectures/codex-saas/spec/playbook/system_spec_v1.md
    - reference_architectures/codex-saas/spec/playbook/system_domain_model_v1.md
    - reference_architectures/codex-saas/product/PLATFORM_PRD.resolved.md
domain:
  summary: Control-plane domain for policy governance, governed execution evidence, and retention lifecycle administration.
  bounded_contexts:
    - context_id: POLICY_GOVERNANCE
      name: Policy and Governance
      description: Owns policy definitions, policy versions, and approval outcomes.
      aggregates:
        - aggregate_id: POLICY
          name: Policy
          description: Logical governance artifact that represents a named rule set or evaluation policy.
          persistence:
            required: true
            storage_intent: catalog_registry
            notes: Control-plane policy lifecycle owner.
          entities:
            - entity_id: POLICY
              name: Policy
              fields:
                - name: policy_id
                  type: identifier
                  required: true
                - name: tenant_scope
                  type: enum(platform|tenant)
                  required: true
                - name: name
                  type: text
                  required: true
                - name: description
                  type: text
                  required: false
                - name: status
                  type: enum(draft|active|retired)
                  required: true
                - name: created_at
                  type: timestamp
                  required: true
            - entity_id: POLICY_VERSION
              name: Policy Version
              fields:
                - name: policy_version_id
                  type: identifier
                  required: true
                - name: policy_id
                  type: identifier
                  required: true
                - name: version_label
                  type: text
                  required: true
                - name: content_hash
                  type: text
                  required: true
                - name: created_by
                  type: identifier
                  required: true
                - name: created_at
                  type: timestamp
                  required: true
                - name: activation_state
                  type: enum(draft|approved|active|superseded)
                  required: true
        - aggregate_id: APPROVAL_DECISION
          name: Approval Decision
          description: Recorded approval or rejection for governance-relevant changes.
          persistence:
            required: true
            storage_intent: audit_log
            notes: Append-only auditable control-plane decision record.
          entities:
            - entity_id: APPROVAL_DECISION
              name: Approval Decision
              fields:
                - name: approval_decision_id
                  type: identifier
                  required: true
                - name: subject_type
                  type: text
                  required: true
                - name: subject_id
                  type: identifier
                  required: true
                - name: decision
                  type: enum(approved|rejected)
                  required: true
                - name: decided_by
                  type: identifier
                  required: true
                - name: decided_at
                  type: timestamp
                  required: true
                - name: rationale
                  type: text
                  required: false
    - context_id: EXECUTION_EVIDENCE
      name: Execution and Evidence
      description: Owns governed execution records and emitted evidence artifacts.
      aggregates:
        - aggregate_id: EXECUTION_RECORD
          name: Execution Record
          description: Platform-owned record of a governed execution or evaluation run.
          persistence:
            required: true
            storage_intent: audit_log
            notes: Used for operations and audit traceability.
          entities:
            - entity_id: EXECUTION_RECORD
              name: Execution Record
              fields:
                - name: execution_record_id
                  type: identifier
                  required: true
                - name: tenant_id
                  type: identifier
                  required: true
                - name: subject_type
                  type: text
                  required: true
                - name: subject_id
                  type: identifier
                  required: true
                - name: started_at
                  type: timestamp
                  required: true
                - name: completed_at
                  type: timestamp
                  required: false
                - name: outcome
                  type: enum(pending|passed|failed|blocked)
                  required: true
            - entity_id: EVIDENCE_RECORD
              name: Evidence Record
              fields:
                - name: evidence_record_id
                  type: identifier
                  required: true
                - name: execution_record_id
                  type: identifier
                  required: false
                - name: evidence_type
                  type: text
                  required: true
                - name: emitted_at
                  type: timestamp
                  required: true
                - name: principal_id
                  type: identifier
                  required: true
                - name: payload_ref
                  type: text
                  required: false
    - context_id: RETENTION_LIFECYCLE
      name: Retention and Lifecycle
      description: Owns retention policy and deletion request lifecycle records.
      aggregates:
        - aggregate_id: RETENTION_RULE
          name: Retention Rule
          description: Platform-owned rule defining retention behavior by target type.
          persistence:
            required: true
            storage_intent: catalog_registry
            notes: Control-plane configuration artifact.
          entities:
            - entity_id: RETENTION_RULE
              name: Retention Rule
              fields:
                - name: retention_rule_id
                  type: identifier
                  required: true
                - name: target_type
                  type: text
                  required: true
                - name: retention_period_days
                  type: integer
                  required: true
                - name: hard_delete_allowed
                  type: boolean
                  required: true
                - name: status
                  type: enum(draft|active|retired)
                  required: true
        - aggregate_id: DELETION_REQUEST
          name: Deletion Request
          description: Tracked request to delete or purge governed data.
          persistence:
            required: true
            storage_intent: transactional_record
            notes: Lifecycle tracking for governed deletion operations.
          entities:
            - entity_id: DELETION_REQUEST
              name: Deletion Request
              fields:
                - name: deletion_request_id
                  type: identifier
                  required: true
                - name: tenant_id
                  type: identifier
                  required: true
                - name: target_type
                  type: text
                  required: true
                - name: target_id
                  type: identifier
                  required: true
                - name: requested_by
                  type: identifier
                  required: true
                - name: requested_at
                  type: timestamp
                  required: true
                - name: status
                  type: enum(requested|approved|completed|rejected)
                  required: true
  use_cases:
    - use_case_id: UC-APPROVE-POLICY-CHANGE
      title: Approve a policy change
      intent: Authorized actor approves or rejects a new policy version.
      primary_context_id: POLICY_GOVERNANCE
      touches_entities:
        - Policy
        - Policy Version
        - Approval Decision
    - use_case_id: UC-RECORD-GOVERNED-EXECUTION
      title: Record a governed execution
      intent: The platform records an execution and its outcome with evidence.
      primary_context_id: EXECUTION_EVIDENCE
      touches_entities:
        - Execution Record
        - Evidence Record
    - use_case_id: UC-MANAGE-RETENTION-DELETION
      title: Manage retention and deletion
      intent: Operator defines retention rules and tracks deletion requests.
      primary_context_id: RETENTION_LIFECYCLE
      touches_entities:
        - Retention Rule
        - Deletion Request
api_candidates:
  resources:
    - name: policies
      operations: [list, get, create, update]
    - name: policy_versions
      operations: [list, get, create]
    - name: approval_decisions
      operations: [list, get, create]
    - name: execution_records
      operations: [list, get]
    - name: evidence_records
      operations: [list, get]
    - name: retention_rules
      operations: [list, get, create, update]
    - name: deletion_requests
      operations: [list, get, create, update]