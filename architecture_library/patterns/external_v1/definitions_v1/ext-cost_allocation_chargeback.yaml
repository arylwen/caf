pattern_id: EXT-COST_ALLOCATION_CHARGEBACK
name: Cost Allocation / Chargeback
summary: Tagging + budgets + showback
intent: Tagging + budgets + showback
context: Organizations with multiple teams/accounts/subscriptions needing consistent
  security, networking, and cost controls.
problem: Without standards, teams reinvent foundations and drift from security/cost
  best practices.
forces_tradeoffs: Standardization vs flexibility; speed vs governance; up-front platform
  work vs long-term savings.
solution_structure_behavior: A FinOps practice that attributes infrastructure and
  service costs to teams, products, or tenants using tagging, account structures,
  and usage metering. It enables budgeting, showback/chargeback, and optimization
  decisions by making cost drivers visible and actionable.
consequences: Faster onboarding and safer defaults; requires platform ownership and
  continuous improvement.
implementation_notes: Codify guardrails, provide templates, centralize logging/security,
  and use tagging/budgets for cost visibility.
examples_known_uses: Enterprise cloud foundations, multi-account orgs, platform engineering
  enablement.
related_patterns: |
  depends_on: OBS-01
  complements: CFG-01
  complements: CTX-01
  complements: POL-01
extended_definition: A FinOps practice that attributes infrastructure and service
  costs to teams, products, or tenants using tagging, account structures, and usage
  metering. It enables budgeting, showback/chargeback, and optimization decisions
  by making cost drivers visible and actionable.
