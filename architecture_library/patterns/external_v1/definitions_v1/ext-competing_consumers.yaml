pattern_id: EXT-COMPETING_CONSUMERS
name: Competing Consumers
summary: Many workers pull from same queue to scale
intent: Many workers pull from same queue to scale
context: Distributed systems with unreliable networks and variable load; async workflows and integrations.
problem: Synchronous chaining and naive retries cause cascading failures, duplicate side effects, and poor elasticity under
  spikes.
forces_tradeoffs: Consistency vs availability; throughput vs ordering; retry aggressiveness vs dependency protection; simplicity
  vs correctness.
solution_structure_behavior: A scalability pattern where multiple worker instances consume from the same queue, increasing
  throughput by parallelizing work. Correctness relies on message visibility/locking, idempotent processing, and careful tuning
  of concurrency and retry behavior.
consequences: More resilient and scalable workflows; more components and operational complexity (queues, topics, retries,
  replays).
implementation_notes: Design for at-least-once delivery, idempotency, backoff+jitter, DLQs, and clear ownership for replay/compensation.
examples_known_uses: Order/payment workflows, event streams, background processing, third-party integration pipelines.
related_patterns: |
  depends_on: OBS-01
  complements: CFG-01
  complements: CTX-01
  complements: POL-01
extended_definition: A scalability pattern where multiple worker instances consume from the same queue, increasing throughput
  by parallelizing work. Correctness relies on message visibility/locking, idempotent processing, and careful tuning of concurrency
  and retry behavior.
