pattern_id: EXT-TIMEOUT_DEADLINES
name: Timeout + Deadlines
summary: Bound latency; propagate deadlines downstream
intent: Bound end-to-end latency by enforcing timeouts and propagating deadlines across calls.
context: Distributed systems with unreliable networks and variable load; async workflows and integrations.
problem: Synchronous chaining and naive retries cause cascading failures, duplicate side effects, and poor elasticity under
  spikes.
forces_tradeoffs: Consistency vs availability; throughput vs ordering; retry aggressiveness vs dependency protection; simplicity
  vs correctness.
solution_structure_behavior: A practice of enforcing maximum durations for requests and propagating a deadline budget across
  service calls. Timeouts prevent indefinite resource consumption and help systems fail fast; combined with cancellation and
  retries, they improve tail latency and overall stability.
consequences: More resilient and scalable workflows; more components and operational complexity (queues, topics, retries,
  replays).
implementation_notes: Design for at-least-once delivery, idempotency, backoff+jitter, DLQs, and clear ownership for replay/compensation.
examples_known_uses: Order/payment workflows, event streams, background processing, third-party integration pipelines.
related_patterns: |
  depends_on: OBS-01
  complements: CFG-01
  complements: CTX-01
  complements: POL-01
extended_definition: A practice of enforcing maximum durations for requests and propagating a deadline budget across service
  calls. Timeouts prevent indefinite resource consumption and help systems fail fast; combined with cancellation and retries,
  they improve tail latency and overall stability.
