  kind: decision_pattern
  option_sets:
  - option_set_id: iam.audit_trace_strategy
    description: How identity/authZ decisions are logged and correlated for audit and traceability.
    options:
    - option_id: decision_log_minimal
      summary: Log decision outcome + principal + resource identifiers
      fields_profile: minimal
      retention_class: standard
    - option_id: decision_plus_inputs_hash
      summary: Log decision + hashed/normalized inputs for reproducibility
      fields_profile: inputs_hash
      retention_class: standard
    - option_id: full_explain_trace
      summary: Log decision + explain trace (reason codes) + key inputs
      fields_profile: explain
      retention_class: high
    - option_id: sampled_full_trace
      summary: Full trace for a sampled subset; minimal logs otherwise
      fields_profile: sampled_full
      retention_class: mixed
    - option_id: custom
      summary: Custom (fill details; prefer adopting a retrieved option when available)
    default_option_id: decision_plus_inputs_hash
  human_questions:
  - question_key: iam.audit_trace_strategy
    question_id: Q-IAM-AUDIT-TRACE-01
    question: What audit/trace strategy should identity and authorization decisions use?
    description: Choose the evidence level required for auditability and investigations.
    option_set_id: iam.audit_trace_strategy
    specialization_notes:
    - If regulated workloads exist, prefer explain traces with stable reason codes.
