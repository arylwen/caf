caf:
  layer: caf
  verifiability: plan_ready
  plane: application
  default_anchor_policy: requires_explicit_design_decision
  allowed_anchor_types:
  - checklist_item
  - caf_pattern
  - core_pattern
  - tbp
  - rail
  default_anchor:
    anchor_type: checklist_item
    anchor_id: REQUIRES_HUMAN_DECISION_ID
  minimum_evidence:
  - Spec/design explicitly identifies a constrained channel (e.g., mobile) with intermittent connectivity/latency constraints.
  decision_prompts:
  - Record an explicit design decision adopting or rejecting this pattern, including scope, constraints/required choices,
    and evidence anchors.
  definition_of_done:
  - Verify that collections are bounded via pagination/cursors and default expansions are controlled.
  capabilities_needed:
  - pagination_contracts
  forbidden_assumptions:
  - No cloud vendor or product selection implied by this pattern.
  - No assumption of a specific mobile protocol, client framework, or edge product.
  kind: decision_pattern
  option_sets:
  - option_set_id: api.payload_bounding_strategy
    description: How requests and responses bound payload size, collection size, and transfer semantics.
    options:
    - option_id: hard_limits_and_pagination
      summary: Hard payload limits with pagination for collections.
      strategy_kind: limits_pagination
      max_payload_bytes: ''
      max_item_count: ''
      rejection_conditions:
      - too_large
      - too_many_items
    - option_id: chunked_transfer
      summary: Chunked transfer with explicit part limits and assembly rules.
      strategy_kind: chunked
      max_payload_bytes: ''
      max_item_count: ''
      rejection_conditions:
      - part_missing
      - too_large
      - invalid_sequence
    - option_id: indirect_reference
      summary: Large payloads passed by reference (pointer/handle) with validation.
      strategy_kind: by_reference
      max_payload_bytes: ''
      max_item_count: ''
      rejection_conditions:
      - invalid_reference
      - expired_reference
      - unauthorized
    - option_id: custom
      summary: Custom (fill fields).
      strategy_kind: ''
      max_payload_bytes: ''
      max_item_count: ''
      rejection_conditions: []
    default_option_id: hard_limits_and_pagination
  human_questions:
  - question_key: payload_bounds
    question_id: Q-MRAD-BOUNDS-01
    question: What payload bounding strategy applies (limits/pagination/chunking/reference) and what are the rejection conditions?
    description: Select how payload and collection bounds are enforced.
    option_set_id: api.payload_bounding_strategy
    specialization_notes:
    - Warranted when clients can send/receive large collections or blobs.
    - Record concrete max sizes later; for now choose the bounding strategy.
    anchors:
    - caf_pattern: CAF-MRAD-03
