pattern_id: CAF-POL-01
name: Policy as a First-Class System Artifact
summary: Represent policy as machine-evaluable, versioned, auditable artifacts rather than ad-hoc checks or configuration.
intent: Make governance intent executable, deterministic, and provable.
context: AI-first multi-tenant SaaS where implicit rules create unsafe, non-deterministic behavior.
problem: Ad-hoc policy logic scattered across code leads to inconsistent enforcement, undetectable drift, and unprovable compliance.
forces_tradeoffs: Flexibility of local checks vs central consistency and auditability; rapid change vs versioned rollout/rollback
  discipline.
solution_structure_behavior: Define policy artifacts with explicit scope, inputs, evaluation semantics, outcomes, version
  identity, and audit attribution. Prohibit ambient/inferred context and unobserved evaluation.
consequences: Improves determinism and compliance; requires policy lifecycle management and evaluation infrastructure.
implementation_notes: Avoid conflating policy with configuration; enforce versioning and explicit inputs; require observability
  for evaluation.
examples_known_uses: Entitlement policies, agent tool-use policies, workflow execution constraints enforced consistently.
related_patterns: |
  depends_on: CAF-TCTX-01
  depends_on: OBS-01
  complements: CAF-AI-01
  complements: CAF-AID-01
  complements: CAF-EDGE-01
  complements: CAF-MODEL-01
  complements: CAF-MTEN-01
  complements: CAF-POL-02
  complements: CAF-RES-ID-01
  complements: CAF-SAFE-DP-01
  complements: CAF-XPLANE-02
  complements: CAF-ZT-01
extended_definition: |
  **Normative constraints**

  - Implicit rules are architectural defects: policy **MUST** be an explicit, first-class architectural component (not ad-hoc conditionals, scattered flags, or human-only interpretation).
  - A policy is a **machine-evaluable artifact** with explicit structure and lifecycle. A policy **MUST** have:
    - explicit scope (tenant / identity / agent / workflow / plane)
    - explicit inputs (context, attributes, signals)
    - deterministic evaluation semantics
    - explicit outcomes (allow/deny/modify/escalate)
    - versioned identity and audit attribution
  \
    - A policy **MUST NOT**:
    - depend on ambient or inferred context
    - change behavior without a version change
    - execute implicitly/best-effort
    - be evaluated without observability
  - Policy artifacts **MUST** be addressable, versioned, deployable, testable, and auditable.

  **Evidence hooks**

  - Designs include a policy artifact model (IDs, versioning, lifecycle) and show where evaluation occurs.
  - Specs/designs state which operations are policy-governed and how outcomes are enforced.

  **Common failure modes**

  - Hardcoding governance logic in application code or unversioned configuration.
  \
    - “Context inferred” evaluations that silently drift and cannot be replayed/audited.
  - Policy evaluation without decision telemetry.


