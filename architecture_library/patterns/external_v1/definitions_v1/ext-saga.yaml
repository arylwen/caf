pattern_id: EXT-SAGA
name: Saga
summary: Distributed transaction with compensations
intent: Coordinate a distributed business transaction using local commits and compensations.
context: Distributed systems with unreliable networks and variable load; async workflows and integrations.
problem: Synchronous chaining and naive retries cause cascading failures, duplicate side effects, and poor elasticity under
  spikes.
forces_tradeoffs: Consistency vs availability; throughput vs ordering; retry aggressiveness vs dependency protection; simplicity
  vs correctness.
solution_structure_behavior: A pattern for coordinating a multi-step business transaction across services without a global
  lock. Each step performs a local transaction and, on failure, triggers compensating actions to undo prior effects. Sagas
  embrace eventual consistency and require careful design of compensations and timeouts.
consequences: More resilient and scalable workflows; more components and operational complexity (queues, topics, retries,
  replays).
implementation_notes: Design for at-least-once delivery, idempotency, backoff+jitter, DLQs, and clear ownership for replay/compensation.
examples_known_uses: Order/payment workflows, event streams, background processing, third-party integration pipelines.
related_patterns: |
  depends_on: OBS-01
  complements: CAF-MRAD-02
  complements: CTX-01
  complements: POL-01
extended_definition: |
  A pattern for coordinating a multi-step business transaction across services without a global lock. Each step performs a local transaction and, on failure, triggers compensating actions to undo prior effects. Sagas embrace eventual consistency and require careful design of compensations and timeouts.


