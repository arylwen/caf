pattern_id: CAF-XPLANE-02
name: Prohibited Cross-Plane Interaction Anti-Patterns
summary: Enumerate forbidden cross-plane interactions that violate authority, auditability, or safety.
intent: Prevent architectural drift by explicitly disallowing common authority-leak and bypass patterns.
context: Systems with strict governance and safety requirements where implicit coupling is a defect.
problem: Without explicit prohibitions, implementations tend to bypass governance checks (e.g., direct data access) and embed
  control-plane logic into tenant workflow code.
forces_tradeoffs: Short-term delivery speed vs long-term governance, compliance, and blast-radius control.
solution_structure_behavior: Define and enforce a set of MUST NOT interaction shapes (e.g., bypassing policy/identity enforcement,
  embedding CP authority in AP/DP execution paths, DP initiating governance orchestration).
consequences: "Reduces unsafe shortcuts; requires discipline and tooling to detect violations; may require additional supported\
  \ \u201Callowed\u201D patterns to replace shortcuts."
implementation_notes: Encode as validations/linters where possible; require ADRs for any exception (prefer no exceptions).
examples_known_uses: Blocking direct data-plane writes from untrusted application contexts; preventing CP from executing tenant
  business workflows.
related_patterns: |
  complements: CAF-IAM-01
  complements: CAF-PLANE-01
  complements: CAF-POL-01
  complements: CAF-XPLANE-01
  complements: CAF-ZT-01
extended_definition: |
  **Prohibited cross-plane interaction anti-patterns (MUST NOT)**

  - **Data Plane → Control Plane autonomous changes:** DP components must not create tenants, change policies, or drive platform governance.
  - **Application or Data bypassing Control Plane policy:** no backdoor configuration or AI operations that bypass CP governance and policy intent.
  - **Any cross-tenant data exposure:** no shared caches, logs, or indexes without robust tenant scoping and explicit justification.
  - **Agents or services with unbounded authority:** agents must never hold privileges that exceed their configured identity and delegated scope.

  **Exceptions policy**

  - Any exception **MUST** be captured and justified in an ADR. Prefer no exceptions; replace shortcuts with an allowed interaction pattern (CAF-XPLANE-01).

  **Evidence hooks (what to show in design/spec)**

  - Explicit statements of what is prohibited at each boundary (CP↔AP, AP↔DP, CP↔DP) plus the supported alternatives.
  - Enforcement plan: dependency rules, interface allowlists, and/or linters that detect bypass and authority leakage.

  **Common failure modes**

  - DP initiating tenant lifecycle actions or policy changes “because it has the data”.
  - Tenant-unscoped caches/logs/indices used for performance, creating silent cross-tenant leaks.
  - “Super-agent” identities that accumulate privileges across tenants or planes.

