pattern_id: EXT-AUDITABILITY
name: Auditability
summary: Strong logs + traceability
intent: Strong logs + traceability
context: Systems handling sensitive data and multiple services/identities across networks and environments.
problem: Implicit trust, broad permissions, and ad-hoc secret handling create high breach impact and compliance risk.
forces_tradeoffs: Security depth vs developer friction; least privilege vs operational agility; privacy vs usability.
solution_structure_behavior: The ability to reconstruct who did what, when, and why across systems. Auditability relies on tamper-resistant logs, change histories, and traceable workflows (deploys, config changes, data access), supporting incident response, compliance, and accountability.
consequences: Reduced blast radius and better compliance; requires governance, tooling, and ongoing hygiene.
implementation_notes: Centralize identity, enforce least privilege, store secrets in a vault, keep services private by default, and automate policy checks.
examples_known_uses: Enterprise SaaS, healthcare/finance workloads, multi-tenant platforms.
related_patterns: |
  depends_on: OBS-01
  complements: CFG-01
  complements: CTX-01
  complements: POL-01
extended_definition: The ability to reconstruct who did what, when, and why across systems. Auditability relies on tamper-resistant logs, change histories, and traceable workflows (deploys, config changes, data access), supporting incident response, compliance, and accountability.
