pattern_id: EXT-SECRETS_MANAGEMENT
name: Secrets Management
summary: Central vault, rotation, no secrets in code
intent: Store and rotate secrets centrally so they are never embedded in code or images.
context: Systems handling sensitive data and multiple services/identities across networks and environments.
problem: Implicit trust, broad permissions, and ad-hoc secret handling create high breach impact and compliance risk.
forces_tradeoffs: Security depth vs developer friction; least privilege vs operational agility; privacy vs usability.
solution_structure_behavior: "A practice of storing secrets (API keys, passwords, certificates) in a dedicated secrets manager\
  \ rather than code or config files. It supports encryption at rest, access control, auditing, and rotation\u2014ideally\
  \ with short-lived credentials\u2014to reduce exposure and simplify compliance."
consequences: Reduced blast radius and better compliance; requires governance, tooling, and ongoing hygiene.
implementation_notes: Centralize identity, enforce least privilege, store secrets in a vault, keep services private by default,
  and automate policy checks.
examples_known_uses: Enterprise SaaS, healthcare/finance workloads, multi-tenant platforms.
related_patterns: |
  depends_on: OBS-01
  complements: CFG-01
  complements: CTX-01
  complements: POL-01
extended_definition: |
  A practice of storing secrets (API keys, passwords, certificates) in a dedicated secrets manager rather than code or config files. It supports encryption at rest, access control, auditing, and rotation—ideally with short-lived credentials—to reduce exposure and simplify compliance.
caf:
  layer: external
  verifiability: plan_ready
  plane: both
  default_anchor_policy: requires_explicit_design_decision
  allowed_anchor_types:
  - checklist_item
  - caf_pattern
  - core_pattern
  - tbp
  - rail
  default_anchor:
    anchor_type: checklist_item
    anchor_id: DECISION-EXT-SECRETS_MANAGEMENT
  minimum_evidence:
  - Systems handling sensitive data and multiple services/identities across networks and environments.
  - Implicit trust, broad permissions, and ad-hoc secret handling create high breach impact and compliance risk.
  definition_of_done:
  - Verify that a practice of storing secrets (API keys, passwords, certificates) in a dedicated secrets manager rather than
    code or config files.
  capabilities_needed:
  - identity_access
  - observability_emit
  - config_management
  forbidden_assumptions:
  - No cloud vendor or product selection implied by this pattern.
  kind: decision_pattern
  decision_prompts:
  - Record an explicit design decision adopting or rejecting this pattern, including scope, required choices (option sets),
    and evidence anchors.
  option_sets:
  - option_set_id: ops.secrets_delivery_model
    description: How secrets are delivered to runtime components and how rotation/refresh is handled.
    options:
    - option_id: runtime_injection
      summary: Secrets injected at deploy/runtime (env/file mount) with rotation handled by platform workflow.
      notes: ''
    - option_id: pull_on_demand
      summary: Services pull secrets on-demand from a secrets authority (with caching and refresh).
      notes: ''
    - option_id: bootstrap_then_refresh
      summary: Bootstrap secret at start, then refresh/rotate periodically via runtime fetch or sidecar.
      notes: ''
    - option_id: custom
      summary: Custom (fill fields).
      notes: ''
    default_option_id: runtime_injection
  human_questions:
  - question_key: ops_secrets_delivery_model
    question_id: Q-EXT-SECRETS-01
    question: How are secrets delivered to runtime (injection vs pull vs hybrid)?
    description: Select the secrets delivery/refresh model for runtime components.
    option_set_id: ops.secrets_delivery_model
    specialization_notes:
    - Warranted whenever runtime components need credentials/keys and secret rotation is required.
    anchors:
    - caf_pattern: EXT-SECRETS_MANAGEMENT
