pattern_id: EXT-IMMUTABLE_INFRASTRUCTURE
name: Immutable Infrastructure
summary: Rebuild artifacts instead of patching in place
intent: Rebuild artifacts instead of patching in place
context: Teams shipping frequently with high availability requirements and multiple
  environments.
problem: Risky deployments and environment drift lead to outages and slow delivery.
forces_tradeoffs: Speed vs safety; cost of parallel environments vs reduced downtime;
  flexibility vs standardization.
solution_structure_behavior: An approach where servers/containers are replaced with
  newly built images rather than patched in place. This improves reproducibility,
  reduces configuration drift, and enables safer rollbacks, at the cost of requiring
  reliable build pipelines and fast redeploy processes.
consequences: Lower release risk and better repeatability; added pipeline and environment
  management overhead.
implementation_notes: Automate builds, use IaC, bake artifacts once, promote through
  environments, and use progressive delivery with fast rollback.
examples_known_uses: Zero-downtime deploys, regulated releases, multi-tenant SaaS
  releases.
related_patterns: |
  depends_on: OBS-01
  complements: CFG-01
  complements: CTX-01
  complements: POL-01
extended_definition: An approach where servers/containers are replaced with newly
  built images rather than patched in place. This improves reproducibility, reduces
  configuration drift, and enables safer rollbacks, at the cost of requiring reliable
  build pipelines and fast redeploy processes.
