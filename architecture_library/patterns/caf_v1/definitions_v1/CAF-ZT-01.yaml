extended_definition: |
  Zero Trust in Contura is an **identity-and-policy** discipline: no plane, component, or principal is implicitly trusted.

  **Normative constraints**
  - All cross-plane calls MUST be authenticated and authorized (no “internal = trusted” paths).
  - Cross-plane interactions MUST carry explicit identity and tenant context.
  - Principals MUST operate with least-privilege access; broad/wildcard privileges are prohibited.
  - Identity and access MUST be continuously verified at relevant decision points; cached trust assumptions must be bounded/refreshable.
  - Failures to authenticate/authorize MUST be handled deterministically and must not degrade system integrity.

  **Responsibilities and boundaries**
  - Control Plane governs identity primitives and authoritative policy intent.
  - Application and Data Planes enforce authorization within delegated scope; neither may redefine identity authority or global policy.

  **Evidence hooks**
  - Inter-plane contracts specify required identity/tenant context and rejection behavior when missing.
  - Enforcement points emit telemetry that includes tenant + principal attribution for critical actions.
  - Designs explicitly avoid shared secrets/transitive trust and clarify delegation boundaries.

  **Common failure modes (anti-patterns)**
  - “System/internal” bypass routes that skip verification.
  - Application-originated global policy or identity authority leakage.
  - Privilege escalation via partial failure handling, broad credentials, or transitive trust.

