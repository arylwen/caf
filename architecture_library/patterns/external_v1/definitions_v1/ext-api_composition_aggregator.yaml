pattern_id: EXT-API_COMPOSITION_AGGREGATOR
name: API Composition / Aggregator
summary: One endpoint composes multiple downstream calls
intent: Expose one endpoint that composes multiple downstream calls into a single
  response.
context: Microservices with UX/workflow endpoints needing multiple data sources; desire
  to reduce round trips and simplify clients.
problem: Clients must call many services and handle partial failures; latency and
  coupling increase with each additional call.
forces_tradeoffs: Lower client complexity vs higher server complexity; performance
  gains vs fan-out risk; consistency vs eventual consistency.
solution_structure_behavior: A composition layer that calls multiple downstream services
  (often in parallel), combines the results, and returns a single response. It simplifies
  consumers but must carefully manage latency, partial failures, caching, and contract
  ownership to avoid turning into a monolithic dependency.
consequences: Fewer client calls and centralized orchestration; introduces fan-out
  latency and requires careful timeout/circuit-breaker handling.
implementation_notes: Use parallelism, strict timeouts, partial responses, and caching.
  Avoid deep dependency graphs. Consider materialized views for heavy read paths.
examples_known_uses: Order details endpoint aggregating items, payments, shipments;
  profile endpoint aggregating identity + preferences.
related_patterns: |
  depends_on: OBS-01
  complements: CAF-MRAD-04
  complements: CTX-01
  complements: POL-01
extended_definition: 'A composition layer that calls multiple downstream services
  (often in parallel), combines the results, and returns a single response. It simplifies
  consumers but must carefully manage latency, partial failures, caching, and contract
  ownership to avoid turning into a monolithic dependency.


  '
