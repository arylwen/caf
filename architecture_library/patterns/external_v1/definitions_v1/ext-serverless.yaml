pattern_id: EXT-SERVERLESS
name: Serverless
summary: Event-driven compute for glue and bursty workloads
intent: Event-driven compute for glue and bursty workloads
context: Services that must scale, deploy frequently, and run reliably with predictable
  operational burden.
problem: Manual server management and stateful designs hinder scaling, resilience,
  and deployment velocity.
forces_tradeoffs: Operational simplicity vs flexibility/control; portability vs managed
  constraints; cost vs performance.
solution_structure_behavior: A compute model (e.g., functions or managed runtimes)
  where infrastructure provisioning and scaling are abstracted away and billing is
  typically per-invocation/usage. It excels for event-driven ‘glue’ logic and spiky
  workloads, but requires attention to cold starts, execution limits, and vendor-specific
  integrations.
consequences: Improved scale and reliability when done well; requires discipline around
  state, networking, and observability.
implementation_notes: Prefer statelessness, externalize state, standardize health
  checks, and automate deployments and rollbacks.
examples_known_uses: Domain microservices, async workers, and integration services.
related_patterns: |
  depends_on: OBS-01
  complements: CFG-01
  complements: CTX-01
  complements: POL-01
extended_definition: A compute model (e.g., functions or managed runtimes) where infrastructure
  provisioning and scaling are abstracted away and billing is typically per-invocation/usage.
  It excels for event-driven ‘glue’ logic and spiky workloads, but requires attention
  to cold starts, execution limits, and vendor-specific integrations.
