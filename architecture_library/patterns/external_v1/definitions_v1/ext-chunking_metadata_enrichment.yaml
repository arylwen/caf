pattern_id: EXT-CHUNKING_METADATA_ENRICHMENT
name: Chunking + Metadata Enrichment
summary: Normalize chunks + provenance + ACL tags
intent: Create retrieval-ready chunks with provenance, structure, and ACL metadata
  to improve relevance and governance.
context: LLM-powered apps needing reliability, safety, and change management across
  prompts and retrieval components.
problem: Model outputs can be unsafe or inconsistent; prompts and indexes change over
  time without traceability.
forces_tradeoffs: Safety vs helpfulness; latency/cost vs quality; rapid iteration
  vs stability and auditability.
solution_structure_behavior: A document preparation approach for search/RAG where
  content is split into chunks sized for retrieval and LLM context windows, and enriched
  with metadata such as source, section, timestamps, and access control labels. Good
  chunking improves relevance and reduces leakage; poor chunking harms recall and
  citations.
consequences: More trustworthy assistants; added evaluation, monitoring, and governance
  work.
implementation_notes: Version prompts, log inputs/outputs, implement guardrails, evaluate
  regularly, and enforce ACL-aware retrieval.
examples_known_uses: Enterprise assistants, copilots, automated document drafting
  with citations.
related_patterns: |
  depends_on: OBS-01
  complements: CFG-01
  complements: CTX-01
  complements: POL-01
extended_definition: A document preparation approach for search/RAG where content
  is split into chunks sized for retrieval and LLM context windows, and enriched with
  metadata such as source, section, timestamps, and access control labels. Good chunking
  improves relevance and reduces leakage; poor chunking harms recall and citations.
