pattern_id: UX-BULK-01
name: Bulk Action with Preview and Partial Results
summary: Use a bulk-action interaction when users need to apply the same operation to many items with safe confirmation, preview, and clear reporting of partial success or failure.
intent: Provide a bounded UX posture for repeated actions over result sets without hiding permissions, rate limits, or per-item errors.
context: Operational worklists, admin actions, review queues, migrations, content moderation, batch retries, mass configuration changes.
problem: Without a dedicated bulk-action pattern, teams either force repetitive one-by-one actions or create dangerous “apply to all” shortcuts with poor confirmation and error reporting.
forces_tradeoffs: Throughput vs safety; whole-batch simplicity vs per-item transparency; synchronous confirmation vs async execution; permission checks vs user convenience.
solution_structure_behavior: Use bulk selection, preview, explicit confirmation, and a result model that can show success, skipped items, and failures. Keep the selection scope and action consequences visible before execution.
consequences: Improves operator efficiency and trust; requires careful recovery states, idempotency expectations, and alignment with async/result posture when actions are long-running.
implementation_notes: Bulk actions are not just buttons. They need clear selection scope, preview, permission handling, and result explanation.
examples_known_uses: Bulk approve/reject, archive selected items, retry failed jobs, assign many queue items, batch enable/disable settings.
related_patterns: |
  depends_on: VAL-01
  depends_on: OBS-01
  depends_on: EXT-RATE_LIMITING_QUOTAS
  complements: UX-WORKLIST-01
