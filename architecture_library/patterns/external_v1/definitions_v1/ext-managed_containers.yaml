pattern_id: EXT-MANAGED_CONTAINERS
name: Managed Containers
summary: Run containers w/ minimal ops (no K8s management)
intent: Run containers w/ minimal ops (no K8s management)
context: Services that must scale, deploy frequently, and run reliably with predictable
  operational burden.
problem: Manual server management and stateful designs hinder scaling, resilience,
  and deployment velocity.
forces_tradeoffs: Operational simplicity vs flexibility/control; portability vs managed
  constraints; cost vs performance.
solution_structure_behavior: A container runtime platform where the provider manages
  orchestration, patching, and scaling mechanics so teams run containers without operating
  a Kubernetes control plane. This offers faster time-to-production with fewer knobs,
  trading off some portability and platform-level customization.
consequences: Improved scale and reliability when done well; requires discipline around
  state, networking, and observability.
implementation_notes: Prefer statelessness, externalize state, standardize health
  checks, and automate deployments and rollbacks.
examples_known_uses: Domain microservices, async workers, and integration services.
related_patterns: |
  depends_on: OBS-01
  complements: CFG-01
  complements: CTX-01
  complements: POL-01
extended_definition: A container runtime platform where the provider manages orchestration,
  patching, and scaling mechanics so teams run containers without operating a Kubernetes
  control plane. This offers faster time-to-production with fewer knobs, trading off
  some portability and platform-level customization.
caf:
  layer: external
  verifiability: plan_ready
  plane: both
  default_anchor_policy: requires_explicit_design_decision
