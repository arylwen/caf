# CAF project-local Codex defaults
#
# Usage (project-local):
#   CODEX_HOME=$(pwd)/.codex codex
#
# Codex also supports user-level configuration at:
#   ~/.codex/config.toml
#
# CAF runtime knobs are environment variables; in current CAF mode they are optional overrides (most runs should not require them).
# See: .codex/runtime/runtime_environment.md

developer_instructions = """
CAF: command surface
- Use /caf help for command discovery.
- Use /caf arch <instance> for architecture + design.
- Use /caf plan <instance> for planning outputs (obligations + task graph + task plan).
- Use /caf backlog <instance> when a human-readable backlog view is wanted.

CAF: safety
- Do not run any git commands.
- If CAF_ACTIVE_RUNNER_SESSION=1 is present, you are already inside the CAF Codex runner session. Stay in the current session and do not shell out to `codex`, `codex exec`, or another nested `/caf ...` command to continue the same workflow.
- If CAF_CURRENT_SESSION_DISPATCH_REQUIRED=1 is present, current-session worker/reviewer dispatch is mandatory.
- Keep temporary runner-local helper scripts under `.codex/scripts/`, not under `tools/caf/`.

CAF: runtime environment defaults
- If CAF_PYTHON_CMD is not set, assume python3.
- Container runtime + compose are environment-specific; for local_podmancompose_* profiles, the typical choice is:
  - CAF_CONTAINER_RUNTIME_CMD=podman
  - CAF_COMPOSE_CMD="podman compose"

Windows / PowerShell
- Set environment variables using $env:NAME = "value".
- Do not use `set NAME=value` in PowerShell (it maps to Set-Variable). Some built-ins (notably $PID) are read-only.
"""

approval_policy = "never"

# CAF runner hardening: keep Codex in the current session during routed build flows.
agents.max_depth = 0
agents.max_threads = 1
