pattern_id: CAF-AI-01
name: AI Safety and Governance Separation Across Planes
summary: Separate AI policy and governance (Control) from workflow execution (Application) and inference/compute (Data).
intent: Make AI behavior auditable, enforceable, and reversible by placing governance in the Control Plane.
context: AI-first SaaS where models/agents can amplify mistakes and introduce new failure modes.
problem: If AI guardrails and policies are scattered across workflows, behavior becomes non-deterministic and cannot be proven
  or rolled back reliably.
forces_tradeoffs: Fast iteration on AI behavior vs enforceability, auditability, and safety; decentralized experimentation
  vs centralized governance.
solution_structure_behavior: CP defines AI policies, guardrails, and allowed tool/model configurations; AP executes AI workflows
  subject to CP policy; DP performs inference/compute behind enforced access.
consequences: Reduces unsafe autonomy and drift; may slow experimentation and requires explicit policy versioning and rollout/rollback
  mechanisms.
implementation_notes: Treat AI policies as first-class artifacts; integrate safety gates and observability hooks; avoid implicit
  behavior changes.
examples_known_uses: Policy-gated agent tool use; model/prompt version governance with audit attribution.
related_patterns: |
  depends_on: CAF-POL-01
  depends_on: CAF-POL-02
  depends_on: OBS-01
  complements: CAF-AID-01
  complements: CAF-POL-03
extended_definition: |
  This pattern makes AI/agent behavior **auditable, enforceable, and reversible** by separating governance intent (CP) from execution (AP) and compute/data (DP).

  **Normative constraints**
  - AI policies, allowed models, and tool permissions MUST be centrally governed by the Control Plane.
  - Application Plane MUST treat AI outputs as untrusted input and MUST enforce safety/guardrail outcomes deterministically.
  - Data Plane AI components (model serving, retrieval) MUST NOT bypass Control Plane policies.

  **Responsibilities and boundaries**
  - Control Plane: defines/versions allowed models, prompt templates, agent workflows, tool schemas, safety gates, and cost controls.
  - Application Plane: executes AI workflows under CP policy; orchestrates retrieval/tool calls; enforces safety gate decisions (reject/redact/escalate); emits traces.
  - Data Plane: performs inference/retrieval/embedding under AP/CP instructions; stores AI logs/traces when required.

  **Evidence hooks**
  - Design explicitly states which plane “decides what” (CP what is allowed; AP what was attempted/executed; DP what models/data were used).
  - Governance artifacts are versioned and referenced from runtime telemetry (model/prompt/tool config lineage).
  - AI traces include prompts, retrieved context identifiers, safety gate outcomes, and actions taken (as allowed by governance).

  **Common failure modes**
  - Guardrails implemented as scattered, unversioned workflow code.
  - Uncontrolled model/tool selection at runtime.
  - Inference/retrieval paths that cannot be attributed to tenant + principal + policy version.

