caf:
  layer: caf
  verifiability: plan_ready
  plane: control
  default_anchor_policy: requires_explicit_design_decision
  allowed_anchor_types:
  - checklist_item
  - caf_pattern
  - core_pattern
  - tbp
  - rail
  default_anchor:
    anchor_type: checklist_item
    anchor_id: REQUIRES_HUMAN_DECISION_ID
  minimum_evidence:
  - Spec/design explicitly distinguishes principal types or requires authn/authz and attribution across operations.
  - Spec/design includes AI/agent behaviors or governance requirements that require auditability and policy gating.
  decision_prompts:
  - Record an explicit design decision adopting or rejecting this pattern, including scope, constraints/required choices,
    and evidence anchors.
  definition_of_done:
  - Verify that agent actions include explicit agent principal identity and attribution in telemetry/audit.
  capabilities_needed: []
  forbidden_assumptions:
  - No cloud vendor or product selection implied by this pattern.
  kind: decision_pattern
  option_sets:
  - option_set_id: agent.identity_kind
    description: What kind of identity an agent presents and how it is verified.
    options:
    - option_id: service_identity_only
      summary: Agent uses a service identity (no per-agent individuality).
      identity_kind: service
      required_claims:
      - service_id
      rejection_conditions:
      - missing
      - unverified
    - option_id: per_agent_identity
      summary: Each agent instance has a distinct identity bound to a tenant and role.
      identity_kind: per_agent
      required_claims:
      - agent_id
      - tenant_id
      - role
      rejection_conditions:
      - missing
      - unverified
      - tenant_mismatch
    - option_id: delegated_user_identity
      summary: Agent acts on behalf of a user with explicit delegation scope.
      identity_kind: delegated_user
      required_claims:
      - user_id
      - delegation_scope
      rejection_conditions:
      - missing
      - unverified
      - scope_missing
    - option_id: custom
      summary: Custom (fill fields).
      identity_kind: ''
      required_claims: []
      rejection_conditions: []
    default_option_id: service_identity_only
  human_questions:
  - question_key: agent_identity
    question_id: Q-AID-KIND-01
    question: What identity kind does the agent present (service, per-agent, delegated user) and what claims are required?
    description: Select the agent identity mode and required verification claims.
    option_set_id: agent.identity_kind
    specialization_notes:
    - Warranted when agents trigger actions that require attribution, audit, or tenant binding.
    - If identity kind is fixed by an upstream IAM governance decision, record it here for consistency.
    anchors:
    - caf_pattern: CAF-AID-01
