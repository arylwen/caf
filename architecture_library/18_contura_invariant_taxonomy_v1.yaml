schema_version: v1
status: public_machine_readable_taxonomy
purpose: Machine-readable taxonomy for CAF invariants. The target-system catalog uses one invariant model with family summaries, atomic invariants, and option-branch invariants. Pins and options remain references and lightweight tags inside invariant rows rather than separate top-level catalog objects.
catalog_paths:
  target_system: architecture_library/16_contura_target_system_invariant_catalog_v1.yaml
  caf_operational: architecture_library/17_contura_caf_operational_invariant_catalog_v1.yaml
row_types:
- id: family_summary
  description: Architect-facing cluster of related truths.
- id: atomic_invariant
  description: Smallest independently meaningful target-system invariant row.
- id: option_branch_invariant
  description: Selected option branch whose statement becomes active once adopted.
- id: caf_operational_invariant
  description: Framework-side invariant describing carry-through, gating, or enforcement behavior.
activation_kinds:
- id: always_on
  description: Applies whenever the relevant surface exists.
- id: always_on_plus_option_selected
  description: Base truth is always-on and concrete consequences activate when an option is chosen.
- id: always_on_plus_pin_declared
  description: Base truth is always-on and declared pins become part of intended shape.
- id: becomes_active_when_selected
  description: Specific option branch becomes binding once selected.
- id: pin_declared
  description: Becomes relevant when the pin is explicitly present.
- id: pin_declared_plus_pin_value_activated
  description: Declared pin exists and a specific value sharpens the invariant.
- id: when_artifact_present
  description: Applies when a named artifact exists in the cascade.
- id: when_capability_present
  description: Applies when a capability is materially in scope.
- id: when_manifest_present
  description: Applies when a manifest or registry is present.
- id: when_pin_equals
  description: Applies when a specific pin value or tuple is selected.
- id: when_stage_active
  description: Applies when a lifecycle stage is in play.
lineage_origin_stages:
- id: execution
  description: Worker, producer, or ownership rule.
- id: intent
  description: High-level framework or governance intent.
- id: pattern
  description: Pattern- or option-level semantic rule.
- id: pin
  description: Architect-selected machine binding.
- id: planning
  description: Planning payload, obligation, or task-graph rule.
- id: resolution
  description: Deterministic resolved view or derived rails.
- id: runtime_evidence
  description: Running or emitted proof surface.
- id: verification
  description: Gate, postgate, or validator rule.
