pattern_id: EXT-HYBRID_RETRIEVAL
name: Hybrid Retrieval
summary: Combine vector + keyword (+ semantic ranking)
intent: Improve search quality by combining keyword and vector retrieval (often with
  reranking).
context: LLM-powered apps needing reliability, safety, and change management across
  prompts and retrieval components.
problem: Model outputs can be unsafe or inconsistent; prompts and indexes change over
  time without traceability.
forces_tradeoffs: Safety vs helpfulness; latency/cost vs quality; rapid iteration
  vs stability and auditability.
solution_structure_behavior: A retrieval strategy that combines lexical keyword search
  with vector (semantic) search, often followed by a re-ranker to improve precision.
  Hybrid approaches typically improve recall and robustness across query types, but
  require tuning, good metadata, and evaluation against representative workloads.
consequences: More trustworthy assistants; added evaluation, monitoring, and governance
  work.
implementation_notes: Version prompts, log inputs/outputs, implement guardrails, evaluate
  regularly, and enforce ACL-aware retrieval.
examples_known_uses: Enterprise assistants, copilots, automated document drafting
  with citations.
related_patterns: |
  depends_on: OBS-01
  complements: CFG-01
  complements: CTX-01
  complements: POL-01
extended_definition: A retrieval strategy that combines lexical keyword search with
  vector (semantic) search, often followed by a re-ranker to improve precision. Hybrid
  approaches typically improve recall and robustness across query types, but require
  tuning, good metadata, and evaluation against representative workloads.
