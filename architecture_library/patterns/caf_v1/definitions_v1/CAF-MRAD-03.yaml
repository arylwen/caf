pattern_id: CAF-MRAD-03
name: MRAD-3 Bounded Payload and Collection Pattern
summary: Mobile-facing APIs provide bounded response shapes via pagination and controlled expansions.
intent: Prevent unbounded responses that degrade mobile reliability and performance.
context: Clients with constrained bandwidth/latency where large payloads cause timeouts and poor UX.
problem: Unbounded collections and nested expansions cause unpredictable payload sizes and failure modes.
forces_tradeoffs: Convenience of large responses vs reliability and predictability; server complexity vs client simplicity.
solution_structure_behavior: Paginate/cursor large collections; avoid unbounded nested expansions by default; require explicit
  contract to expand; shape payload growth deterministically.
consequences: More predictable performance; may require additional endpoints or read models.
implementation_notes: Define paging contracts consistently; ensure paging is stable and tenant-scoped; avoid exposing internal
  IDs without justification.
examples_known_uses: List endpoints for feeds and collections; admin lists with filters and paging.
related_patterns: |
  complements: CAF-CH-01
  complements: CAF-MRAD-02
  complements: CAF-MRAD-04
  complements: EXT-CQRS
  complements: EXT-MATERIALIZED_VIEW
extended_definition: |
  This pattern enforces **bounded response shapes** for mobile-facing APIs to control payload growth and avoid unbounded expansions.

  **Normative constraints**
  - Mobile-facing APIs MUST provide bounded response shapes.
  - Unbounded collections MUST be paginated/cursor-based.
  - Responses MUST avoid unbounded nested expansions by default.
  - Payload size growth MUST be controlled via an explicit contract shape.

  **Evidence hooks**
  - API responses use pagination/cursors for collections with documented limits.
  - Nested expansions are opt-in and bounded (no default deep expansion).
  - Contract includes explicit shape/size parameters (page size, fields, include options) where applicable.

  **Common failure modes**
  - Returning full collections “for convenience” (unbounded lists).
  - Default deep expansion of nested resources leading to payload blowups.
  - No documented limits, causing inconsistent client behavior.

