pattern_id: CAF-POL-02
name: Policy Responsibilities Across Planes
summary: Separate policy truth and lifecycle (Control) from evaluation/enforcement (Application) and access enforcement (Data).
intent: Prevent policy semantic drift and authority leakage by placing ownership and enforcement responsibilities explicitly.
context: Tri-plane systems where policy governs tenants, identities, agents, workflows, and resource access.
problem: If planes modify policy semantics or evaluate inconsistently, governance becomes non-deterministic and unprovable.
forces_tradeoffs: Central governance vs local autonomy; enforcement consistency vs latency and coupling.
solution_structure_behavior: "**Core responsibilities**\n\n- **Control Plane (CP)** is the authority for **policy truth and\
  \ lifecycle**: schemas, authoring, validation, versioning, distribution, rollout, and rollback.\n- **Application Plane (AP)**\
  \ performs **deterministic policy evaluation and enforcement** for operations it exposes; it must reject requests when required\
  \ context is missing.\n- **Data Plane (DP)** enforces **access boundaries** (e.g., storage and data access control) and\
  \ must not initiate governance orchestration or mutate policy truth.\n\n**Plane interpretations (default)**\n\n- **AP**\n\
  \  - Provide an explicit **policy evaluation/enforcement boundary** around protected operations.\n  - Require explicit request\
  \ context (tenant, principal, correlation) and emit decision telemetry.\n- **CP**\n  - Provide a **policy artifact store\
  \ boundary** (policy as versioned artifacts) and a **distribution boundary** (serve policy artifacts to consumers).\n  -\
  \ Provide explicit lifecycle controls (publish, rollback) with audit.\n- **DP**\n  - Provide an explicit **access enforcement\
  \ boundary** for data access; deny by default when context/policy is missing.\n  - Do not embed governance workflows or\
  \ policy-authoring logic.\n- **ST** (if a separate Storage plane is present)\n  - Store policy artifacts and policy decision\
  \ telemetry behind explicit storage boundaries.\n  - Apply retention and audit constraints appropriate to policy governance.\n\
  - **AI** (if AI workflows exist)\n  - Treat AI guardrails/permissions as policy-governed decisions and emit evidence suitable\
  \ for audit and replay.\n\n**Invariants (normative)**\n\n- Policy truth is tenant-scoped, versioned, and auditable.\n- Policy\
  \ evaluation is explicit (no ad-hoc checks) and fail-closed.\n- Policy decisions and enforcement emit structured telemetry\
  \ with correlation.\n- Authority does not leak across planes (no implicit overrides).\n"
consequences: Improves consistency and auditability; requires clear APIs for policy distribution and evaluation and careful
  version management.
implementation_notes: 'Treat missing policy context as hard failure; ensure delegation boundaries are explicit; avoid ad-hoc
  overrides.


  Practical constraints:


  - Require explicit **tenant_id**, **principal_id** (or equivalent), and **correlation_id** at the AP policy boundary.

  - Policy distribution must be explicit and version-aware (AP/DP must know which policy version they evaluated).

  - Record policy decisions in an audit-friendly format (inputs, decision, version, correlation).

  '
examples_known_uses: Control plane policy authoring with application plane enforcement; policy rollout with rollback support.
