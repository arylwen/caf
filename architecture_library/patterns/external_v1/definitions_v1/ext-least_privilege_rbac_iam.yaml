pattern_id: EXT-LEAST_PRIVILEGE_RBAC_IAM
name: Least Privilege (RBAC/IAM)
summary: Minimal permissions per principal
intent: Limit every principal to the minimum permissions needed to perform its job.
context: Systems handling sensitive data and multiple services/identities across networks and environments.
problem: Implicit trust, broad permissions, and ad-hoc secret handling create high breach impact and compliance risk.
forces_tradeoffs: Security depth vs developer friction; least privilege vs operational agility; privacy vs usability.
solution_structure_behavior: "A principle of granting only the permissions required to perform a task\u2014no more, no longer.\
  \ Implemented via RBAC/IAM roles, scoped credentials, and time-bounded access, it reduces the impact of credential compromise\
  \ and misconfiguration."
consequences: Reduced blast radius and better compliance; requires governance, tooling, and ongoing hygiene.
implementation_notes: Centralize identity, enforce least privilege, store secrets in a vault, keep services private by default,
  and automate policy checks.
examples_known_uses: Enterprise SaaS, healthcare/finance workloads, multi-tenant platforms.
related_patterns: |
  depends_on: OBS-01
  complements: CFG-01
  complements: CTX-01
  complements: POL-01
extended_definition: |
  A principle of granting only the permissions required to perform a task—no more, no longer. Implemented via RBAC/IAM roles, scoped credentials, and time-bounded access, it reduces the impact of credential compromise and misconfiguration.
