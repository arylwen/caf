pattern_id: EXT-ZERO_TRUST
name: Zero Trust
summary: Verify identity/context; minimize trust in network
intent: Assume the network is hostile; verify identity, device, and context for every request.
context: Systems handling sensitive data and multiple services/identities across networks and environments.
problem: Implicit trust, broad permissions, and ad-hoc secret handling create high breach impact and compliance risk.
forces_tradeoffs: Security depth vs developer friction; least privilege vs operational agility; privacy vs usability.
solution_structure_behavior: A security model that assumes no implicit trust based on network location. Every access request
  is continuously verified using strong identity, device and context signals, and least-privilege policies. It typically includes
  mTLS, conditional access, micro-segmentation, and continuous monitoring.
consequences: Reduced blast radius and better compliance; requires governance, tooling, and ongoing hygiene.
implementation_notes: Centralize identity, enforce least privilege, store secrets in a vault, keep services private by default,
  and automate policy checks.
examples_known_uses: Enterprise SaaS, healthcare/finance workloads, multi-tenant platforms.
related_patterns: |
  depends_on: OBS-01
  complements: CFG-01
  complements: CTX-01
  complements: POL-01
extended_definition: A security model that assumes no implicit trust based on network location. Every access request is continuously
  verified using strong identity, device and context signals, and least-privilege policies. It typically includes mTLS, conditional
  access, micro-segmentation, and continuous monitoring.
